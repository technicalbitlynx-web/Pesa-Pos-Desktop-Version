  );
}

/* ---------- UPDATED: Add Supplier Purchase Modal (Search by Product Name) ---------- */
function AddSupplierPurchaseModal({ products, onClose, onSave, currentUser }) {
    const [supplierName, setSupplierName] = useState("");
    const [supplierPhone, setSupplierPhone] = useState("");
    const [purchaseDate, setPurchaseDate] = useState(new Date().toISOString().split('T')[0]);
    const [paymentMethod, setPaymentMethod] = useState("cash");
    const [dueDate, setDueDate] = useState("");
    const [notes, setNotes] = useState("");
    
    const [selectedItems, setSelectedItems] = useState([]);
    const [productSearch, setProductSearch] = useState("");
    const [searchResults, setSearchResults] = useState([]);
    const [selectedProduct, setSelectedProduct] = useState(null);
    const [quantity, setQuantity] = useState("");
    const [buyPrice, setBuyPrice] = useState("");
    const [sellPrice, setSellPrice] = useState("");
    const [expirationDate, setExpirationDate] = useState("");
    const [batchNotes, setBatchNotes] = useState("");
    
    // Search products by name or barcode
    useEffect(() => {
        if (!productSearch.trim()) {
            setSearchResults([]);
            return;
        }
        
        const query = productSearch.toLowerCase();
        const results = products.filter(p => 
            p.name.toLowerCase().includes(query) || 
            p.barcode.includes(query)
        ).slice(0, 8);
        
        setSearchResults(results);
    }, [productSearch, products]);
    
    // Set due date to 30 days from now for credit purchases
    useEffect(() => {
        if (paymentMethod === "credit" && !dueDate) {
            const futureDate = new Date();
            futureDate.setDate(futureDate.getDate() + 30);
            setDueDate(futureDate.toISOString().split('T')[0]);
        }
    }, [paymentMethod, dueDate]);
    
    const selectProduct = (product) => {
        setSelectedProduct(product);
        setProductSearch(product.name);
        setSearchResults([]);
        // Auto-fill sell price as 1.5x buy price if buy price exists
        if (product.buy_price) {
            setBuyPrice(product.buy_price.toString());
            setSellPrice(Math.round(product.buy_price * 1.5).toString());
        } else if (product.price) {
            setSellPrice(product.price.toString());
        }
    };
    
    const addItem = () => {
        if (!selectedProduct || !quantity || !buyPrice) {
            alert("Please select a product, enter quantity, and buy price");
            return;
        }
        
        const item = {
            barcode: selectedProduct.barcode,
            name: selectedProduct.name,
            quantity: parseInt(quantity, 10),
            buy_price: parseFloat(buyPrice),
            sell_price: parseFloat(sellPrice) || parseFloat(buyPrice) * 1.5,
            expiration_date: expirationDate || selectedProduct.expiration_date || "",
            batch_notes: batchNotes || `Purchase from ${supplierName}`,
            added_by: currentUser?.name || "Unknown"
        };
        
        setSelectedItems([...selectedItems, item]);
        setSelectedProduct(null);
        setProductSearch("");
        setQuantity("");
        setBuyPrice("");
        setSellPrice("");
        setExpirationDate("");
        setBatchNotes("");
    };
    
    const removeItem = (index) => {
        setSelectedItems(selectedItems.filter((_, i) => i !== index));
    };
    
    const calculateTotal = () => {
        return selectedItems.reduce((sum, item) => sum + (item.quantity * item.buy_price), 0);
    };
    
    const handleSave = () => {
        if (!supplierName.trim()) {
            alert("Please enter supplier name");
            return;
        }
        
        if (selectedItems.length === 0) {
            alert("Please add at least one item");
            return;
        }
        
        const totalAmount = calculateTotal();
        const supplierPurchase = {
            id: `SUP_${Date.now()}`,
            supplier_name: supplierName.trim(),
            supplier_phone: supplierPhone.trim(),
            purchase_date: purchaseDate,
            items: selectedItems,
            original_amount: totalAmount,
            paid_amount: paymentMethod === "cash" ? totalAmount : 0,
            balance_amount: paymentMethod === "credit" ? totalAmount : 0,
            payment_method: paymentMethod,
            due_date: paymentMethod === "credit" ? dueDate : "",
            status: paymentMethod === "cash" ? "paid" : "pending",
            payment_history: paymentMethod === "cash" ? [{
                date: new Date().toISOString(),
                amount: totalAmount,
                user: currentUser?.name || "Unknown"
            }] : [],
            last_updated: new Date().toISOString(),
            notes: notes.trim()
        };
        
        onSave(supplierPurchase);
    };
    
    return (
        <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
            <div className="glass-card rounded-xl shadow-2xl w-full max-w-6xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
                <div className="flex items-center justify-between mb-6">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800">Add Supplier Purchase</h2>
                        <p className="text-slate-600">Record purchases from suppliers (cash or credit)</p>
                    </div>
                    <button onClick={onClose} className="btn btn-outline">
                        Close
                    </button>
                </div>
                
                <div className="modal-content-scrollable">
                    <div className="grid md:grid-cols-2 gap-6 flex-1 min-h-0">
                        {/* Left Column - Supplier Details */}
                        <div className="space-y-4">
                            <div className="glass-card p-4">
                                <h3 className="font-semibold mb-4">Supplier Information</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="form-label">Supplier Name *</label>
                                        <input 
                                            type="text" 
                                            value={supplierName} 
                                            onChange={(e) => setSupplierName(e.target.value)} 
                                            className="form-input" 
                                            placeholder="Enter supplier name" 
                                            required 
                                        />
                                    </div>
                                    <div>
                                        <label className="form-label">Supplier Phone</label>
                                        <input 
                                            type="tel" 
                                            value={supplierPhone} 
                                            onChange={(e) => setSupplierPhone(e.target.value)} 
                                            className="form-input" 
                                            placeholder="Enter phone number" 
                                        />
                                    </div>
                                    <div>
                                        <label className="form-label">Purchase Date</label>
                                        <input 
                                            type="date" 
                                            value={purchaseDate} 
                                            onChange={(e) => setPurchaseDate(e.target.value)} 
                                            className="form-input" 
                                        />
                                    </div>
                                    <div>
                                        <label className="form-label">Payment Method</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            <button 
                                                className={`btn ${paymentMethod === "cash" ? "btn-primary" : "btn-outline"}`}
                                                onClick={() => setPaymentMethod("cash")}
                                            >
                                                Cash
                                            </button>
                                            <button 
                                                className={`btn ${paymentMethod === "credit" ? "btn-primary" : "btn-outline"}`}
                                                onClick={() => setPaymentMethod("credit")}
                                            >
                                                Credit
                                            </button>
                                        </div>
                                    </div>
                                    {paymentMethod === "credit" && (
                                        <div>
                                            <label className="form-label">Due Date</label>
                                            <input 
                                                type="date" 
                                                value={dueDate} 
                                                onChange={(e) => setDueDate(e.target.value)} 
                                                className="form-input" 
                                            />
                                        </div>
                                    )}
                                    <div>
                                        <label className="form-label">Notes</label>
                                        <textarea 
                                            value={notes} 
                                            onChange={(e) => setNotes(e.target.value)} 
                                            className="form-input h-24" 
                                            placeholder="Additional notes about this purchase..." 
                                        />
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        {/* Right Column - Items and Preview */}
                        <div className="space-y-4">
                            <div className="glass-card p-4">
                                <h3 className="font-semibold mb-4">Add Items (Search by Product Name)</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="form-label">Search Product</label>
                                        <input 
                                            type="text" 
                                            value={productSearch} 
                                            onChange={(e) => setProductSearch(e.target.value)} 
                                            className="form-input" 
                                            placeholder="Type product name or barcode..." 
                                        />
                                        {searchResults.length > 0 && (
                                            <div className="mt-2 border border-slate-200 rounded-lg max-h-40 overflow-y-auto bg-white shadow-lg">
                                                {searchResults.map((product, idx) => (
                                                    <div 
                                                        key={idx} 
                                                        className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b border-slate-100 last:border-b-0"
                                                        onClick={() => selectProduct(product)}
                                                    >
                                                        <div className="font-medium">{product.name}</div>
                                                        <div className="text-sm text-slate-500">
                                                            Barcode: <span className="font-mono">{product.barcode}</span> | 
                                                            Stock: {product.available_stock || 0} | 
                                                            Price: TSH {product.price?.toLocaleString() || 0}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {selectedProduct && (
                                            <div className="mt-2 p-2 bg-blue-50 text-blue-800 rounded text-sm">
                                                <strong>Selected:</strong> {selectedProduct.name}<br />
                                                <strong>Barcode:</strong> {selectedProduct.barcode}<br />
                                                <strong>Current Stock:</strong> {selectedProduct.available_stock || 0}<br />
                                                <strong>Current Price:</strong> TSH {selectedProduct.price?.toLocaleString() || 0}
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="form-label">Quantity *</label>
                                            <input 
                                                type="number" 
                                                value={quantity} 
                                                onChange={(e) => setQuantity(e.target.value)} 
                                                className="form-input" 
                                                placeholder="Quantity" 
                                                min="1" 
                                                disabled={!selectedProduct}
                                            />
                                        </div>
                                        <div>
                                            <label className="form-label">Buy Price (TSH) *</label>
                                            <input 
                                                type="number" 
                                                value={buyPrice} 
                                                onChange={(e) => setBuyPrice(e.target.value)} 
                                                className="form-input" 
                                                placeholder="Buying price" 
                                                min="0" 
                                                step="0.01" 
                                                disabled={!selectedProduct}
                                            />
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="form-label">Sell Price (TSH)</label>
                                            <input 
                                                type="number" 
                                                value={sellPrice} 
                                                onChange={(e) => setSellPrice(e.target.value)} 
                                                className="form-input" 
                                                placeholder="Will auto-calculate" 
                                                min="0" 
                                                step="0.01" 
                                                disabled={!selectedProduct}
                                            />
                                            <p className="text-xs text-slate-500 mt-1">Leave blank for auto (1.5× buy price)</p>
                                        </div>
                                        <div>
                                            <label className="form-label">Expiration Date</label>
                                            <input 
                                                type="date" 
                                                value={expirationDate} 
                                                onChange={(e) => setExpirationDate(e.target.value)} 
                                                className="form-input" 
                                                disabled={!selectedProduct}
                                            />
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="form-label">Batch Notes</label>
                                        <input 
                                            type="text" 
                                            value={batchNotes} 
                                            onChange={(e) => setBatchNotes(e.target.value)} 
                                            className="form-input" 
                                            placeholder="e.g., Summer batch, Special offer, etc." 
                                            disabled={!selectedProduct}
                                        />
                                    </div>
                                    
                                    <button 
                                        onClick={addItem} 
                                        className="btn btn-primary w-full"
                                        disabled={!selectedProduct || !quantity || !buyPrice}
                                    >
                                        Add Item to Purchase
                                    </button>
                                </div>
                            </div>
                            
                            {/* Selected Items Preview */}
                            <div className="glass-card p-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-semibold">Selected Items ({selectedItems.length})</h3>
                                    <div className="text-lg font-bold mono">
                                        Total: TSH {calculateTotal().toLocaleString()}
                                    </div>
                                </div>
                                
                                {selectedItems.length === 0 ? (
                                    <div className="text-center py-8 text-slate-500">
                                        <p>No items added yet</p>
                                        <p className="text-sm mt-2">Search and add products from the form above</p>
                                    </div>
                                ) : (
                                    <div className="space-y-2 max-h-64 overflow-y-auto">
                                        {selectedItems.map((item, index) => (
                                            <div key={index} className="flex items-center justify-between p-3 bg-slate-50 rounded-lg">
                                                <div className="flex-1">
                                                    <div className="font-medium">{item.name}</div>
                                                    <div className="text-sm text-slate-600">
                                                        Barcode: <span className="font-mono">{item.barcode}</span>
                                                    </div>
                                                    <div className="text-sm text-slate-600">
                                                        Qty: {item.quantity} × TSH {item.buy_price.toLocaleString()} = TSH {(item.quantity * item.buy_price).toLocaleString()}
                                                    </div>
                                                    {item.expiration_date && (
                                                        <div className="text-xs text-slate-500">
                                                            Expires: {formatDate(item.expiration_date)}
                                                        </div>
                                                    )}
                                                </div>
                                                <button 
                                                    onClick={() => removeItem(index)} 
                                                    className="btn btn-outline text-xs px-2 py-1"
                                                >
                                                    Remove
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                <div className="mt-4 pt-4 border-t border-slate-200">
                                    <div className="flex justify-between items-center">
                                        <div className="text-slate-600">
                                            Payment: <span className="font-medium">{paymentMethod.toUpperCase()}</span>
                                        </div>
                                        <button 
                                            onClick={handleSave} 
                                            className="btn btn-success"
                                            disabled={!supplierName.trim() || selectedItems.length === 0}
                                        >
                                            Save Purchase
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

/* ---------- Supplier Management Modal ---------- */
function SupplierManagementModal({ suppliers, onClose, onUpdateSupplier, onOpenAddPurchase }) {
    const [query, setQuery] = useState("");
    const [showPaymentForm, setShowPaymentForm] = useState(null);
    const [paymentAmount, setPaymentAmount] = useState("");
    
    const filteredSuppliers = useMemo(() => {
        if (!query) return suppliers;
        const q = query.toLowerCase();
        return suppliers.filter(s => 
            s.supplier_name.toLowerCase().includes(q) || 
            s.supplier_phone.includes(q) ||
            (s.notes && s.notes.toLowerCase().includes(q))
        );
    }, [suppliers, query]);
    
    const totalPending = useMemo(() => {
        return suppliers.reduce((sum, s) => sum + s.balance_amount, 0);
    }, [suppliers]);
    
    const handleAddPayment = (supplier) => {
        if (!paymentAmount || parseFloat(paymentAmount) <= 0) {
            alert("Please enter a valid payment amount");
            return;
        }
        
        const amount = parseFloat(paymentAmount);
        if (amount > supplier.balance_amount) {
            alert(`Payment amount cannot exceed balance of TSH ${supplier.balance_amount.toLocaleString()}`);
            return;
        }
        
        const newPayment = {
            date: new Date().toISOString(),
            amount: amount,
            user: localStorage.getItem("pos_current_user") ? JSON.parse(localStorage.getItem("pos_current_user")).name : "Unknown"
        };
        
        const updatedSupplier = {
            ...supplier,
            paid_amount: supplier.paid_amount + amount,
            balance_amount: supplier.balance_amount - amount,
            status: (supplier.balance_amount - amount) === 0 ? "paid" : (supplier.paid_amount + amount > 0 ? "partial" : "pending"),
            payment_history: [...supplier.payment_history, newPayment],
            last_updated: new Date().toISOString()
        };
        
        onUpdateSupplier(updatedSupplier);
        setShowPaymentForm(null);
        setPaymentAmount("");
    };
    
    return (
        <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
            <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
                <div className="flex items-center justify-between mb-6">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800">Supplier Management</h2>
                        <p className="text-slate-600">Track supplier purchases and payments</p>
                    </div>
                    <div className="flex items-center gap-3">
                        <button onClick={onOpenAddPurchase} className="btn btn-primary">
                            <PlusIcon /> Add Purchase
                        </button>
                        <button onClick={onClose} className="btn btn-outline">
                            Close
                        </button>
                    </div>
                </div>

                <div className="grid md:grid-cols-4 gap-4 mb-6">
                    <div className="info-card supplier-pending">
                        <div className="info-card-header">Total Pending</div>
                        <div className="info-card-value">TSH {totalPending.toLocaleString()}</div>
                    </div>
                    <div className="info-card supplier-partial">
                        <div className="info-card-header">Active Credits</div>
                        <div className="info-card-value">{suppliers.filter(s => s.balance_amount > 0).length}</div>
                    </div>
                    <div className="info-card supplier-paid">
                        <div className="info-card-header">Fully Paid</div>
                        <div className="info-card-value">{suppliers.filter(s => s.status === "paid").length}</div>
                    </div>
                    <div className="info-card supplier-overdue">
                        <div className="info-card-header">Overdue</div>
                        <div className="info-card-value">{suppliers.filter(s => new Date(s.due_date) < new Date() && s.balance_amount > 0).length}</div>
                    </div>
                </div>

                <div className="flex items-center gap-4 mb-6">
                    <input 
                        className="form-input flex-1"
                        placeholder="Search by supplier name, phone, or notes…" 
                        value={query}
                        onChange={e=>setQuery(e.target.value)} 
                    />
                    <div className="text-sm text-slate-600 font-medium">
                        {filteredSuppliers.length} purchase record(s)
                    </div>
                </div>

                <div className="modal-content-scrollable">
                    <div className="modal-table-container">
                        <div className="modal-table-wrapper">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Supplier</th>
                                        <th>Phone</th>
                                        <th>Purchase Date</th>
                                        <th className="text-right">Items</th>
                                        <th className="text-right">Amount</th>
                                        <th className="text-right">Paid</th>
                                        <th className="text-right">Balance</th>
                                        <th>Due Date</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredSuppliers.map((supplier) => {
                                        const isOverdue = supplier.due_date && new Date(supplier.due_date) < new Date() && supplier.balance_amount > 0;
                                        const statusClass = supplier.status === "paid" ? "supplier-paid" : 
                                                          supplier.status === "partial" ? "supplier-partial" : 
                                                          isOverdue ? "supplier-overdue" : "supplier-pending";
                                        
                                        return (
                                            <React.Fragment key={supplier.id}>
                                                <tr>
                                                    <td style={{fontFamily: 'ui-monospace, monospace'}}>{supplier.id.substring(0, 8)}...</td>
                                                    <td>{supplier.supplier_name}</td>
                                                    <td>{supplier.supplier_phone || "—"}</td>
                                                    <td>{formatDate(supplier.purchase_date)}</td>
                                                    <td className="text-right">{supplier.items.length}</td>
                                                    <td className="text-right">TSH {supplier.original_amount.toLocaleString()}</td>
                                                    <td className="text-right">TSH {supplier.paid_amount.toLocaleString()}</td>
                                                    <td className="text-right">
                                                        <span className="font-bold">TSH {supplier.balance_amount.toLocaleString()}</span>
                                                    </td>
                                                    <td className={isOverdue ? "text-red-600 font-medium" : ""}>
                                                        {supplier.due_date ? formatDate(supplier.due_date) : "—"}
                                                        {isOverdue && " (Overdue)"}
                                                    </td>
                                                    <td>
                                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${statusClass}`}>
                                                            {supplier.status.toUpperCase()}
                                                            {isOverdue && " - OVERDUE"}
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <button 
                                                            onClick={() => setShowPaymentForm(showPaymentForm === supplier.id ? null : supplier.id)}
                                                            className="btn btn-primary text-xs px-3 py-1"
                                                            disabled={supplier.balance_amount === 0}
                                                        >
                                                            Add Payment
                                                        </button>
                                                    </td>
                                                </tr>
                                                {showPaymentForm === supplier.id && (
                                                    <tr className="bg-blue-50">
                                                        <td colSpan="11" className="p-4">
                                                            <div className="flex items-center gap-4">
                                                                <div className="flex-1">
                                                                    <label className="form-label">Payment Amount (TSH)</label>
                                                                    <input 
                                                                        type="number"
                                                                        value={paymentAmount}
                                                                        onChange={(e) => setPaymentAmount(e.target.value)}
                                                                        className="form-input"
                                                                        placeholder={`Enter amount (max: ${supplier.balance_amount.toLocaleString()})`}
                                                                        max={supplier.balance_amount}
                                                                        min="1"
                                                                    />
                                                                </div>
                                                                <div className="flex items-center gap-2">
                                                                    <button 
                                                                        onClick={() => handleAddPayment(supplier)}
                                                                        className="btn btn-success"
                                                                        disabled={!paymentAmount || parseFloat(paymentAmount) <= 0}
                                                                    >
                                                                        Record Payment
                                                                    </button>
                                                                    <button 
                                                                        onClick={() => {
                                                                            setShowPaymentForm(null);
                                                                            setPaymentAmount("");
                                                                        }}
                                                                        className="btn btn-outline"
                                                                    >
                                                                        Cancel
                                                                    </button>
                                                                </div>
                                                            </div>
                                                            <div className="mt-4">
                                                                <h4 className="font-semibold text-slate-700 mb-2">Purchase Details</h4>
                                                                <div className="space-y-2">
                                                                    {supplier.items.map((item, idx) => (
                                                                        <div key={idx} className="text-sm p-2 bg-white rounded border">
                                                                            <div className="flex justify-between">
                                                                                <span className="font-medium">{item.name}</span>
                                                                                <span>Qty: {item.quantity}</span>
                                                                            </div>
                                                                            <div className="text-slate-500">
                                                                                Buy: TSH {item.buy_price.toLocaleString()} | 
                                                                                Sell: TSH {item.sell_price.toLocaleString()} | 
                                                                                Total: TSH {(item.quantity * item.buy_price).toLocaleString()}
                                                                            </div>
                                                                            {item.expiration_date && (
                                                                                <div className="text-xs text-slate-500">
                                                                                    Expires: {formatDate(item.expiration_date)}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                            {supplier.payment_history.length > 0 && (
                                                                <div className="mt-4">
                                                                    <h4 className="font-semibold text-slate-700 mb-2">Payment History</h4>
                                                                    <div className="space-y-2">
                                                                        {supplier.payment_history.map((payment, idx) => (
                                                                            <div key={idx} className="text-sm p-2 bg-white rounded border">
                                                                                <div className="flex justify-between">
                                                                                    <span>{new Date(payment.date).toLocaleDateString()}</span>
                                                                                    <span className="font-medium">TSH {payment.amount.toLocaleString()}</span>
                                                                                </div>
                                                                                <div className="text-slate-500 text-xs">By: {payment.user}</div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </td>
                                                    </tr>
                                                )}
                                            </React.Fragment>
                                        );
                                    })}
                                </tbody>
                            </table>
                            {filteredSuppliers.length === 0 && (
                                <div className="text-center py-12 text-slate-500">
                                    <p className="text-lg mb-2">No supplier records found</p>
                                    <p className="text-sm">Add purchases from suppliers to see them here</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

/* ---------- Batch Details Modal ---------- */
function BatchDetailsModal({ product, onClose }) {
    const batches = product.batches || [];
    
    const totalInvestment = useMemo(() => {
        return batches.reduce((sum, b) => sum + (b.buy_price * b.quantity), 0);
    }, [batches]);
    
    const totalQuantity = useMemo(() => {
        return batches.reduce((sum, b) => sum + b.quantity, 0);
    }, [batches]);
    
    const avgBuyPrice = useMemo(() => {
        return totalQuantity > 0 ? totalInvestment / totalQuantity : 0;
    }, [totalInvestment, totalQuantity]);
    
    return (
        <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
            <div className="glass-card rounded-xl shadow-2xl w-full max-w-2xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
                <div className="flex items-center justify-between mb-6">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800">Batch Details</h2>
                        <p className="text-slate-600">{product.name} - {product.barcode}</p>
                    </div>
                    <button onClick={onClose} className="btn btn-outline">
                        Close
                    </button>
                </div>
                
                <div className="grid md:grid-cols-3 gap-4 mb-6">
                    <div className="info-card">
                        <div className="info-card-header">Total Batches</div>
                        <div className="info-card-value">{batches.length}</div>
                    </div>
                    <div className="info-card">
                        <div className="info-card-header">Total Investment</div>
                        <div className="info-card-value">TSH {totalInvestment.toLocaleString()}</div>
                    </div>
                    <div className="info-card">
                        <div className="info-card-header">Avg Buy Price</div>
                        <div className="info-card-value">TSH {avgBuyPrice.toFixed(0)}</div>
                    </div>
                </div>
                
                <div className="modal-content-scrollable">

function SalesHistoryModal({ sales, products, credits, onClose, onDownload, onOpenAnalytics, onOpenCredits }) {
  const [reportType, setReportType] = useState("all");
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");
  
  const productsMap = useMemo(() => new Map(products.map(p => [p.barcode, p])), [products]);
  
  const filteredSales = useMemo(() => {
    const now = new Date();
    let from, to;
    
    switch (reportType) {
      case "daily":
        from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        to = new Date(from.getTime() + 24 * 60 * 60 * 1000);
        break;
      case "weekly":
        from = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        to = now;
        break;
      case "monthly":
        from = new Date(now.getFullYear(), now.getMonth(), 1);
        to = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        break;
      case "yearly":
        from = new Date(now.getFullYear(), 0, 1);
        to = new Date(now.getFullYear() + 1, 0, 0);
        break;
      case "custom":
        from = startDate ? new Date(startDate) : new Date(0);
        to = endDate ? new Date(endDate + "T23:59:59") : new Date();
        break;
      default:
        return sales;
    }
    
    return sales.filter(s => {
      const date = new Date(s.timestamp);
      return date >= from && date <= to;
    });
  }, [sales, reportType, startDate, endDate]);
  
  const totalRevenue = useMemo(() => filteredSales.reduce((sum, sale) => sum + sale.total, 0), [filteredSales]);
  const totalItems = useMemo(() => filteredSales.reduce((sum, sale) => sum + sale.quantity, 0), [filteredSales]);
  const totalProfit = useMemo(() => filteredSales.reduce((sum, s) => {
    const product = productsMap.get(s.barcode);
    if (product && product.batches) {
        // Find appropriate batch for FIFO costing
        let remainingQty = s.quantity;
        let totalCost = 0;
        const sortedBatches = [...product.batches].sort((a, b) => 
            new Date(a.purchase_date) - new Date(b.purchase_date)
        );
        
        for (const batch of sortedBatches) {
            if (remainingQty <= 0) break;
            const availableFromBatch = Math.min(remainingQty, batch.quantity);
            totalCost += availableFromBatch * batch.buy_price;
            remainingQty -= availableFromBatch;
        }
        
        return sum + (s.total - totalCost);
    }
    
    // Fallback to simple calculation
    const buyP = Number.isFinite(s.buy_price) ? s.buy_price : (product?.buy_price || 0);
    return sum + (s.price - buyP) * s.quantity;
  }, 0), [filteredSales, productsMap]);
  
  const creditSales = useMemo(() => {
    return filteredSales.filter(s => s.payment_method === "credit" || s.payment_method === "partial_credit");

/* ---------- Analytics Modal ---------- */
function AnalyticsModal({ sales, products, onClose }) {
  const productsMap = useMemo(() => new Map(products.map(p => [p.barcode, p])), [products]);
  
  const totalRevenue = useMemo(() => sales.reduce((sum, sale) => sum + sale.total, 0), [sales]);
  const totalItems = useMemo(() => sales.reduce((sum, sale) => sum + sale.quantity, 0), [sales]);
  const totalProfit = useMemo(() => sales.reduce((sum, s) => {
    const product = productsMap.get(s.barcode);
    if (product && product.batches) {
        // Find appropriate batch for FIFO costing
        let remainingQty = s.quantity;
        let totalCost = 0;
        const sortedBatches = [...product.batches].sort((a, b) => 
            new Date(a.purchase_date) - new Date(b.purchase_date)
        );
        
        for (const batch of sortedBatches) {
            if (remainingQty <= 0) break;
            const availableFromBatch = Math.min(remainingQty, batch.quantity);
            totalCost += availableFromBatch * batch.buy_price;
            remainingQty -= availableFromBatch;
        }
        
        return sum + (s.total - totalCost);
    }
    
    // Fallback to simple calculation
    const buyP = Number.isFinite(s.buy_price) ? s.buy_price : (product?.buy_price || 0);
    return sum + (s.price - buyP) * s.quantity;
  }, 0), [sales, productsMap]);

  const metrics = useMemo(() => {
    const m = new Map();
    for (const s of sales) {
      const k = s.barcode;
      if (!m.has(k)) m.set(k, { barcode: s.barcode, name: s.name, qty: 0, rev: 0, profit: 0 });
      const product = productsMap.get(s.barcode);
      let profit;
      
      if (product && product.batches) {
        // FIFO costing
        let remainingQty = s.quantity;
        let totalCost = 0;
        const sortedBatches = [...product.batches].sort((a, b) => 
            new Date(a.purchase_date) - new Date(b.purchase_date)
        );
        
        for (const batch of sortedBatches) {
            if (remainingQty <= 0) break;
            const availableFromBatch = Math.min(remainingQty, batch.quantity);
            totalCost += availableFromBatch * batch.buy_price;
            remainingQty -= availableFromBatch;
        }
        profit = s.total - totalCost;
      } else {
        // Simple calculation
        const buyP = Number.isFinite(s.buy_price) ? s.buy_price : (product?.buy_price || 0);
        profit = (s.price - buyP) * s.quantity;
      }
      
      const row = m.get(k);
      row.qty += s.quantity;
      row.rev += s.total;
      row.profit += profit;
    }
    return Array.from(m.values()).sort((a,b)=> b.rev - a.rev);
  }, [sales, productsMap]);

  const withStock = useMemo(() => {
    const pm = new Map(products.map(p=>[p.barcode,p]));
    return metrics.map(r => {
      const p = pm.get(r.barcode) || {};
      const opening = Number(p.opening_stock)||0;
      const sold = r.qty;
      const available = Number(p.available_stock)||0;
      const drr = sold > 0 ? (sold / Math.max(1, opening + sold)) * 30 : 0;
      const projDaysLeft = drr>0 ? (available / (drr/30)) : Infinity;
      const avgPrice = (r.rev / Math.max(1, r.qty));
      return { ...r, opening, available, drr, projDaysLeft, avgPrice, turnover: r.rev, margin: r.profit };
    });
  }, [metrics, products]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Sales Analytics</h2>
            <p className="text-slate-600">Detailed profit and performance analysis</p>
          </div>
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
        </div>

        <div className="grid md:grid-cols-3 gap-6 mb-6">
          <div className="info-card" style={{background: 'linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%)'}}>
            <div className="info-card-header" style={{color: '#1e40af'}}>Total Revenue</div>
            <div className="info-card-value" style={{color: '#1d4ed8'}}>TSH {totalRevenue.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)'}}>
            <div className="info-card-header" style={{color: '#065f46'}}>Items Sold</div>
            <div className="info-card-value" style={{color: '#047857'}}>{totalItems.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)'}}>
            <div className="info-card-header" style={{color: '#92400e'}}>Total Profit</div>
            <div className="info-card-value" style={{color: '#b45309'}}>TSH {totalProfit.toLocaleString()}</div>
          </div>
        </div>

        <div className="modal-content-scrollable">
          <div className="modal-table-container">
            <div className="modal-table-wrapper">
              <table className="data-table">
                <thead>
                  <tr>
                    <th>Barcode</th>
                    <th>Product Name</th>
                    <th className="text-right">Qty Sold</th>
                    <th className="text-right">Revenue</th>
                    <th className="text-right">Profit</th>
                    <th className="text-right">Avg Price</th>
                    <th className="text-right">Opening</th>
                    <th className="text-right">Available</th>
                    <th className="text-right">Turnover%</th>
                    <th className="text-right">Days Left</th>
                  </tr>
                </thead>
                <tbody>
                  {withStock.map((r) => (
                    <tr key={r.barcode}>
                      <td style={{fontFamily: 'ui-monospace, monospace'}}>{r.barcode}</td>
                      <td>{r.name}</td>
                      <td className="text-right">{r.qty.toLocaleString()}</td>
                      <td className="text-right">TSH {r.rev.toLocaleString()}</td>
                      <td className="text-right">TSH {r.profit.toLocaleString()}</td>
                      <td className="text-right">TSH {r.avgPrice.toFixed(0)}</td>
                      <td className="text-right">{r.opening.toLocaleString()}</td>
                      <td className="text-right">{r.available.toLocaleString()}</td>
                      <td className="text-right">{(r.turnover * 100).toFixed(1)}%</td>
                      <td className="text-right">{Number.isFinite(r.projDaysLeft) ? r.projDaysLeft.toFixed(1) : "—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
        
        <div className="mt-4 p-4 bg-blue-50 rounded-lg">
          <p className="text-sm text-blue-800">
            <strong>Analysis Tips:</strong> Use this table to identify fast-moving products, high-margin items, and potential stock-outs. 
            Focus on products with high turnover and good profit margins for restocking priorities.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ---------- Inventory Modal (Enhanced) ---------- */
function InventoryModal({ products, onClose, onDeleteSelected, onDeleteAll, onOpenABC }) {
  const [query, setQuery] = React.useState("");
  const [checked, setChecked] = React.useState(new Set());
  const [selectedProductForBatches, setSelectedProductForBatches] = React.useState(null);

  const filtered = React.useMemo(() => {
    const q = query.toLowerCase();
    return products.filter(p =>
      (p.name||"").toLowerCase().includes(q) || String(p.barcode||"").includes(q)
    );
  }, [products, query]);

  const totals = React.useMemo(() => {
    const toNum = n => Number(n) || 0;
    let stockValue = 0, retailValue = 0, potentialProfit = 0, lowStockCount = 0, expiredCount = 0, expiringSoonCount = 0;
    for (const p of filtered) {
      const qty = toNum(p.available_stock);
      const buy = toNum(p.buy_price);
      const sell = toNum(p.price);
      const reorderLevel = toNum(p.reorder_level);
      
      stockValue += buy * qty;
      retailValue += sell * qty;
      potentialProfit += (sell - buy) * qty;
      
      if (qty <= reorderLevel && reorderLevel > 0) lowStockCount++;
      if (p.expiration_date && isExpired(p.expiration_date)) expiredCount++;
      if (p.expiration_date && isExpiringSoon(p.expiration_date)) expiringSoonCount++;
    }
    return { stockValue, retailValue, potentialProfit, lowStockCount, expiredCount, expiringSoonCount };
  }, [filtered]);

  function toggle(bc) {
    const next = new Set(checked);
    next.has(bc) ? next.delete(bc) : next.add(bc);
    setChecked(next);
  }

  function getRowClass(product) {
    if (product.expiration_date && isExpired(product.expiration_date)) {
      return "expired-item";
    }
    if (product.expiration_date && isExpiringSoon(product.expiration_date)) {
      return "expiring-soon-item";
    }
    if (Number(product.available_stock) <= Number(product.reorder_level) && Number(product.reorder_level) > 0) {
      return "low-stock-item";
    }
    return "";
  }

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Inventory Management</h2>
            <p className="text-slate-600">Stock levels, valuations, and alerts</p>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={onOpenABC} className="btn btn-secondary">
              <BarChartIcon /> ABC Analysis
            </button>
            <button onClick={onClose} className="btn btn-outline">
              Close
            </button>
          </div>
        </div>

        <div className="grid md:grid-cols-6 gap-4 mb-6">
          <div className="info-card" style={{background: 'linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%)'}}>
            <div className="info-card-header" style={{color: '#1e40af'}}>Stock Value</div>
            <div className="info-card-value" style={{color: '#1d4ed8', fontSize: '1.2rem'}}>TSH {totals.stockValue.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)'}}>
            <div className="info-card-header" style={{color: '#065f46'}}>Retail Value</div>
            <div className="info-card-value" style={{color: '#047857', fontSize: '1.2rem'}}>TSH {totals.retailValue.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)'}}>
            <div className="info-card-header" style={{color: '#92400e'}}>Potential Profit</div>

function StockHistoryModal({ stockLog, onClose, onDownload }) {
  const [query, setQuery] = React.useState("");
  const [from, setFrom] = React.useState("");
  const [to, setTo] = React.useState("");

  const rows = React.useMemo(()=>{
    return stockLog.filter(r=>{
      const hit = String(r.barcode||"").includes(query) || String(r.name||"").toLowerCase().includes(String(query||"").toLowerCase());
      if (!hit) return false;
      const t = new Date(r.timestamp).getTime();
      const okFrom = from ? t >= new Date(from+"T00:00:00").getTime() : true;
      const okTo   = to   ? t <  new Date(to+"T23:59:59").getTime()   : true;
      return okFrom && okTo;
    });
  }, [stockLog, query, from, to]);

  const totals = React.useMemo(()=>{
    let qty=0;

            onChange={e=>setQuery(e.target.value)}

/* ---------- JSON Data Backup/Restore Modal ---------- */
function JSONDataModal({ 
  products, 
  sales, 
  credits, 
  suppliers, 
  stockLog, 
  users, 
  onClose, 
  onImportData 
}) {
  const [activeTab, setActiveTab] = useState("export");
  const [importData, setImportData] = useState("");
  const [importError, setImportError] = useState("");
  const [importSuccess, setImportSuccess] = useState("");

  // Prepare data for export
  const exportData = useMemo(() => {
    return {
      version: "2.0",
      export_date: new Date().toISOString(),
      system: "Profit Point POS",
      data: {
        products: products,
        sales: sales,
        credits: credits,
        suppliers: suppliers,
        stockLog: stockLog,
        users: users,
        settings: {
          receipt_counter: localStorage.getItem("pos_receipt_counter") || "1001",
          current_user: localStorage.getItem("pos_current_user") || null,
          current_month: monthKey()
        }
      }
    };
  }, [products, sales, credits, suppliers, stockLog, users]);

  const handleExport = () => {
    const dataStr = JSON.stringify(exportData, null, 2);
    const dataBlob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(dataBlob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `pos_backup_${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    // Show success message
    setImportSuccess("Backup exported successfully!");
    setTimeout(() => setImportSuccess(""), 3000);
  };

  const handleImport = () => {
    if (!importData.trim()) {
      setImportError("Please paste JSON data to import");
      return;
    }

    try {
      const parsed = JSON.parse(importData);
      
      // Validate structure
      if (!parsed.version || !parsed.data) {
        throw new Error("Invalid backup format");
      }

      // Confirm import
      if (!confirm(`This will replace all current data. Are you sure you want to import backup from ${parsed.export_date ? new Date(parsed.export_date).toLocaleString() : 'unknown date'}?`)) {
        return;
      }

      // Import data
      onImportData(parsed.data);
      
      setImportSuccess("Data imported successfully!");
      setImportError("");
      setImportData("");
      
      // Close modal after success
      setTimeout(() => {
        onClose();
      }, 2000);
      
    } catch (error) {
      setImportError(`Import failed: ${error.message}`);
      setImportSuccess("");
    }
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-4xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">JSON Data Backup & Restore</h2>
            <p className="text-slate-600">Export complete system data or restore from backup</p>
          </div>
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
        </div>

        <div className="flex border-b border-slate-200 mb-6">
          <button
            className={`px-4 py-2 font-medium ${activeTab === "export" ? "border-b-2 border-blue-500 text-blue-600" : "text-slate-500"}`}
            onClick={() => setActiveTab("export")}
          >
            Export Backup
          </button>
          <button
            className={`px-4 py-2 font-medium ${activeTab === "import" ? "border-b-2 border-blue-500 text-blue-600" : "text-slate-500"}`}
            onClick={() => setActiveTab("import")}
          >
            Import Restore
          </button>
        </div>

        {activeTab === "export" ? (
          <div className="modal-content-scrollable">
            <div className="space-y-6">
              <div className="grid md:grid-cols-3 gap-4">
                <div className="info-card">
                  <div className="info-card-header">Products</div>
                  <div className="info-card-value">{exportData.data.products.length}</div>
                  <div className="text-sm">with batch tracking</div>
                </div>
                <div className="info-card">
                  <div className="info-card-header">Sales</div>
                  <div className="info-card-value">{exportData.data.sales.length}</div>
                  <div className="text-sm">transactions</div>
                </div>
                <div className="info-card">
                  <div className="info-card-header">Credits</div>
                  <div className="info-card-value">{exportData.data.credits.length}</div>
                  <div className="text-sm">customer records</div>
                </div>
                <div className="info-card">
                  <div className="info-card-header">Suppliers</div>
                  <div className="info-card-value">{exportData.data.suppliers.length}</div>
                  <div className="text-sm">purchases</div>
                </div>
                <div className="info-card">
                  <div className="info-card-header">Stock Log</div>
                  <div className="info-card-value">{exportData.data.stockLog.length}</div>
                  <div className="text-sm">adjustments</div>
                </div>
                <div className="info-card">
                  <div className="info-card-header">Users</div>
                  <div className="info-card-value">{exportData.data.users.length}</div>
                  <div className="text-sm">accounts</div>
                </div>
              </div>

              <div className="p-4 bg-blue-50 rounded-lg">
                <h3 className="font-semibold text-blue-800 mb-2">Backup Information</h3>
                <div className="text-sm text-blue-800 space-y-1">
                  <div><strong>Version:</strong> {exportData.version}</div>
                  <div><strong>Export Date:</strong> {new Date(exportData.export_date).toLocaleString()}</div>
                  <div><strong>System:</strong> {exportData.system}</div>
                  <div><strong>File Size:</strong> Approximately {Math.round(JSON.stringify(exportData).length / 1024)} KB</div>
                </div>
              </div>

              <div className="p-4 bg-yellow-50 rounded-lg">
                <h3 className="font-semibold text-yellow-800 mb-2">Important Notes</h3>
                <ul className="text-sm text-yellow-800 list-disc pl-5 space-y-1">
                  <li>This backup includes ALL system data: products, sales, credits, suppliers, stock history, and user accounts</li>
                  <li>Backups are stored as JSON files and can be opened in any text editor</li>
                  <li>Regular backups are recommended to prevent data loss</li>
                  <li>Store backup files in a secure location</li>
                </ul>
              </div>

              <button
                onClick={handleExport}
                className="btn btn-success w-full py-3"
              >
                <DownloadIcon /> Download Complete Backup
              </button>
            </div>
          </div>
        ) : (
          <div className="modal-content-scrollable">
            <div className="space-y-6">
              <div className="p-4 bg-red-50 rounded-lg">
                <h3 className="font-semibold text-red-800 mb-2">⚠️ Warning</h3>
                <p className="text-sm text-red-800">
                  Importing backup data will <strong>replace all current data</strong>. This action cannot be undone. 
                  Make sure you have a current backup before proceeding.
                </p>
              </div>

              <div>
                <label className="form-label">Paste JSON Backup Data</label>
                <textarea
                  value={importData}
                  onChange={(e) => setImportData(e.target.value)}
                  className="form-input h-64 font-mono text-sm"
                  placeholder="Paste your JSON backup data here..."
                  spellCheck="false"
                />
                <p className="text-xs text-slate-500 mt-1">
                  Paste the complete JSON backup file content. Make sure it's valid JSON format.
                </p>
              </div>

              {importError && (
                <div className="p-4 bg-red-100 border border-red-300 rounded-lg">
                  <p className="text-red-800 font-medium">{importError}</p>
                </div>
              )}

              {importSuccess && (
                <div className="p-4 bg-green-100 border border-green-300 rounded-lg">
                  <p className="text-green-800 font-medium">{importSuccess}</p>
                </div>
              )}

              <div className="flex gap-4">
                <button
                  onClick={handleImport}
                  className="btn btn-primary flex-1 py-3"
                  disabled={!importData.trim()}
                >
                  <DatabaseIcon /> Import Backup Data
                </button>
                <button
                  onClick={() => {
                    setImportData("");
                    setImportError("");
                    setImportSuccess("");
                  }}
                  className="btn btn-outline py-3"
                >
                  Clear
                </button>
              </div>

              <div className="p-4 bg-blue-50 rounded-lg">
                <h3 className="font-semibold text-blue-800 mb-2">How to Restore</h3>
                <ol className="text-sm text-blue-800 list-decimal pl-5 space-y-1">
                  <li>Export a backup from another system or from a previous backup</li>
                  <li>Open the JSON file in a text editor</li>
                  <li>Copy the entire content</li>
                  <li>Paste it into the text area above</li>
                  <li>Click "Import Backup Data" to restore</li>
                  <li>The system will restart with the imported data</li>
                </ol>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function printReceiptAuto(items) {
  const w = window.open("", "_blank", "width=400,height=600");
  const html = buildReceiptHTML(items, { method: "cash", receiptNumber: "" }, false);
  w.document.open(); 
  w.document.write(html); 
  w.document.close();
  w.focus(); 
  setTimeout(() => {
    w.print(); 
    w.close();
  }, 500);
}

      { data: usersToCSV(users), filename: `users_${new Date().toISOString().split('T')[0]}.csv` }
    ];

    dataToDownload.forEach(({ data, filename }) => {
      const blob = new Blob([data], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    showToast("All data exported to CSV files", "success");

  // UPDATED: Payment handler with credit accumulation feature
  function handleConfirmPayment(paymentDetails) {
    const cartItems = pendingPayment?.cart || cart;
    const total = pendingPayment?.total || getTotalAmount();
    
    if (cartItems.length === 0) {
      showToast("Cart is empty", "error");
      return;
    }

    if (!currentUser) {
      showToast("Please login to process payments", "error");
      return;
    }

    // Check stock availability and expiration
    for (const item of cartItems) {
      const p = productsMap.get(item.barcode);
      if (!p || Number(p.available_stock || 0) < item.qty) {
        showToast(`Insufficient stock for ${item.name}`, "error");
        return;
      }
      
      if (p.expiration_date && isExpired(p.expiration_date)) {
        showToast(`Cannot sell expired product: ${item.name}`, "error");
        return;
      }
    }

    const timestampISO = new Date().toISOString();
    const currentReceipt = receiptNumber;

    // Build per-item sales + persist
    const newSales = cartItems.map((item) => {
      const prod = productsMap.get(item.barcode) || {};
      
      // Calculate cost using FIFO for batches
      let totalCost = 0;
      if (prod.batches && prod.batches.length > 0) {
        let remainingQty = item.qty;
        const sortedBatches = [...prod.batches].sort((a, b) => 
          new Date(a.purchase_date) - new Date(b.purchase_date)
        );
        
        for (const batch of sortedBatches) {
          if (remainingQty <= 0) break;
          const availableFromBatch = Math.min(remainingQty, batch.quantity);
          totalCost += availableFromBatch * batch.buy_price;
          remainingQty -= availableFromBatch;
        }
      } else {
        totalCost = item.qty * (prod.buy_price || 0);
      }
      
      const itemTotal = item.price * item.qty;
      
      return {
        timestamp: timestampISO,
        receipt_number: currentReceipt,
        teller_number: TELLER_NUMBER,
        user_name: currentUser.name,
        barcode: item.barcode,
        name: item.name,
        price: item.price,
        quantity: item.qty,
        total: itemTotal,
        buy_price: totalCost / item.qty, // Average buy price for this sale
        profit: itemTotal - totalCost,
        payment_method: paymentDetails.method,
        credit_id: paymentDetails.method === "credit" ? `CREDIT_${currentReceipt}` : "",
        payment_date: paymentDetails.method === "cash" || paymentDetails.method === "card" ? timestampISO : ""
      };
    });
    
    // CREDIT ACCUMULATION FEATURE: If it's a credit sale, check if customer exists
    if (paymentDetails.method === "credit") {
      const customerName = paymentDetails.customerName.trim();
      const customerPhone = paymentDetails.customerPhone.trim();
      
      // Check if customer already has credit records
      const existingCustomerCredits = credits.filter(c => 
        c.customer_name.toLowerCase() === customerName.toLowerCase() &&
        (customerPhone === "" || c.customer_phone === customerPhone)
      );
      
      let creditRecord;
      
      if (existingCustomerCredits.length > 0) {
        // Accumulate to existing customer's credit
        const existingCredit = existingCustomerCredits[0];
        creditRecord = {
          ...existingCredit,
          original_amount: existingCredit.original_amount + total,
          balance_amount: existingCredit.balance_amount + total,
          last_updated: timestampISO,
          items: [...existingCredit.items, ...cartItems.map(item => ({
            name: item.name,
            barcode: item.barcode,
            quantity: item.qty,
            price: item.price,
            total: item.qty * item.price
          }))]
        };
        
        // Show accumulation message
        showToast(`Credit accumulated for existing customer ${customerName}. New balance: TSH ${creditRecord.balance_amount.toLocaleString()}`, "success");
      } else {
        // Create new credit record for new customer
        creditRecord = {
          id: `CREDIT_${currentReceipt}`,
          receipt_number: currentReceipt.toString(),
          customer_name: customerName,
          customer_phone: customerPhone,
          original_amount: total,
          paid_amount: 0,
          balance_amount: total,
          sale_date: timestampISO,
          due_date: paymentDetails.dueDate || new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
          status: "pending",
          payment_history: [],
          last_updated: timestampISO,
          items: cartItems.map(item => ({
            name: item.name,
            barcode: item.barcode,
            quantity: item.qty,
            price: item.price,
            total: item.qty * item.price
          }))
        };
        
        showToast(`New credit record created for ${customerName}`, "success");
      }
      
      setCredits(prev => {
        // Remove old record if accumulating
        const filtered = existingCustomerCredits.length > 0 
          ? prev.filter(c => c.id !== existingCustomerCredits[0].id)
          : prev;
        
        const updated = [...filtered, creditRecord];
        persistCredits(updated);
        return updated;
      });
    }
    
    setSales((prev) => { 
      const updatedSales = [...prev, ...newSales]; 
      setSalesCsvURLFromRows(updatedSales); 
      return updatedSales; 
    });

    // Update products stock (FIFO consumption from batches)
    setProducts((prev) => {
      const next = prev.map((p) => ({ ...p }));
      for (const it of cartItems) {
        const idx = next.findIndex((x) => x.barcode === it.barcode);
        if (idx >= 0) {
          const product = next[idx];
          next[idx].items_sold = Number(product.items_sold)||0; 
          next[idx].available_stock = Number(product.available_stock)||0;
          next[idx].items_sold += it.qty;
          next[idx].available_stock = Math.max(0, product.available_stock - it.qty);
          
          // Update batches (FIFO consumption)
          if (product.batches && product.batches.length > 0) {
            let remainingQty = it.qty;
            const updatedBatches = [...product.batches].sort((a, b) => 
              new Date(a.purchase_date) - new Date(b.purchase_date)
            );
            
            for (let i = 0; i < updatedBatches.length; i++) {
              if (remainingQty <= 0) break;
              const consumed = Math.min(remainingQty, updatedBatches[i].quantity);
              updatedBatches[i].quantity -= consumed;
              remainingQty -= consumed;
            }
            
            // Remove batches with zero quantity
            next[idx].batches = updatedBatches.filter(b => b.quantity > 0);
          }
        }
      }
      setCsvURLFromRows(next);
      return next;
    });

    // Prepare receipt/invoice items
    const items = cartItems.map((i) => ({ name: i.name, qty: i.qty, price: i.price }));
    
    // Print receipt or invoice based on payment method
    const isInvoice = paymentDetails.method === "credit";
    const printDetails = {
      ...paymentDetails,
      receiptNumber: currentReceipt.toString()
    };
    
    // Store items for receipt and show receipt
    setReceiptItems(items);
    setShowReceipt(true);
    setCart([]);
    setReceiptNumber(currentReceipt + 1);
    setShowPaymentModal(false);
    setPendingPayment(null);
    localStorage.setItem("pos_receipt_counter", String(currentReceipt + 1));
    
    // Print the document
    setTimeout(() => {
      printReceiptOrInvoice(items, printDetails, isInvoice);
    }, 1000);
    
    showToast(`Payment processed${isInvoice ? ' (Invoice)' : ' (Receipt)'}: TSH ${total.toLocaleString()}`, "success");
  }
