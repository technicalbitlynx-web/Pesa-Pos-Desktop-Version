<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit Point POS — Enhanced Edition</title>

  <!-- OFFLINE vendor files -->
  <script src="./script/react.development.js"></script>
  <script src="./script/react-dom.development.js"></script>
  <script src="./script/babel.min.js"></script>
  <!-- Tailwind Play CDN works offline when saved locally -->
  <script src="./script/tailwind.js"></script>

  <style>
    /* CSS Variables for Blue Gradient Theme */
    :root {
      --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      --secondary-gradient: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      --accent-gradient: linear-gradient(135deg, #93c5fd 0%, #60a5fa 100%);
      --sidebar-gradient: linear-gradient(180deg, #1e40af 0%, #1e3a8a 100%);
      --card-gradient: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(248,250,252,0.95) 100%);
      --hover-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    }

    /* Enhanced visual styling */
    .glass-card { 
      background: rgba(255,255,255,0.95); 
      backdrop-filter: blur(12px); 
      border: 1px solid rgba(59, 130, 246, 0.1); 
      box-shadow: 0 8px 32px rgba(30, 58, 138, 0.1);
    }
    .gradient-bg { 
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #dbeafe 100%);
      background-attachment: fixed;
    }
    .text-gradient { 
      background: var(--primary-gradient); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      background-clip: text; 
    }
    .hover-scale { 
      transform: translateZ(0); 
      transition: transform 160ms ease; 
    }
    .hover-scale:hover { 
      transform: scale(1.02); 
    }
    .hover-scale:active { 
      transform: scale(0.99); 
    }
    .modal-overlay { 
      background: rgba(15, 23, 42, 0.6); 
      backdrop-filter: blur(4px);
    }
    .mono { 
      font-variant-numeric: tabular-nums; 
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; 
    }
    .ring-strong { 
      box-shadow: 0 0 0 3px rgba(99,102,241,0.35); 
    }
    .baseline-safe { 
      line-height: 1.3; 
      padding-bottom: 2px; 
    }
    
    /* Alert styling */
    .alert-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #dc2626;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .low-stock-item {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-left: 4px solid #f59e0b;
    }
    
    .expired-item {
      background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
      border-left: 4px solid #dc2626;
    }
    
    .expiring-soon-item {
      background: linear-gradient(135deg, #fed7aa 0%, #fdba74 100%);
      border-left: 4px solid #ea580c;
    }
    
    /* Enhanced form styling */
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
      line-height: 1.25;
    }
    
    .form-input {
      width: 100%;
      height: 2.75rem;
      padding: 0 0.75rem;
      border: 2px solid #dbeafe;
      border-radius: 0.5rem;
      transition: all 0.15s ease;
      font-size: 0.875rem;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .form-input-icon {
      position: relative;
    }
    
    .form-input-icon input {
      padding-left: 2.5rem;
    }
    
    .form-input-icon .icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6b7280;
      pointer-events: none;
    }
    
    /* Enhanced card styling */
    .info-card {
      padding: 1rem;
      border-radius: 0.75rem;
      background: var(--card-gradient);
      border: 1px solid rgba(59, 130, 246, 0.1);
      box-shadow: 0 4px 16px rgba(30, 58, 138, 0.08);
    }
    
    .info-card-header {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
      line-height: 1.2;
    }
    
    .info-card-value {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.25rem;
    }
    
    /* Enhanced button styling */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.875rem;
      line-height: 1.25;
      transition: all 0.15s ease;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }
    
    .btn-primary {
      background: var(--primary-gradient);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--hover-gradient);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    
    .btn-secondary {
      background: var(--secondary-gradient);
      color: white;
    }
    
    .btn-secondary:hover {
      background: linear-gradient(135deg, #4b5563 0%, #374151 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(107, 114, 128, 0.3);
    }
    
    .btn-success {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: white;
    }
    
    .btn-success:hover {
      background: linear-gradient(135deg, #047857 0%, #065f46 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      color: white;
    }
    
    .btn-danger:hover {
      background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }
    
    .btn-outline {
      background: transparent;
      color: #374151;
      border: 2px solid #d1d5db;
    }
    
    .btn-outline:hover {
      background: #f9fafb;
      border-color: #9ca3af;
      transform: translateY(-1px);
    }
    
    /* Enhanced table styling */
    .data-table {
      width: 100%;
      font-size: 0.875rem;
      border-collapse: collapse;
    }
    
    .data-table th {
      background: #f8fafc;
      padding: 0.75rem 0.5rem;
      text-align: left;
      font-weight: 600;
      color: #374151;
      border-bottom: 2px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .data-table th.text-right {
      text-align: right;
    }
    
    .data-table td {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
    }
    
    .data-table td.text-right {
      text-align: right;
    }
    
    .data-table tbody tr:hover {
      background: #f8fafc;
    }
    
    /* Enhanced product card styling */
    .product-card {
      padding: 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 0.75rem;
      background: white;
      transition: all 0.15s ease;
      cursor: pointer;
      text-align: center;
      position: relative;
    }
    
    .product-card:hover {
      border-color: #3b82f6;
      background: #f0f9ff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
    }
    
    .product-card-name {
      font-weight: 600;
      font-size: 0.875rem;
      color: #1f2937;
      margin-bottom: 0.5rem;
      line-height: 1.25;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .product-card-price {
      background: #dbeafe;
      color: #1d4ed8;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      display: inline-block;
    }
    
    .product-card-stock {
      font-size: 0.625rem;
      color: #6b7280;
      font-weight: 500;
    }

    .product-card-add-icon {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 1.5rem;
      height: 1.5rem;
      background: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    
    .product-card:hover .product-card-add-icon {
      opacity: 1;
    }
    
    /* Cart item styling */
    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      background: white;
      margin-bottom: 0.5rem;
      transition: all 0.15s ease;
    }
    
    .cart-item:hover {
      border-color: #cbd5e1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    
    .cart-item-info {
      flex: 1;
      margin-right: 0.75rem;
    }
    
    .cart-item-name {
      font-weight: 600;
      font-size: 0.875rem;
      color: #1f2937;
      margin-bottom: 0.25rem;
    }
    
    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .qty-input {
      width: 4rem;
      height: 2.25rem;
      padding: 0 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      text-align: center;
      font-size: 0.875rem;
    }
    
    .price-display {
      width: 6rem;
      text-align: right;
      font-family: ui-monospace, monospace;
      font-weight: 600;
      color: #374151;
    }
    
    /* Toast styling */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      color: white;
      font-weight: 600;
      font-size: 0.875rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      backdrop-filter: blur(8px);
      animation: slideUp 0.3s ease;
    }
    
    .toast-success {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }
    
    .toast-error {
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
    }
    
    .toast-warning {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    }
    
    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }
    
    /* Responsive improvements */
    @media (max-width: 768px) {
      .glass-card {
        margin: 0.5rem;
      }
      
      .product-card {
        padding: 0.5rem;
      }
      
      .cart-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      
      .cart-item-controls {
        width: 100%;
        justify-content: space-between;
      }
    }
    
    /* FIXED: Enhanced Modal Scrolling System - UPDATED */
    .modal-content-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      flex: 1;
    }
    
    .modal-table-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .modal-table-wrapper {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: auto;
      position: relative;
    }
    
    .modal-table-wrapper table {
      width: 100%;
      min-width: 100%;
    }
    
    /* NEW: Consistent modal scrolling */
    .modal-content-scrollable {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Remove conflicting max-height restrictions from modals */
    .modal-scrollable-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    
    /* ABC Analysis Colors */
    .abc-class-a { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); color: #047857; }
    .abc-class-b { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); color: #b45309; }
    .abc-class-c { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); color: #b91c1c; }
    
    /* Credit status colors */
    .credit-pending { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); color: #92400e; }
    .credit-partial { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); color: #1e40af; }
    .credit-paid { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); color: #065f46; }
    .credit-overdue { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); color: #b91c1c; }
    
    /* Supplier history and batch tracking styles */
    .supplier-pending { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); color: #92400e; }
    .supplier-partial { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); color: #1e40af; }
    .supplier-paid { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); color: #065f46; }
    .supplier-overdue { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); color: #b91c1c; }
    
    .batch-item { 
        border-left: 4px solid #3b82f6; 
        background: rgba(59, 130, 246, 0.05);
        margin-bottom: 0.5rem;
        padding: 0.5rem;
        border-radius: 0 0.375rem 0.375rem 0;
    }
    
    .batch-low { border-left-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
    .batch-expiring { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
    .batch-expired { border-left-color: #dc2626; background: rgba(220, 38, 38, 0.05); }
    
    /* Scrollbar styling - Consistent across all modals - UPDATED */
    .modal-content-scrollable::-webkit-scrollbar,
    .modal-table-wrapper::-webkit-scrollbar,
    .modal-content-container::-webkit-scrollbar,
    .modal-scrollable::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    .modal-content-scrollable::-webkit-scrollbar-track,
    .modal-table-wrapper::-webkit-scrollbar-track,
    .modal-content-container::-webkit-scrollbar-track,
    .modal-scrollable::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }
    
    .modal-content-scrollable::-webkit-scrollbar-thumb,
    .modal-table-wrapper::-webkit-scrollbar-thumb,
    .modal-content-container::-webkit-scrollbar-thumb,
    .modal-scrollable::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 4px;
    }
    
    .modal-content-scrollable::-webkit-scrollbar-thumb:hover,
    .modal-table-wrapper::-webkit-scrollbar-thumb:hover,
    .modal-content-container::-webkit-scrollbar-thumb:hover,
    .modal-scrollable::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
    
    /* Firefox scrollbar - UPDATED */
    .modal-content-scrollable,
    .modal-table-wrapper,
    .modal-content-container,
    .modal-scrollable {
      scrollbar-width: thin;
      scrollbar-color: #c1c1c1 #f1f1f1;
    }
    
    /* Zoom controls styling */
    .zoom-controls {
      position: fixed;
      top: 100px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(0, 0, 0, 0.1);
    }
    
    .zoom-controls button {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: white;
      color: #374151;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .zoom-controls button:hover {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
    }
    
    .zoom-level {
      font-size: 12px;
      text-align: center;
      padding: 5px;
      background: #f8fafc;
      border-radius: 6px;
      margin-top: 5px;
      font-family: ui-monospace, monospace;
    }
    
    /* Fullscreen styling */
    :fullscreen .zoom-controls {
      top: 20px;
    }
    
    :-webkit-full-screen .zoom-controls {
      top: 20px;
    }
    
    :-moz-full-screen .zoom-controls {
      top: 20px;
    }

    /* ===== SIDEBAR STYLES ===== */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 260px;
      background: var(--sidebar-gradient);
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
      z-index: 50;
      transition: transform 0.3s ease;
      overflow-y: auto;
    }

    .sidebar-closed {
      transform: translateX(-260px);
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sidebar-logo img {
      height: 40px;
      width: auto;
      border-radius: 8px;
    }

    .sidebar-logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #93c5fd 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sidebar-nav {
      padding: 1rem 0;
    }

    .nav-section {
      margin-bottom: 1.5rem;
    }

    .nav-title {
      padding: 0 1.5rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.5);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border-right: 4px solid #60a5fa;
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-text {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .nav-badge {
      margin-left: auto;
      background: #ef4444;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      min-width: 20px;
      text-align: center;
    }

    .sidebar-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: white;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.875rem;
    }

    .user-details {
      flex: 1;
    }

    .user-name {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .user-role {
      font-size: 0.75rem;
      opacity: 0.8;
    }

    /* Mobile sidebar toggle */
    .sidebar-toggle {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 60;
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: 0.5rem;
      width: 40px;
      height: 40px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    /* Main content area */
    .main-content {
      margin-left: 260px;
      transition: margin-left 0.3s ease;
    }

    .main-content-full {
      margin-left: 0;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--card-gradient);
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid rgba(59, 130, 246, 0.1);
      box-shadow: 0 4px 12px rgba(30, 58, 138, 0.08);
    }

    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .stat-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 0.75rem;
      display: flex;

/* ---------- Time helpers (monthly files) ---------- */
function monthKey(d=new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2, "0");
  return `${y}_${m}`;
}
function prevMonthKey(d=new Date()) {
  const prev = new Date(d.getFullYear(), d.getMonth()-1, 1);
  return monthKey(prev);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString();
}

function isExpired(expirationDate) {
  if (!expirationDate) return false;
  return new Date(expirationDate) < new Date();
}

function isExpiringSoon(expirationDate, days = 7) {
  if (!expirationDate) return false;
  const expDate = new Date(expirationDate);
  const warningDate = new Date();
  warningDate.setDate(warningDate.getDate() + days);
  return expDate <= warningDate && expDate >= new Date();
}

function getDaysBetween(date1, date2) {
  const oneDay = 24 * 60 * 60 * 1000;
  return Math.round((new Date(date1) - new Date(date2)) / oneDay);
}

/* ---------- Sales CSV (with buy_price & profit & user info & payment method & credit_id) ---------- */
function parseSalesCSV(text) {
  const lines = text.split(/\r?\n/).filter((l) => l.trim());
  if (lines.length === 0) return [];
  const headers = lines[0].split(",").map((h) => h.trim().toLowerCase());
  const idxTimestamp = headers.indexOf("timestamp");
  const idxReceipt = headers.indexOf("receipt_number");
  const idxTeller = headers.indexOf("teller_number");
  const idxUser = headers.indexOf("user_name");
  const idxBarcode = headers.indexOf("barcode");
  const idxName = headers.indexOf("name");
  const idxPrice = headers.indexOf("price");
  const idxQuantity = headers.indexOf("quantity");
  const idxTotal = headers.indexOf("total");
  const idxBuy = headers.indexOf("buy_price");
  const idxProfit = headers.indexOf("profit");
  const idxPaymentMethod = headers.indexOf("payment_method");
  const idxCreditId = headers.indexOf("credit_id");
  const idxPaymentDate = headers.indexOf("payment_date");
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVRow(lines[i]);
    const timestamp = idxTimestamp >= 0 ? (cols[idxTimestamp] || "").trim() : "";
    const receipt = idxReceipt >= 0 ? (cols[idxReceipt] || "").trim() : "";
    const teller = idxTeller >= 0 ? (cols[idxTeller] || "").trim() : "";
    const user_name = idxUser >= 0 ? (cols[idxUser] || "").trim() : "";
    const barcode = idxBarcode >= 0 ? (cols[idxBarcode] || "").trim() : "";
    const name = idxName >= 0 ? (cols[idxName] || "").trim() : "";
    const price = idxPrice >= 0 ? Number((cols[idxPrice] || "").trim()) : NaN;
    const quantity = idxQuantity >= 0 ? Number((cols[idxQuantity] || "").trim()) : NaN;
    const total = idxTotal >= 0 ? Number((cols[idxTotal] || "").trim()) : NaN;
    const buy_price = idxBuy >= 0 ? Number((cols[idxBuy] || "").trim()) : 0;
    const profit = idxProfit >= 0 ? Number((cols[idxProfit] || "").trim()) : (price - buy_price) * quantity;
    const payment_method = idxPaymentMethod >= 0 ? (cols[idxPaymentMethod] || "").trim() : "cash";
    const credit_id = idxCreditId >= 0 ? (cols[idxCreditId] || "").trim() : "";
    const payment_date = idxPaymentDate >= 0 ? (cols[idxPaymentDate] || "").trim() : "";
    
    if (timestamp && receipt && teller && barcode && name && !Number.isNaN(price) && !Number.isNaN(quantity) && !Number.isNaN(total)) {
      out.push({ 
        timestamp, 
        receipt_number: receipt, 
        teller_number: teller, 
        user_name: user_name || "Unknown", 
        barcode, 
        name, 
        price, 
        quantity, 
        total, 
        buy_price, 
        profit, 
        payment_method,
        credit_id,
        payment_date
      });
    }
  }
  return out;
}

function salesToCSV(sales) {
  const header = "timestamp,receipt_number,teller_number,user_name,barcode,name,price,quantity,total,buy_price,profit,payment_method,credit_id,payment_date";
  const esc = (v) => {
    const s = String(v || "");
    return /[\",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const body = sales
    .map((s) => [
      esc(s.timestamp), 
      esc(s.receipt_number), 
      esc(s.teller_number), 
      esc(s.user_name || "Unknown"), 
      esc(s.barcode), 
      esc(s.name), 
      esc(s.price), 
      esc(s.quantity), 
      esc(s.total), 
      esc(s.buy_price ?? 0), 
      esc(s.profit ?? ((s.price - (s.buy_price ?? 0)) * s.quantity)),
      esc(s.payment_method || "cash"),
      esc(s.credit_id || ""),
      esc(s.payment_date || "")
    ].join(","))
    .join("\n");
  return header + "\n" + body + "\n";
}

function splitCSVRow(row) {
  const result = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') {
      if (inQuotes && row[i + 1] === '"') { cur += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (ch === ',' && !inQuotes) { result.push(cur); cur = ""; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

function parseUsersCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) return DEFAULT_USERS;
  const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
  const H = n => headers.indexOf(n);
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVRow(lines[i]);
    const user = {
      id: Number((cols[H("id")] || "0").trim()),
      username: (cols[H("username")] || "").trim(),
      password: (cols[H("password")] || "").trim(),
      name: (cols[H("name")] || "").trim(),
      role: (cols[H("role")] || "teller").trim(),
      created: (cols[H("created")] || new Date().toISOString()).trim(),
    };
    if (user.username && user.password) out.push(user);
  }
  return out.length > 0 ? out : DEFAULT_USERS;
}

function usersToCSV(users) {

/* ---------- Dashboard Component ---------- */
function Dashboard({ 
  products, 
  sales, 
  alerts,
  credits,
  suppliers,
  onNavClick
}) {
  const totalRevenue = useMemo(() => sales.reduce((sum, sale) => sum + sale.total, 0), [sales]);
  const totalItems = useMemo(() => sales.reduce((sum, sale) => sum + sale.quantity, 0), [sales]);
  const totalProfit = useMemo(() => sales.reduce((sum, s) => sum + (s.profit || 0), 0), [sales]);
  const pendingCredit = useMemo(() => credits.reduce((sum, c) => sum + c.balance_amount, 0), [credits]);
  
  const recentSales = useMemo(() => {
    return [...sales]
      .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
      .slice(0, 5);
  }, [sales]);
  
  const topProducts = useMemo(() => {
    const productMap = new Map();
    sales.forEach(sale => {
      const key = sale.barcode;
      if (!productMap.has(key)) {
        productMap.set(key, {
          barcode: sale.barcode,
          name: sale.name,
          quantity: 0,
          revenue: 0
        });
      }
      const product = productMap.get(key);
      product.quantity += sale.quantity;
      product.revenue += sale.total;
    });
    
    return Array.from(productMap.values())
      .sort((a, b) => b.revenue - a.revenue)
      .slice(0, 5);
  }, [sales]);
  
  const lowStockProducts = useMemo(() => {
    return products.filter(p => {
      const qty = Number(p.available_stock) || 0;
      const reorderLevel = Number(p.reorder_level) || 0;
      return qty <= reorderLevel && reorderLevel > 0;
    }).slice(0, 5);
  }, [products]);

  return (
    <div className="p-6">
      <div className="mb-8">
        <h1 className="text-3xl font-bold text-slate-800">Dashboard Overview</h1>
        <p className="text-slate-600">Welcome to Profit Point POS - Your complete retail management solution</p>
      </div>
      
      {/* Stats Cards */}
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-header">
            <div className="stat-title">Total Revenue</div>
            <div className="stat-icon">
              <DollarIcon />
            </div>
          </div>
          <div className="stat-value">TSH {totalRevenue.toLocaleString()}</div>
          <div className="stat-change positive">+12.5% from last month</div>
        </div>
        
        <div className="stat-card">
          <div className="stat-header">
            <div className="stat-title">Items Sold</div>
            <div className="stat-icon">
              <PackageIcon />
            </div>
          </div>
          <div className="stat-value">{totalItems.toLocaleString()}</div>
          <div className="stat-change positive">+8.2% from last month</div>
        </div>
        
        <div className="stat-card">
          <div className="stat-header">
            <div className="stat-title">Total Profit</div>
            <div className="stat-icon">
              <TrendingUpIcon />
            </div>
          </div>
          <div className="stat-value">TSH {totalProfit.toLocaleString()}</div>
          <div className="stat-change positive">+15.3% from last month</div>
        </div>
        
        <div className="stat-card">
          <div className="stat-header">
            <div className="stat-title">Pending Credit</div>
            <div className="stat-icon">
              <CreditIcon />
            </div>
          </div>
          <div className="stat-value">TSH {pendingCredit.toLocaleString()}</div>
          <div className="stat-change negative">-3.1% from last month</div>
        </div>
      </div>
      
      <div className="grid lg:grid-cols-2 gap-6 mt-8">
        {/* Recent Sales */}
        <div className="recent-sales">
          <div className="section-header">
            <h2 className="section-title">Recent Sales</h2>
            <button 
              onClick={() => onNavClick('sales')}
              className="btn btn-outline text-sm"
            >
              View All
            </button>
          </div>
          <div className="overflow-x-auto">
            <table className="data-table">
              <thead>
                <tr>
                  <th>Receipt #</th>
                  <th>Customer</th>
                  <th>Amount</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>
                {recentSales.map((sale, index) => (
                  <tr key={index}>
                    <td style={{fontFamily: 'ui-monospace, monospace'}}>{sale.receipt_number}</td>
                    <td>{sale.user_name}</td>
                    <td>TSH {sale.total.toLocaleString()}</td>
                    <td>{new Date(sale.timestamp).toLocaleDateString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        
        {/* Top Products */}
        <div className="recent-sales">
          <div className="section-header">
            <h2 className="section-title">Top Selling Products</h2>
            <button 
              onClick={() => onNavClick('inventory')}
              className="btn btn-outline text-sm"
            >
              View All
            </button>
          </div>
          <div className="overflow-x-auto">
            <table className="data-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Quantity</th>
                  <th>Revenue</th>
                </tr>
              </thead>
              <tbody>
                {topProducts.map((product, index) => (
                  <tr key={index}>
                    <td>{product.name}</td>
                    <td>{product.quantity}</td>
                    <td>TSH {product.revenue.toLocaleString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
      
      {/* Alerts Section */}
      {alerts.total > 0 && (
        <div className="mt-8">
          <div className="recent-sales">
            <div className="section-header">
              <h2 className="section-title">Inventory Alerts</h2>
              <button 
                onClick={() => onNavClick('inventory')}
                className="btn btn-outline text-sm"
              >
                View All
              </button>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {alerts.lowStock > 0 && (
                <div className="p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
                  <div className="flex items-center gap-3">
                    <AlertIcon />
                    <div>
                      <h3 className="font-semibold text-yellow-800">Low Stock</h3>
                      <p className="text-sm text-yellow-700">{alerts.lowStock} products need restocking</p>
                    </div>
                  </div>
                </div>
              )}
              
              {alerts.expiring > 0 && (
                <div className="p-4 bg-orange-50 border border-orange-200 rounded-lg">
                  <div className="flex items-center gap-3">
                    <ClockIcon />
                    <div>
                      <h3 className="font-semibold text-orange-800">Expiring Soon</h3>
                      <p className="text-sm text-orange-700">{alerts.expiring} products expiring soon</p>
                    </div>
                  </div>
                </div>
              )}
              
              {alerts.expired > 0 && (
                <div className="p-4 bg-red-50 border border-red-200 rounded-lg">
                  <div className="flex items-center gap-3">
                    <AlertIcon />
                    <div>
                      <h3 className="font-semibold text-red-800">Expired Products</h3>
                      <p className="text-sm text-red-700">{alerts.expired} products have expired</p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- Point of Sale Component ---------- */
function PointOfSale({ 
  products, 
  cart, 
  barcode, 
  setBarcode, 
  descQuery, 
  setDescQuery, 
  onAddToCart, 
  onUpdateQuantity, 
  onRemoveItem, 
  onClearCart, 
  onProcessPayment,
  onBarcodeSubmit,
  barcodeInputRef,
  productsMap,
  isManager,
  alerts,
  onViewBatches
}) {
  const getTotalAmount = () => cart.reduce((s, i) => s + i.qty * i.price, 0);
  
  return (
    <div className="p-6">
      <div className="mb-8">
        <h1 className="text-3xl font-bold text-slate-800">Point of Sale</h1>
        <p className="text-slate-600">Quick and efficient checkout system</p>
      </div>
      
      <div className="grid lg:grid-cols-3 gap-8">
        {/* Left Panel - Barcode Scanner & Products */}
        <div className="lg:col-span-2 space-y-8">
          {/* Barcode Scanner */}
          <div className="glass-card rounded-xl shadow-lg p-6 hover-scale">
            <div className="flex items-center gap-3 text-slate-700 mb-6">
              <BarcodeIcon />
              <h3 className="text-xl font-semibold">Barcode Scanner</h3>
            </div>
            <form onSubmit={onBarcodeSubmit} className="flex gap-4">
              <input 
                ref={barcodeInputRef} 
                value={barcode} 
                onChange={(e) => setBarcode(e.target.value)} 
                placeholder="Scan or type barcode to add to cart" 
                className="form-input flex-1 text-lg h-14" 
              />
              <button type="submit" className="btn btn-primary px-6 h-14 text-lg">
                <CartIcon />
              </button>
            </form>
            <div className="mt-4">
              <input 
                list="desc-suggestions"
                value={descQuery}
                onChange={(e) => {
                  const v = e.target.value;
                  setDescQuery(v);
                  if (v.includes("—")) {
                    const bc = v.split("—")[0].trim();
                    if (productsMap.has(bc)) {
                      onAddToCart(bc);
                      setDescQuery("");
                      setTimeout(() => {
                        if (barcodeInputRef.current) barcodeInputRef.current.focus();
                      }, 50);
                    }
                  }
                }}
                placeholder="Type description, name, or barcode and pick…"
                className="form-input w-full"
              />
              <datalist id="desc-suggestions">
                {products.map((p) => (
                  <option
                    key={p.barcode}
                    value={`${p.barcode} — ${p.name}`}
                  />
                ))}
              </datalist>
            </div>

            {barcode && !productsMap.has(barcode.trim()) && (
              <div className="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg">
                <p className="text-sm text-amber-800">
                  <strong>Product not found.</strong> Press the cart icon to create a new product with this barcode.
                </p>
              </div>
            )}
          </div>

          {/* Quick Access Products */}
          <div className="glass-card rounded-xl shadow-lg p-6">
            <h3 className="text-xl font-semibold text-slate-700 mb-6">Quick Access Products</h3>
            {products.length === 0 ? (
              <div className="text-center py-12 text-slate-500">
                <p className="text-lg mb-2">No products available</p>
                <p className="text-sm">
                  {isManager ? "Load a products CSV file to see quick access items." : "Contact manager to load products."}
                </p>
              </div>
            ) : (
              <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4">
                {products.slice(0, 12).map((p) => {
                  const getAlertClass = (p) => {
                    if (p.expiration_date && isExpired(p.expiration_date)) {
                      return "expired-item";
                    }
                    if (p.expiration_date && isExpiringSoon(p.expiration_date)) {
                      return "expiring-soon-item";
                    }
                    if (Number(p.available_stock) <= Number(p.reorder_level) && Number(p.reorder_level) > 0) {
                      return "low-stock-item";
                    }
                    return "";
                  };
                  const alertClass = getAlertClass(p);
                  const isAlert = alertClass !== "";
                  
                  return (
                    <div 
                      key={p.barcode} 
                      className={`product-card ${alertClass}`} 
                      onClick={() => {
                        if (p.batches && p.batches.length > 0) {
                          onViewBatches(p);
                        } else {
                          onAddToCart(p.barcode);
                        }
                      }}
                      onDoubleClick={() => {
                        onAddToCart(p.barcode);
                      }}
                      title={p.batches && p.batches.length > 0 ? "Click to view batches, double-click to add to cart" : "Click to add to cart"}
                    >
                      <div className="product-card-name">{p.name}</div>
                      <div className="product-card-price">TSH {Number(p.price).toLocaleString()}</div>
                      <div className="product-card-stock">
                        Stock: {Number(p.available_stock||0).toLocaleString()}
                        {p.batches && p.batches.length > 0 && (
                          <div className="text-xs mt-1">
                            Batches: {p.batches.length}
                          </div>
                        )}
                        {p.expiration_date && (
                          <div className="text-xs mt-1">
                            Exp: {formatDate(p.expiration_date)}
                          </div>
                        )}
                      </div>
                      {isAlert && (
                        <div className="absolute top-1 left-1">
                          <AlertIcon />
                        </div>
                      )}
                      <div className="product-card-add-icon">
                        <PlusIcon />
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>

        {/* Right Panel - Cart */}
        <div className="space-y-8">
          <div className="glass-card rounded-xl shadow-lg p-6">
            <h3 className="text-xl font-semibold text-slate-700 mb-6">Shopping Cart</h3>
            
            {cart.length === 0 ? (
              <div className="text-center py-12 text-slate-500">
                <div className="mb-4">

/* ---------- Zoom Controls Component ---------- */
function ZoomControls() {
  const [zoomLevel, setZoomLevel] = useState(100);
  const [isFullscreen, setIsFullscreen] = useState(false);

  const zoomIn = () => {
    if (zoomLevel < 200) {
      const newZoom = Math.min(200, zoomLevel + 10);
      setZoomLevel(newZoom);
      document.body.style.transform = `scale(${newZoom / 100})`;
      document.body.style.transformOrigin = 'top left';
      document.body.style.width = `${100 / (newZoom / 100)}%`;
    }
  };

  const zoomOut = () => {
    if (zoomLevel > 50) {
      const newZoom = Math.max(50, zoomLevel - 10);
      setZoomLevel(newZoom);
      document.body.style.transform = `scale(${newZoom / 100})`;
      document.body.style.transformOrigin = 'top left';
      document.body.style.width = `${100 / (newZoom / 100)}%`;
    }
  };

  const resetZoom = () => {
    setZoomLevel(100);
    document.body.style.transform = 'scale(1)';
    document.body.style.transformOrigin = 'top left';
    document.body.style.width = '100%';
  };

  const toggleFullscreen = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        console.error(`Error attempting to enable fullscreen: ${err.message}`);
      });
      setIsFullscreen(true);
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
        setIsFullscreen(false);
      }
    }
  };

  // Listen for fullscreen change
  useEffect(() => {
    const handleFullscreenChange = () => {
      setIsFullscreen(!!document.fullscreenElement);
    };

    document.addEventListener('fullscreenchange', handleFullscreenChange);
    return () => {
      document.removeEventListener('fullscreenchange', handleFullscreenChange);
    };
  }, []);

  return (
    <div className="zoom-controls">
      <button onClick={zoomIn} title="Zoom In (Ctrl +)">
        <ZoomInIcon />
      </button>
      <button onClick={zoomOut} title="Zoom Out (Ctrl -)">
        <ZoomOutIcon />
      </button>
      <button onClick={resetZoom} title="Reset Zoom (Ctrl 0)">
        <div style={{ fontSize: '14px', fontWeight: 'bold' }}>100%</div>
      </button>
      <button onClick={toggleFullscreen} title={isFullscreen ? "Exit Fullscreen (F11)" : "Enter Fullscreen (F11)"}>
        <FullscreenIcon />
      </button>
      <div className="zoom-level">{zoomLevel}%</div>
    </div>
  );
}

function PaymentTypeModal({ total, onClose, onConfirm }) {

  const [customerName, setCustomerName] = useState("");

    if (paymentMethod !== "cash") return 0;
    const received = parseFloat(cashReceived) || 0;
    return Math.max(0, received - total);

  const change = calculateChange();

  // Set default due date to 30 days from now

    if (paymentMethod === "credit" && !dueDate) {

/* ---------- Updated Receipt/Invoice Builder ---------- */
function buildReceiptHTML(items, paymentDetails, isInvoice = false) {
  const subtotal = items.reduce((s,i)=> s + (Number(i.qty)||0) * (Number(i.price)||0), 0);
  const total = subtotal;
  const change = paymentDetails?.change || 0;
  const cashReceived = paymentDetails?.cashReceived || 0;
  
  const rows = items.map(i => {
    const qty = Number(i.qty)||0;
    const price = Number(i.price)||0;
    const line = qty * price;
    const safeName = String(i.name ?? "").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return `<tr>
      <td class="desc">${safeName}</td>
      <td class="qty" style="text-align:right">${qty}</td>
      <td class="price" style="text-align:right">TSH ${price.toLocaleString()}</td>
      <td class="total" style="text-align:right">TSH ${line.toLocaleString()}</td>
    </tr>`;
  }).join("");
  
  const now = new Date();
  const datetimeStr = now.toLocaleString();
  const storedUser = localStorage.getItem("pos_current_user");
  let cashierName = "Unknown";
  try { cashierName = storedUser ? (JSON.parse(storedUser).name || "Unknown") : "Unknown"; } catch (e) {}

  const docType = isInvoice ? "INVOICE" : "RECEIPT";
  const title = isInvoice 
    ? `<h1>COMMERCIAL INVOICE</h1>`
    : `<h1>SALES RECEIPT</h1>`;

  const paymentSection = paymentDetails.method === "cash" ? `
    <p class="meta">Payment Method: CASH</p>
    <p class="meta">Cash Received: TSH ${cashReceived.toLocaleString()}</p>
    <p class="meta">Change: TSH ${change.toLocaleString()}</p>
  ` : paymentDetails.method === "credit" ? `
    <p class="meta">Payment Method: CREDIT</p>
    ${paymentDetails.customerName ? `<p class="meta">Customer: ${paymentDetails.customerName}</p>` : ''}
    ${paymentDetails.customerPhone ? `<p class="meta">Phone: ${paymentDetails.customerPhone}</p>` : ''}
    ${paymentDetails.dueDate ? `<p class="meta">Due Date: ${new Date(paymentDetails.dueDate).toLocaleDateString()}</p>` : ''}
    <p class="meta">Total Amount: TSH ${total.toLocaleString()}</p>
    <p class="meta">Status: PENDING PAYMENT</p>
  ` : `
    <p class="meta">Payment Method: CARD</p>
  `;

  return `<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>${docType}</title>
  <style>
    body{
      font:14px/1.4 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      padding:16px;
      max-width:300px;

    h1{font-size:18px;margin:0 0 8px;text-align:center; font-weight: bold;}
    table{width:100%;border-collapse:collapse;margin-top:8px}
    th,td{padding:4px 0;border-bottom:1px dashed #999;text-align:left}
    thead th{font-weight:700}
    tfoot td{font-weight:700;border-top:2px solid #000}
    table, table th, table td, .desc, .qty, .price, .total { font-size:12px !important; }
    .meta{ text-align:center; margin:4px 0; font-size:12px; }
    .logo{ display:block; margin:0 auto 6px auto; width:72px; height:auto; }
    .total-row { font-weight: bold; background-color: #f0f0f0; }
  </style>
</head>
<body>
  <img src="Zabbb Phone Accesories.jpeg" alt="Zabbb Phone Accesories Logo" class="logo">
  ${title}
  <p class="meta">Profit Point POS - Advanced Retail Management</p>
  <p class="meta">Mobile: 0768 493 260</p>
  <p class="meta">${docType} #: ${paymentDetails.receiptNumber || ''}</p>
  <p class="meta">Date &amp; Time: ${datetimeStr}</p>
  <p class="meta">Cashier: ${cashierName} • Teller ${TELLER_NUMBER}</p>
  ${paymentSection}

  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th style="text-align:right">Qty</th>
        <th style="text-align:right">Price</th>

    </thead>
    <tbody>${rows}</tbody>
    <tfoot>

        <td colspan="3">Subtotal</td>

  <p class="meta">"We love to serve you"</p>

function printReceiptOrInvoice(items, paymentDetails, isInvoice = false) {
  const w = window.open("", "_blank", "width=400,height=600");
  const html = buildReceiptHTML(items, paymentDetails, isInvoice);
  w.document.open(); 
  w.document.write(html); 
  w.document.close();
  w.focus(); 
  setTimeout(() => {
    w.print(); 
    w.close();
  }, 500);
}

/* ---------- User Management Modal ---------- */
function UserManagementModal({ users, onClose, onSave, currentUser }) {
  const [userList, setUserList] = useState(users);
  const [showAdd, setShowAdd] = useState(false);
  const [editingUser, setEditingUser] = useState(null);
  const [newUser, setNewUser] = useState({ username: "", password: "", name: "", role: "teller" });

  const addUser = () => {
    if (!newUser.username || !newUser.password || !newUser.name) {
      alert("Please fill all required fields");
      return;
    }
    
    if (userList.find(u => u.username === newUser.username)) {
      alert("Username already exists");
      return;
    }
    
    const user = {
      id: Math.max(...userList.map(u => u.id), 0) + 1,
      ...newUser,
      created: new Date().toISOString()
    };
    
    const updated = [...userList, user];
    setUserList(updated);
    onSave(updated);
    setNewUser({ username: "", password: "", name: "", role: "teller" });
    setShowAdd(false);
  };

  const updateUser = (id, updates) => {
    const updated = userList.map(u => u.id === id ? { ...u, ...updates } : u);
    setUserList(updated);
    onSave(updated);
    setEditingUser(null);
  };

  const deleteUser = (id) => {
    if (id === currentUser.id) {
      alert("Cannot delete your own account");
      return;
    }
    if (!confirm("Are you sure you want to delete this user?")) return;
    const updated = userList.filter(u => u.id !== id);
    setUserList(updated);
    onSave(updated);
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-4xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">User Management</h2>
            <p className="text-slate-600">Manage system users and their access</p>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={() => setShowAdd(true)} className="btn btn-primary">
              <PlusIcon /> Add User
            </button>
            <button onClick={onClose} className="btn btn-outline">
              Close
            </button>
          </div>
        </div>

        {showAdd && (
          <div className="mb-6 p-4 border border-slate-200 rounded-lg bg-slate-50">
            <h3 className="font-semibold mb-4">Add New User</h3>
            <div className="grid md:grid-cols-4 gap-4">
              <input
                value={newUser.username}
                onChange={(e) => setNewUser({...newUser, username: e.target.value})}
                className="form-input"
                placeholder="Username"
              />
              <input
                value={newUser.password}
                onChange={(e) => setNewUser({...newUser, password: e.target.value})}
                className="form-input"
                placeholder="Password"
                type="password"
              />
              <input
                value={newUser.name}
                onChange={(e) => setNewUser({...newUser, name: e.target.value})}
                className="form-input"
                placeholder="Full Name"
              />
              <select
                value={newUser.role}
                onChange={(e) => setNewUser({...newUser, role: e.target.value})}
                className="form-input"
              >
                <option value="teller">Teller</option>
                <option value="manager">Manager</option>
              </select>
            </div>
            <div className="flex items-center gap-3 mt-4">
              <button onClick={addUser} className="btn btn-success">Save</button>
              <button onClick={() => setShowAdd(false)} className="btn btn-outline">Cancel</button>
            </div>
          </div>
        )}

        <div className="modal-content-scrollable">
          <div className="modal-table-container">
            <div className="modal-table-wrapper">
              <table className="data-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Created</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {userList.map((user) => (
                    <tr key={user.id}>
                      <td>{user.id}</td>
                      <td>{user.username}</td>
                      <td>
                        {editingUser === user.id ? (
                          <input
                            defaultValue={user.name}
                            className="form-input"
                            onBlur={(e) => updateUser(user.id, { name: e.target.value })}
                          />
                        ) : (
                          user.name
                        )}
                      </td>
                      <td>
                        {editingUser === user.id ? (
                          <select
                            defaultValue={user.role}
                            className="form-input"
                            onChange={(e) => updateUser(user.id, { role: e.target.value })}
                          >
                            <option value="teller">Teller</option>
                            <option value="manager">Manager</option>
                          </select>
                        ) : (
                          <span className={`px-2 py-1 rounded text-xs font-medium ${
                            user.role === 'manager' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800'
                          }`}>
                            {user.role}
                        </span>
                        )}
                      </td>
                      <td>{formatDate(user.created)}</td>
                      <td>
                        <div className="flex items-center gap-2">
                          {editingUser === user.id ? (
                            <button onClick={() => setEditingUser(null)} className="btn btn-outline text-xs px-2 py-1">Done</button>
                          ) : (
                            <button onClick={() => setEditingUser(user.id)} className="btn btn-secondary text-xs px-2 py-1">Edit</button>
                          )}
                          <button
                            onClick={() => {
                              const newPassword = prompt("Enter new password:");
                              if (newPassword) updateUser(user.id, { password: newPassword });
                            }}
                            className="btn btn-primary text-xs px-2 py-1"
                          >
                            Reset Password
                          </button>
                          {user.id !== currentUser.id && (
                            <button onClick={() => deleteUser(user.id)} className="btn btn-danger text-xs px-2 py-1">Delete</button>
                          )}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Employee Performance Modal ---------- */
function EmployeePerformanceModal({ sales, users, onClose }) {
  const [dateRange, setDateRange] = useState("today");
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");

  const filteredSales = useMemo(() => {
    const now = new Date();
    let from, to;
    
    switch (dateRange) {
      case "today":
        from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        to = new Date(from.getTime() + 24 * 60 * 60 * 1000);
        break;
      case "week":
        from = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        to = now;
        break;
      case "month":
        from = new Date(now.getFullYear(), now.getMonth(), 1);
        to = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        break;
      case "year":
        from = new Date(now.getFullYear(), 0, 1);
        to = new Date(now.getFullYear() + 1, 0, 0);
        break;
      case "custom":
        from = startDate ? new Date(startDate) : new Date(0);
        to = endDate ? new Date(endDate + "T23:59:59") : new Date();
        break;
      default:
        return sales;
    }
    
    return sales.filter(s => {
      const date = new Date(s.timestamp);
      return date >= from && date <= to;
    });
  }, [sales, dateRange, startDate, endDate]);

  const performanceData = useMemo(() => {
    const userMap = new Map(users.map(u => [u.name, u]));
    const data = new Map();
    
    filteredSales.forEach(sale => {
      const userName = sale.user_name || "Unknown";
      if (!data.has(userName)) {
        data.set(userName, {
          name: userName,
          role: userMap.get(userName)?.role || "Unknown",
          totalSales: 0,
          totalRevenue: 0,
          totalProfit: 0,
          itemsSold: 0,
          transactions: new Set()
        });
      }
      
      const user = data.get(userName);
      user.totalSales += 1;
      user.totalRevenue += sale.total;
      user.totalProfit += sale.profit || 0;
      user.itemsSold += sale.quantity;
      user.transactions.add(sale.receipt_number);
    });
    
    return Array.from(data.values()).map(user => ({
      ...user,
      transactionCount: user.transactions.size,
      avgTransaction: user.transactionCount > 0 ? user.totalRevenue / user.transactionCount : 0
    })).sort((a, b) => b.totalRevenue - a.totalRevenue);
  }, [filteredSales, users]);

  const totalMetrics = useMemo(() => {
    return performanceData.reduce((acc, user) => ({
      totalRevenue: acc.totalRevenue + user.totalRevenue,
      totalProfit: acc.totalProfit + user.totalProfit,
      totalItems: acc.totalItems + user.itemsSold,
      totalTransactions: acc.totalTransactions + user.transactionCount
    }), { totalRevenue: 0, totalProfit: 0, totalItems: 0, totalTransactions: 0 });
  }, [performanceData]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-6xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Employee Performance</h2>
            <p className="text-slate-600">Track sales performance by team member</p>
          </div>
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
        </div>

        <div className="flex flex-wrap items-center gap-4 mb-6">
          <select
            value={dateRange}
            onChange={(e) => setDateRange(e.target.value)}
            className="form-input w-auto"
          >
            <option value="today">Today</option>
            <option value="week">Last 7 Days</option>
            <option value="month">This Month</option>
            <option value="year">This Year</option>
            <option value="custom">Custom Range</option>
          </select>
          
          {dateRange === "custom" && (
            <>
              <input
                type="date"
                value={startDate}
                onChange={(e) => setStartDate(e.target.value)}
                className="form-input w-auto"
              />
              <input
                type="date"
                value={endDate}
                onChange={(e) => setEndDate(e.target.value)}
                className="form-input w-auto"
              />
            </>
          )}
        </div>

        <div className="grid md:grid-cols-4 gap-4 mb-6">
          <div className="info-card" style={{background: 'linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%)'}}>
            <div className="info-card-header" style={{color: '#1e40af'}}>Total Revenue</div>
            <div className="info-card-value" style={{color: '#1d4ed8'}}>TSH {totalMetrics.totalRevenue.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)'}}>
            <div className="info-card-header" style={{color: '#065f46'}}>Total Profit</div>
            <div className="info-card-value" style={{color: '#047857'}}>TSH {totalMetrics.totalProfit.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)'}}>
            <div className="info-card-header" style={{color: '#92400e'}}>Items Sold</div>
            <div className="info-card-value" style={{color: '#b45309'}}>{totalMetrics.totalItems.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%)'}}>
            <div className="info-card-header" style={{color: '#3730a3'}}>Transactions</div>
            <div className="info-card-value" style={{color: '#4338ca'}}>{totalMetrics.totalTransactions.toLocaleString()}</div>
          </div>
        </div>

        <div className="modal-content-scrollable">
          <div className="modal-table-container">
            <div className="modal-table-wrapper">
              <table className="data-table">
                <thead>
                  <tr>
                    <th>Employee</th>
                    <th>Role</th>
                    <th className="text-right">Revenue</th>
                    <th className="text-right">Profit</th>
                    <th className="text-right">Items Sold</th>
                    <th className="text-right">Transactions</th>
                    <th className="text-right">Avg Transaction</th>
                    <th className="text-right">Performance</th>
                  </tr>
                </thead>
                <tbody>
                  {performanceData.map((user, index) => {
                    const performanceScore = totalMetrics.totalRevenue > 0 ? (user.totalRevenue / totalMetrics.totalRevenue * 100) : 0;
                    return (
                      <tr key={user.name}>
                        <td>
                          <div className="flex items-center gap-2">
                            <div className={`w-3 h-3 rounded-full ${
                              index === 0 ? 'bg-yellow-400' : index === 1 ? 'bg-gray-400' : index === 2 ? 'bg-orange-400' : 'bg-blue-400'
                            }`}></div>
                            {user.name}
                          </div>
                        </td>
                        <td>
                          <span className={`px-2 py-1 rounded text-xs font-medium ${
                            user.role === 'manager' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800'
                          }`}>
                            {user.role}
                        </span>
                        </td>
                        <td className="text-right">TSH {user.totalRevenue.toLocaleString()}</td>
                        <td className="text-right">TSH {user.totalProfit.toLocaleString()}</td>
                        <td className="text-right">{user.itemsSold.toLocaleString()}</td>
                        <td className="text-right">{user.transactionCount.toLocaleString()}</td>
                        <td className="text-right">TSH {user.avgTransaction.toLocaleString()}</td>
                        <td className="text-right">
                          <div className="flex items-center justify-end gap-2">
                            <div className="w-16 h-2 bg-gray-200 rounded-full">
                              <div 
                                className="h-2 bg-blue-500 rounded-full" 
                                style={{ width: `${Math.min(100, performanceScore)}%` }}
                              ></div>
                            </div>
                            <span className="text-sm font-medium">{performanceScore.toFixed(1)}%</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- ABC Analysis Modal ---------- */
function ABCAnalysisModal({ products, sales, onClose }) {
  const abcData = useMemo(() => {
    const salesByProduct = new Map();
    
    sales.forEach(sale => {
      const key = sale.barcode;
      if (!salesByProduct.has(key)) {
        salesByProduct.set(key, {
          barcode: sale.barcode,
          name: sale.name,
          totalRevenue: 0,
          totalQuantity: 0
        });
      }
      const product = salesByProduct.get(key);
      product.totalRevenue += sale.total;
      product.totalQuantity += sale.quantity;
    });
    
    const productData = Array.from(salesByProduct.values())
      .sort((a, b) => b.totalRevenue - a.totalRevenue);
    
    const totalRevenue = productData.reduce((sum, p) => sum + p.totalRevenue, 0);
    let cumulativeRevenue = 0;
    
    const classified = productData.map(product => {
      cumulativeRevenue += product.totalRevenue;
      const cumulativePercent = (cumulativeRevenue / totalRevenue) * 100;
      
      let category;
      if (cumulativePercent <= 80) category = 'A';
      else if (cumulativePercent <= 95) category = 'B';
      else category = 'C';
      
      const productInfo = products.find(p => p.barcode === product.barcode);
      
      return {
        ...product,
        category,
        cumulativePercent: cumulativePercent,
        revenuePercent: (product.totalRevenue / totalRevenue) * 100,
        currentStock: productInfo?.available_stock || 0,
        stockValue: (productInfo?.available_stock || 0) * (productInfo?.buy_price || 0)
      };
    });
    
    return classified;
  }, [products, sales]);
  
  const categoryStats = useMemo(() => {
    const stats = { A: { count: 0, revenue: 0 }, B: { count: 0, revenue: 0 }, C: { count: 0, revenue: 0 } };
    const totalRevenue = abcData.reduce((sum, p) => sum + p.totalRevenue, 0);
    
    abcData.forEach(product => {
      stats[product.category].count += 1;
      stats[product.category].revenue += product.totalRevenue;
    });
    
    Object.keys(stats).forEach(cat => {
      stats[cat].revenuePercent = totalRevenue > 0 ? (stats[cat].revenue / totalRevenue * 100) : 0;
    });
    
    return stats;
  }, [abcData]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">ABC Inventory Analysis</h2>
            <p className="text-slate-600">Product classification based on revenue contribution</p>
          </div>
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
        </div>

        <div className="grid md:grid-cols-3 gap-4 mb-6">
          <div className="info-card abc-class-a">
            <div className="info-card-header">Class A Products</div>
            <div className="info-card-value">{categoryStats.A.count}</div>
            <div className="text-sm">~80% of Revenue ({categoryStats.A.revenuePercent.toFixed(1)}%)</div>
          </div>
          <div className="info-card abc-class-b">
            <div className="info-card-header">Class B Products</div>
            <div className="info-card-value">{categoryStats.B.count}</div>
            <div className="text-sm">~15% of Revenue ({categoryStats.B.revenuePercent.toFixed(1)}%)</div>
          </div>
          <div className="info-card abc-class-c">
            <div className="info-card-header">Class C Products</div>
            <div className="info-card-value">{categoryStats.C.count}</div>
            <div className="text-sm">~5% of Revenue ({categoryStats.C.revenuePercent.toFixed(1)}%)</div>
          </div>
        </div>

        <div className="mb-4 p-4 bg-blue-50 rounded-lg">
          <h3 className="font-semibold text-blue-800 mb-2">ABC Analysis Guide</h3>
          <div className="grid md:grid-cols-3 gap-4 text-sm text-blue-800">
            <div>
              <strong>Class A (High Value):</strong> Focus on these top performers. Ensure adequate stock and prioritize reordering.
            </div>
            <div>
              <strong>Class B (Medium Value):</strong> Monitor regularly. Good candidates for promotional activities.
            </div>
            <div>
              <strong>Class C (Low Value):</strong> Review for discontinuation or reduced stock levels to free up capital.
            </div>
          </div>
        </div>

        <div className="modal-content-scrollable">
          <div className="modal-table-container">
            <div className="modal-table-wrapper">
              <table className="data-table">
                <thead>
                  <tr>
                    <th>Category</th>
                    <th>Barcode</th>
                    <th>Product Name</th>
                    <th className="text-right">Total Revenue</th>
                    <th className="text-right">Revenue %</th>
                    <th className="text-right">Cumulative %</th>
                    <th className="text-right">Qty Sold</th>
                    <th className="text-right">Current Stock</th>
                    <th className="text-right">Stock Value</th>
                  </tr>
                </thead>
                <tbody>
                  {abcData.map((product, index) => (
                    <tr key={product.barcode}>
                      <td>
                        <span className={`px-3 py-1 rounded-full font-bold text-sm abc-class-${product.category.toLowerCase()}`}>
                          {product.category}
                        </span>
                      </td>
                      <td style={{fontFamily: 'ui-monospace, monospace'}}>{product.barcode}</td>
                      <td>{product.name}</td>
                      <td className="text-right">TSH {product.totalRevenue.toLocaleString()}</td>
                      <td className="text-right">{product.revenuePercent.toFixed(2)}%</td>

                      <td className="text-right">TSH {product.stockValue.toLocaleString()}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- UPDATED: Enhanced Credit Management Modal with Multiple Credits per Customer ---------- */
function CreditManagementModal({ credits, sales, onClose, onUpdateCredit, onDeleteCredit }) {
  const [query, setQuery] = useState("");
  const [showPaymentForm, setShowPaymentForm] = useState(null);
  const [paymentAmount, setPaymentAmount] = useState("");
  const [editingCredit, setEditingCredit] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [groupByCustomer, setGroupByCustomer] = useState(true);
  
  // Group credits by customer
  const customerGroups = useMemo(() => {
    if (!groupByCustomer) return null;
    
    const groups = new Map();
    
    credits.forEach(credit => {
      const key = `${credit.customer_name.toLowerCase()}_${credit.customer_phone || ''}`;
      if (!groups.has(key)) {
        groups.set(key, {
          customer_name: credit.customer_name,
          customer_phone: credit.customer_phone || '',
          credits: [],
          totalOriginal: 0,
          totalPaid: 0,
          totalBalance: 0
        });
      }
      
      const group = groups.get(key);
      group.credits.push(credit);
      group.totalOriginal += credit.original_amount;
      group.totalPaid += credit.paid_amount;
      group.totalBalance += credit.balance_amount;
    });
    
    return Array.from(groups.values()).sort((a, b) => b.totalBalance - a.totalBalance);
  }, [credits, groupByCustomer]);
  
  const filteredCredits = useMemo(() => {
    if (!query) return groupByCustomer ? [] : credits;
    const q = query.toLowerCase();
    return credits.filter(c => 
      c.customer_name.toLowerCase().includes(q) || 
      (c.customer_phone && c.customer_phone.includes(q)) ||
      c.receipt_number.includes(q) ||
      (c.notes && c.notes.toLowerCase().includes(q))
    );
  }, [credits, query, groupByCustomer]);
  
  const totalPending = useMemo(() => {
    return credits.reduce((sum, c) => sum + c.balance_amount, 0);
  }, [credits]);
  
  const handleAddPayment = (credit) => {
    if (!paymentAmount || parseFloat(paymentAmount) <= 0) {
      alert("Please enter a valid payment amount");
      return;
    }
    
    const amount = parseFloat(paymentAmount);
    if (amount > credit.balance_amount) {
      alert(`Payment amount cannot exceed balance of TSH ${credit.balance_amount.toLocaleString()}`);
      return;
    }
    
    const newPayment = {
      date: new Date().toISOString(),
      amount: amount,
      user: localStorage.getItem("pos_current_user") ? JSON.parse(localStorage.getItem("pos_current_user")).name : "Unknown"
    };
    
    const updatedCredit = {
      ...credit,
      paid_amount: credit.paid_amount + amount,
      balance_amount: credit.balance_amount - amount,
      status: (credit.balance_amount - amount) === 0 ? "paid" : (credit.paid_amount + amount > 0 ? "partial" : "pending"),
      payment_history: [...credit.payment_history, newPayment],
      last_updated: new Date().toISOString()
    };
    
    // Update sales records
    const updatedSales = sales.map(sale => {
      if (sale.receipt_number === credit.receipt_number) {
        return {
          ...sale,
          payment_method: amount === credit.original_amount ? "cash" : "partial_credit",
          payment_date: new Date().toISOString(),
          credit_id: credit.id
        };
      }
      return sale;
    });
    
    onUpdateCredit(updatedCredit, updatedSales);
    setShowPaymentForm(null);
    setPaymentAmount("");
  };
  
  const handleEditCredit = (credit) => {
    setEditingCredit(credit.id);
    setEditForm({
      customer_name: credit.customer_name,
      customer_phone: credit.customer_phone || "",
      customer_email: credit.customer_email || "",
      due_date: credit.due_date ? credit.due_date.split('T')[0] : "",
      notes: credit.notes || ""
    });
  };
  
  const handleSaveEdit = (credit) => {
    const updatedCredit = {
      ...credit,
      ...editForm,
      last_updated: new Date().toISOString()
    };
    
    const updatedSales = sales.map(sale => {
      if (sale.receipt_number === credit.receipt_number) {
        return {
          ...sale,
          credit_id: credit.id
        };
      }
      return sale;
    });
    
    onUpdateCredit(updatedCredit, updatedSales);
    setEditingCredit(null);
    setEditForm({});
  };
  
  const handleDeleteCredit = (credit) => {
    if (!confirm(`Are you sure you want to delete credit record for ${credit.customer_name} (Receipt #${credit.receipt_number})?`)) return;
    onDeleteCredit(credit.id);
  };
  
  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Credit Management</h2>
            <p className="text-slate-600">Track and update customer credit payments</p>
          </div>
          <div className="flex items-center gap-3">
            <div className="flex items-center gap-2">
              <input 
                type="checkbox" 
                id="groupByCustomer" 
                checked={groupByCustomer} 
                onChange={(e) => setGroupByCustomer(e.target.checked)}
                className="h-4 w-4"
              />
              <label htmlFor="groupByCustomer" className="text-sm">Group by Customer</label>
            </div>
            <button onClick={onClose} className="btn btn-outline">

      </div>
