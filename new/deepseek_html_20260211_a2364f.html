  // UPDATED: Add to cart by barcode - now shows price & quantity modal
  function addToCartByBarcode(bc) {
    const p = productsMap.get(bc);
    if (!p) { 
      setPendingBarcode(bc); 
      setShowAdd(true); 
      return; 
    }
    
    if (Number(p.available_stock || 0) <= 0) {
      showToast(`${p.name} is out of stock`, "error");
      return;
    }

    // Check if expired
    if (p.expiration_date && isExpired(p.expiration_date)) {
      showToast(`${p.name} has expired (${formatDate(p.expiration_date)})`, "error");
      return;
    }

    // Warn if expiring soon
    if (p.expiration_date && isExpiringSoon(p.expiration_date)) {
      showToast(`${p.name} expires on ${formatDate(p.expiration_date)}`, "warning");
    }
    
    const defaultPrice = Number(p.price) || 0;
    
    // Show price & quantity edit modal for managers
    if (isManager) {
      setEditingProduct(p);
      setEditingCartItem({
        barcode: p.barcode,
        name: p.name,
        price: defaultPrice,
        qty: 1
      });
      setPriceEditModalOpen(true);
      return;
    }
    
    // For non-managers, add with default price and quantity 1
    setCart((prev) => {
      const idx = prev.findIndex((x) => x.barcode === bc);
      if (idx >= 0) { 
        const next = [...prev]; 
        const newQty = next[idx].qty + 1;
        if (newQty > Number(p.available_stock || 0)) {
          showToast(`Only ${p.available_stock} units available`, "error");
          return prev;
        }
        next[idx] = { ...next[idx], qty: newQty }; 
        return next; 
      }
      return [...prev, { 
        barcode: p.barcode, 
        name: p.name, 
        price: defaultPrice, 
        qty: 1 
      }];
    });
    showToast(`${p.name} added to cart at TSH ${defaultPrice.toLocaleString()}`, "success");
  }

  // UPDATED: Handle price and quantity edit from modal
  function handlePriceEditSave(newPrice, newQuantity) {
    if (!editingProduct || !editingCartItem) return;
    
    const { barcode, name } = editingCartItem;
    const p = productsMap.get(barcode);
    
    // Check stock
    if (newQuantity > Number(p.available_stock || 0)) {
      showToast(`Only ${p.available_stock} units available`, "error");
      setPriceEditModalOpen(false);
      setEditingProduct(null);
      setEditingCartItem(null);
      return;
    }
    
    setCart((prev) => {
      const idx = prev.findIndex((x) => x.barcode === barcode);
      if (idx >= 0) { 
        const next = [...prev]; 
        next[idx] = { ...next[idx], qty: newQuantity, price: newPrice }; 
        return next; 
      }
      return [...prev, { 
        barcode: barcode, 
        name: name, 
        price: newPrice, 
        qty: newQuantity 
      }];
    });
    
    showToast(`${name} (${newQuantity} units) added to cart at TSH ${newPrice.toLocaleString()} each`, "success");
    setPriceEditModalOpen(false);
    setEditingProduct(null);
    setEditingCartItem(null);
  }

  // UPDATED: Allow price editing when updating quantity for managers
  function updateQuantity(bc, q) {
    const qty = Math.max(1, Number(q) || 1);
    const p = productsMap.get(bc);
    
    if (p && qty > Number(p.available_stock || 0)) {
      showToast(`Only ${p.available_stock} units available`, "error");
      return;
    }
    
    // For managers, show price edit modal when changing quantity
    if (isManager) {
      const item = cart.find(x => x.barcode === bc);
      if (item) {
        setEditingProduct(p);
        setEditingCartItem({
          barcode: bc,
          name: item.name,
          price: item.price,
          qty: qty
        });
        setPriceEditModalOpen(true);
        return;
      }
    }
    
    setCart((prev) => prev.map((x) => x.barcode === bc ? { ...x, qty } : x));
  }

  // Update the stock handler to handle price changes
  function handleAddStock({ barcode, qty, buy_price, sell_price, user }) {
    const p = productsMap.get(barcode);
    if (!p) { 
      alert("Product not found. Please add the product first."); 
      return; 
    }
    
    const qtyChange = Number(qty || 0);
    const newAvailable = Math.max(0, (Number(p.available_stock) || 0) + qtyChange);
    const newBuyPrice = buy_price !== null ? Number(buy_price) : Number(p.buy_price);
    const newSellPrice = sell_price !== null ? Number(sell_price) : Number(p.price);
    
    setProducts(prev => {
      const next = prev.map(x => x.barcode === barcode
        ? {
            ...x,
            available_stock: newAvailable,
            buy_price: newBuyPrice,
            price: newSellPrice,
            batches: [...(x.batches || []), {
              id: `BATCH_${Date.now()}`,
              purchase_date: new Date().toISOString().split('T')[0],
              quantity: qtyChange > 0 ? qtyChange : 0,
              buy_price: newBuyPrice,
              sell_price: newSellPrice,
              expiration_date: x.expiration_date || "",
              supplier_id: "",
              notes: `Manual adjustment by ${user}`
            }]
          }
        : x
      );
      setCsvURLFromRows(next);
      return next;
    });
    
    const entry = {
      timestamp: new Date().toISOString(),
      user: user || (currentUser?.name || "Manager"),
      barcode,
      name: p.name,
      qty: qtyChange,
      buy_price: newBuyPrice,
      sell_price: newSellPrice
    };
    
    persistStockLog([...stockLog, entry]);
    setStockModalOpen(false);
    showToast(`Stock and prices updated for ${p.name}`, "success");
  }
  
  function downloadStockLog() {
    const csv = stockLogToCSV(stockLog);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    a.href = url; 
    a.download = `stock_log_${new Date().toISOString().split("T")[0]}.csv`;
    document.body.appendChild(a); 
    a.click(); 
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function deleteSalesInRange(fromStr, toStr) {
    const from = fromStr ? new Date(fromStr+"T00:00:00").getTime() : -Infinity;

    setSales(prev => {

        const t = new Date(s.timestamp).getTime();
        return !(t >= from && t <= to);
      });
      setSalesCsvURLFromRows(kept);
      return kept;
    });
    showToast("Selected sales period deleted", "success");
  }

  // Supplier purchase handler
  function handleAddSupplierPurchase(supplierPurchase) {
    // Add to suppliers
    const updatedSuppliers = [...suppliers, supplierPurchase];
    persistSuppliers(updatedSuppliers);
    
    // Update products with new batches
    setProducts(prevProducts => {
      const updatedProducts = [...prevProducts];
      
      supplierPurchase.items.forEach(item => {
        const productIndex = updatedProducts.findIndex(p => p.barcode === item.barcode);
        const newBatch = {
          id: `BATCH_${Date.now()}_${item.barcode}`,
          purchase_date: supplierPurchase.purchase_date,
          quantity: item.quantity,
          buy_price: item.buy_price,
          sell_price: item.sell_price,
          expiration_date: item.expiration_date || "",
          supplier_id: supplierPurchase.id,
          notes: item.batch_notes
        };
        
        if (productIndex >= 0) {
          // Update existing product
          const product = updatedProducts[productIndex];
          const batches = [...(product.batches || []), newBatch];
          
          // Calculate new average buy price
          const totalQuantity = batches.reduce((sum, b) => sum + b.quantity, 0);
          const totalInvestment = batches.reduce((sum, b) => sum + (b.buy_price * b.quantity), 0);
          const avgBuyPrice = totalQuantity > 0 ? totalInvestment / totalQuantity : item.buy_price;
          
          // Update sell price if different from current
          const newSellPrice = item.sell_price > product.price ? item.sell_price : product.price;
          
          updatedProducts[productIndex] = {
            ...product,
            batches: batches,
            buy_price: avgBuyPrice,
            price: newSellPrice,
            available_stock: (Number(product.available_stock) || 0) + item.quantity
          };
        } else {
          // Create new product
          updatedProducts.push({
            barcode: item.barcode,
            name: item.name,
            price: item.sell_price,
            buy_price: item.buy_price,
            opening_stock: item.quantity,
            items_sold: 0,
            available_stock: item.quantity,
            reorder_level: 0,
            expiration_date: item.expiration_date || "",
            batches: [newBatch]
          });
        }
      });
      
      setCsvURLFromRows(updatedProducts);
      return updatedProducts;
    });
    
    setShowAddSupplierPurchase(false);
    showToast(`Supplier purchase recorded for ${supplierPurchase.supplier_name}`, "success");
  }

            onSave={(updatedUsers) => {
              const csv = usersToCSV(updatedUsers);
              localStorage.setItem("pos_users_csv", csv);
              setUsers(updatedUsers);
            }}
          />
        )}
        {employeePerformanceOpen && isManager && (
          <EmployeePerformanceModal
            sales={sales}
            users={users}
            onClose={() => setEmployeePerformanceOpen(false)}
          />
        )}
        {abcAnalysisOpen && (
          <ABCAnalysisModal
            products={products}
            sales={sales}
            onClose={() => setABCAnalysisOpen(false)}
          />
        )}
        {creditManagementOpen && (
          <CreditManagementModal
            credits={credits}
            sales={sales}
            onClose={() => setCreditManagementOpen(false)}
            onUpdateCredit={handleUpdateCredit}
            onDeleteCredit={handleDeleteCredit}
          />
        )}
        {showSupplierManagement && (
          <SupplierManagementModal
            suppliers={suppliers}
            onClose={() => setShowSupplierManagement(false)}
            onUpdateSupplier={handleUpdateSupplier}
            onOpenAddPurchase={() => {
              setShowSupplierManagement(false);
              setTimeout(() => setShowAddSupplierPurchase(true), 100);
            }}
          />
        )}
        {showAddSupplierPurchase && (
          <AddSupplierPurchaseModal
            products={products}
            onClose={() => setShowAddSupplierPurchase(false)}
            onSave={handleAddSupplierPurchase}
            currentUser={currentUser}
          />
        )}
        {showBatchDetails && selectedProductForBatches && (
          <BatchDetailsModal
            product={selectedProductForBatches}
            onClose={() => {
              setShowBatchDetails(false);
              setSelectedProductForBatches(null);
            }}
          />
        )}
        
        {/* JSON Data Backup/Restore Modal */}
        {jsonDataModalOpen && (
          <JSONDataModal
            products={products}
            sales={sales}
            credits={credits}
            suppliers={suppliers}
            stockLog={stockLog}
            users={users}
            onClose={() => setJsonDataModalOpen(false)}
            onImportData={importDataFromJSON}
          />
        )}
        
        {/* UPDATED: PRICE & QUANTITY EDIT MODAL */}
        {priceEditModalOpen && editingProduct && (
          <PriceEditModal
            product={editingProduct}
            currentPrice={editingCartItem?.price || editingProduct.price}
            currentQuantity={editingCartItem?.qty || 1}
            onClose={() => {
              setPriceEditModalOpen(false);
              setEditingProduct(null);
              setEditingCartItem(null);
            }}
            onSave={handlePriceEditSave}
          />
        )}
        
        {/* PAYMENT MODAL */}
        {showPaymentModal && (
          <PaymentTypeModal
            total={getTotalAmount()}
            onClose={() => setShowPaymentModal(false)}
            onConfirm={handleConfirmPayment}
          />
        )}

        {/* Toast Notification */}
        {toast && (
          <div className={`toast ${toast.type === 'success' ? 'toast-success' : toast.type === 'warning' ? 'toast-warning' : 'toast-error'}`}>
            {toast.message}
          </div>
        )}
      </main>
    </div>
  );
}

// Render the application
ReactDOM.render(<POSSystem />, document.getElementById('root'));
</script>
</body>
</html>
