/* ---------- Analytics Modal ---------- */
function AnalyticsModal({ sales, products, onClose }) {
  const productsMap = useMemo(() => new Map(products.map(p => [p.barcode, p])), [products]);
  
  const totalRevenue = useMemo(() => sales.reduce((sum, sale) => sum + sale.total, 0), [sales]);
  const totalItems = useMemo(() => sales.reduce((sum, sale) => sum + sale.quantity, 0), [sales]);
  const totalProfit = useMemo(() => sales.reduce((sum, s) => {
    const buyP = Number.isFinite(s.buy_price) ? s.buy_price : (productsMap.get(s.barcode)?.buy_price || 0);
    return sum + (s.price - buyP) * s.quantity;
  }, 0), [sales, productsMap]);

  const metrics = useMemo(() => {
    const m = new Map();
    for (const s of sales) {
      const k = s.barcode;
      if (!m.has(k)) m.set(k, { barcode: s.barcode, name: s.name, qty: 0, rev: 0, profit: 0 });
      const buyP = Number.isFinite(s.buy_price) ? s.buy_price : (productsMap.get(s.barcode)?.buy_price || 0);
      const row = m.get(k);
      row.qty += s.quantity;
      row.rev += s.total;
      row.profit += (s.price - buyP) * s.quantity;
    }
    return Array.from(m.values()).sort((a,b)=> b.rev - a.rev);
  }, [sales, productsMap]);

  const withStock = useMemo(() => {
    const pm = new Map(products.map(p=>[p.barcode,p]));
    return metrics.map(r => {
      const p = pm.get(r.barcode) || {};
      const opening = Number(p.opening_stock)||0;
      const sold = r.qty;
      const available = Number(p.available_stock)||0;
      const drr = sold > 0 ? (sold / Math.max(1, opening + sold)) * 30 : 0;
      const projDaysLeft = drr>0 ? (available / (drr/30)) : Infinity;
      const avgPrice = (r.rev / Math.max(1, r.qty));
      return { ...r, opening, available, drr, projDaysLeft, avgPrice, turnover: r.rev, margin: r.profit };
    });
  }, [metrics, products]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Sales Analytics</h2>
            <p className="text-slate-600">Detailed profit and performance analysis</p>
          </div>
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
        </div>

        <div className="grid md:grid-cols-3 gap-6 mb-6">
          <div className="stat-card stat-card-primary">
            <div className="info-card-header">Total Revenue</div>
            <div className="info-card-value">TSH {totalRevenue.toLocaleString()}</div>
          </div>
          <div className="stat-card stat-card-success">
            <div className="info-card-header">Items Sold</div>
            <div className="info-card-value">{totalItems.toLocaleString()}</div>
          </div>
          <div className="stat-card stat-card-warning">
            <div className="info-card-header">Total Profit</div>
            <div className="info-card-value">TSH {totalProfit.toLocaleString()}</div>
          </div>
        </div>

        <div className="flex-1 min-h-0 overflow-y-auto overflow-x-auto">
          <div className="overflow-y-auto h-full">
            <table className="data-table">
              <thead>
                <tr>
                  <th>Barcode</th>
                  <th>Product Name</th>
                  <th className="text-right">Qty Sold</th>
                  <th className="text-right">Revenue</th>
                  <th className="text-right">Profit</th>
                  <th className="text-right">Avg Price</th>
                  <th className="text-right">Opening</th>
                  <th className="text-right">Available</th>
                  <th className="text-right">Turnover%</th>
                  <th className="text-right">Days Left</th>
                </tr>
              </thead>
              <tbody>
                {withStock.map((r) => (
                  <tr key={r.barcode}>
                    <td style={{fontFamily: 'ui-monospace, monospace'}}>{r.barcode}</td>
                    <td>{r.name}</td>
                    <td className="text-right">{r.qty.toLocaleString()}</td>
                    <td className="text-right font-medium">TSH {r.rev.toLocaleString()}</td>
                    <td className="text-right font-medium">TSH {r.profit.toLocaleString()}</td>
                    <td className="text-right">TSH {r.avgPrice.toFixed(0)}</td>
                    <td className="text-right">{r.opening.toLocaleString()}</td>
                    <td className="text-right">{r.available.toLocaleString()}</td>
                    <td className="text-right font-semibold">{(r.turnover * 100).toFixed(1)}%</td>
                    <td className="text-right">{Number.isFinite(r.projDaysLeft) ? r.projDaysLeft.toFixed(1) : "—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        
        <div className="mt-4 p-4 bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg border border-blue-200">
          <p className="text-sm text-blue-800">
            <strong>Analysis Tips:</strong> Use this table to identify fast-moving products, high-margin items, and potential stock-outs. 
            Focus on products with high turnover and good profit margins for restocking priorities.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ---------- Inventory Modal (Enhanced) ---------- */
function InventoryModal({ products, onClose, onDeleteSelected, onDeleteAll, onOpenABC }) {
  const [query, setQuery] = React.useState("");
  const [checked, setChecked] = React.useState(new Set());

  const filtered = React.useMemo(() => {
    const q = query.toLowerCase();
    return products.filter(p =>
      (p.name||"").toLowerCase().includes(q) || String(p.barcode||"").includes(q)
    );
  }, [products, query]);

  const totals = React.useMemo(() => {
    const toNum = n => Number(n) || 0;
    let stockValue = 0, retailValue = 0, potentialProfit = 0, lowStockCount = 0, expiredCount = 0, expiringSoonCount = 0;
    for (const p of filtered) {
      const qty = toNum(p.available_stock);
      const buy = toNum(p.buy_price);
      const sell = toNum(p.price);
      const reorderLevel = toNum(p.reorder_level);
      
      stockValue += buy * qty;
      retailValue += sell * qty;
      potentialProfit += (sell - buy) * qty;
      
      if (qty <= reorderLevel && reorderLevel > 0) lowStockCount++;
      if (p.expiration_date && isExpired(p.expiration_date)) expiredCount++;
      if (p.expiration_date && isExpiringSoon(p.expiration_date)) expiringSoonCount++;
    }
    return { stockValue, retailValue, potentialProfit, lowStockCount, expiredCount, expiringSoonCount };
  }, [filtered]);

  function toggle(bc) {
    const next = new Set(checked);
    next.has(bc) ? next.delete(bc) : next.add(bc);
    setChecked(next);
  }

  function getRowClass(product) {
    if (product.expiration_date && isExpired(product.expiration_date)) {
      return "expired-item";
    }
    if (product.expiration_date && isExpiringSoon(product.expiration_date)) {
      return "expiring-soon-item";
    }
    if (Number(product.available_stock) <= Number(product.reorder_level) && Number(product.reorder_level) > 0) {
      return "low-stock-item";
    }
    return "";
  }

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Inventory Management</h2>
            <p className="text-slate-600">Stock levels, valuations, and alerts</p>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={onOpenABC} className="btn btn-secondary">
              <BarChartIcon /> ABC Analysis
            </button>
            <button onClick={onClose} className="btn btn-outline">
              Close
            </button>
          </div>
        </div>

        <div className="grid md:grid-cols-6 gap-4 mb-6">
          <div className="stat-card stat-card-primary">
            <div className="info-card-header">Stock Value</div>
            <div className="info-card-value">TSH {totals.stockValue.toLocaleString()}</div>
          </div>
          <div className="stat-card stat-card-success">
            <div className="info-card-header">Retail Value</div>
            <div className="info-card-value">TSH {totals.retailValue.toLocaleString()}</div>
          </div>
          <div className="stat-card stat-card-warning">
            <div className="info-card-header">Potential Profit</div>
            <div className="info-card-value">TSH {totals.potentialProfit.toLocaleString()}</div>
          </div>
          <div className="stat-card stat-card-warning">
            <div className="info-card-header">Low Stock</div>
            <div className="info-card-value">{totals.lowStockCount}</div>
          </div>
          <div className="stat-card stat-card-danger">
            <div className="info-card-header">Expired</div>
            <div className="info-card-value">{totals.expiredCount}</div>
          </div>
          <div className="stat-card stat-card-warning">
            <div className="info-card-header">Expiring Soon</div>
            <div className="info-card-value">{totals.expiringSoonCount}</div>
          </div>
        </div>

        <div className="flex items-center gap-4 mb-4">
          <div className="relative flex-1">
            <input 
              className="form-input pl-10"
              placeholder="Search by product name or barcode…" 
              value={query}
              onChange={e=>setQuery(e.target.value)} 
            />
            <svg className="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </div>
          <button
            onClick={()=>{
              if (checked.size===0) return alert("Please select items to delete.");
              if (!confirm(`Delete ${checked.size} selected product(s)? This affects the current month file only.`)) return;
              onDeleteSelected(Array.from(checked));
              setChecked(new Set());
            }}
            className="btn btn-danger">
            Delete Selected ({checked.size})
          </button>
          <button
            onClick={()=>{
              if (!confirm("Delete ALL products from the current month file? This cannot be undone.")) return;
              onDeleteAll();
            }}
            className="btn btn-outline text-red-700 border-red-300 hover:bg-red-50">
            Delete All
          </button>
        </div>

        <div className="mb-4 p-3 bg-gradient-to-r from-slate-50 to-slate-100 rounded-lg border border-slate-200">
          <div className="flex items-center gap-6 text-sm">
            <div className="flex items-center gap-2">

              <span>Expiring Soon</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded bg-yellow-200 border-l-4 border-yellow-500"></div>
              <span>Low Stock</span>
            </div>
          </div>
        </div>

        <div className="flex-1 min-h-0 overflow-y-auto overflow-x-auto">
           <div className="overflow-y-auto h-full">
            <table className="data-table">
              <thead>
                <tr>
                  <th className="w-12">

                      type="checkbox"

                        if (e.target.checked) setChecked(new Set(filtered.map(p=>p.barcode)));

                      }}
                    />
                  </th>
                  <th>Barcode</th>
                  <th>Product Name</th>
                  <th className="text-right">Buy Price</th>
                  <th className="text-right">Sell Price</th>
                  <th className="text-right">Available</th>
                  <th className="text-right">Reorder Level</th>
                  <th>Expiration Date</th>
                  <th className="text-right">Stock Value</th>
                  <th className="text-right">Status</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p=>{
                  const qty = Number(p.available_stock)||0;
                  const buy = Number(p.buy_price)||0;
                  const sell = Number(p.price)||0;
                  const reorderLevel = Number(p.reorder_level)||0;
                  const rowClass = getRowClass(p);
                  
                  return (
                    <tr key={p.barcode} className={rowClass}>
                      <td className="text-center">
                        <input 
                          type="checkbox" 
                          checked={checked.has(p.barcode)} 
                          onChange={()=>toggle(p.barcode)} 
                        />
                      </td>
                      <td style={{fontFamily: 'ui-monospace, monospace'}}>{p.barcode}</td>
                      <td>{p.name}</td>
                      <td className="text-right">TSH {buy.toLocaleString()}</td>
                      <td className="text-right font-medium">TSH {sell.toLocaleString()}</td>
                      <td className="text-right">{qty.toLocaleString()}</td>
                      <td className="text-right">{reorderLevel > 0 ? reorderLevel.toLocaleString() : "—"}</td>
                      <td>{p.expiration_date ? formatDate(p.expiration_date) : "—"}</td>
                      <td className="text-right font-medium">TSH {(buy*qty).toLocaleString()}</td>
                      <td className="text-right">
                        <div className="flex items-center justify-end gap-1">
                          {p.expiration_date && isExpired(p.expiration_date) && (
                            <span className="px-2 py-1 bg-red-100 text-red-800 rounded text-xs font-bold">Expired</span>
                          )}
                          {p.expiration_date && isExpiringSoon(p.expiration_date) && !isExpired(p.expiration_date) && (
                            <span className="px-2 py-1 bg-orange-100 text-orange-800 rounded text-xs font-bold">Expiring</span>
                          )}
                          {qty <= reorderLevel && reorderLevel > 0 && (
                            <span className="px-2 py-1 bg-yellow-100 text-yellow-800 rounded text-xs font-bold">Low Stock</span>
                          )}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Print helpers ---------- */
function printReceiptAuto(items) {
  const w = window.open("", "_blank", "width=400,height=600");
  const html = buildReceiptHTML(items, { method: "cash", receiptNumber: "" }, null, false);
  w.document.open(); 
  w.document.write(html); 
  w.document.close();
  w.focus(); 
  setTimeout(() => {
    w.print(); 
    w.close();
  }, 500);
}

function AlertBadge({ count, onClick }) {
  if (count <= 0) return null;
  return (
    <div className="alert-badge" onClick={onClick} style={{ cursor: 'pointer' }}>
      {count > 99 ? '99+' : count}
    </div>
  );
}

/* ---------- Notification Badge Component ---------- */
function NotificationBadge({ count, onClick }) {
  if (count <= 0) return null;
  return (
    <div className="notification-badge" onClick={onClick}>
      {count > 99 ? '99+' : count}
    </div>
  );
}

  // Calculate alerts
  const alerts = useMemo(() => {
    let lowStock = 0, expired = 0, expiring = 0;
    
    products.forEach(p => {
      const qty = Number(p.available_stock) || 0;
      const reorderLevel = Number(p.reorder_level) || 0;
      
      if (qty <= reorderLevel && reorderLevel > 0) lowStock++;
      if (p.expiration_date && isExpired(p.expiration_date)) expired++;
      if (p.expiration_date && isExpiringSoon(p.expiration_date) && !isExpired(p.expiration_date)) expiring++;
    });
    
    return { lowStock, expired, expiring, total: lowStock + expired + expiring };
  }, [products]);

  const isManager = currentUser?.role === 'manager';

  // Auto-focus barcode input
  useEffect(() => {

  // Toast auto-hide

    if (toast) {
      const timer = setTimeout(() => setToast(null), 4000);
      return () => clearTimeout(timer);
    }
  }, [toast]);

  // Notification listener
  useEffect(() => {
    const handleNotifications = (newNotifications, count) => {
      setNotifications(newNotifications);
      setUnreadCount(count);
      renderNotifications();
    };
    
    notificationManager.addListener(handleNotifications);
    notificationManager.setManagerStatus(isManager);
    
    // Initial load

    setUnreadCount(notificationManager.getUnreadCount());
    renderNotifications();
    
    return () => notificationManager.removeListener(handleNotifications);
  }, [isManager]);

  // Load all data from Supabase on startup

    const loadAllData = async () => {
      setIsLoading(true);
      try {
        // Load products
        const productsData = await dataManager.getProducts();
        setProducts(productsData);
        
        // Load sales

        setSales(salesData);
        
        // Load users

        setUsers(usersData);

        setStockLog(stockLogData);

  const productsMap = useMemo(() => {
    const m = new Map();
    for (const r of products) m.set(r.barcode, r);
    return m;
  }, [products]);

  // CSV persistence helpers - UPDATED FOR SUPABASE
  async function setCsvURLFromRows(rows, key = monthKey()) {
    const csv = productsToCSV(rows);
    
    // Save to Supabase
    await dataManager.saveProducts(rows);
    
    // Also update local CSV URL for download
    const url = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
    if (csvURL) URL.revokeObjectURL(csvURL);
    setCsvURL(url);
  }
  
  async function setSalesCsvURLFromRows(rows) {
    const csv = salesToCSV(rows);
    
    // Save to Supabase
    await dataManager.saveSales(rows);
    
    // Also save to localStorage as backup
    localStorage.setItem("pos_sales_csv", csv);
  }

  // Discount handler
  function handleApplyDiscount(discountData) {
    setDiscount(discountData);
    showToast(`Discount applied: TSH ${discountData.amount.toLocaleString()}`, "success");
    setShowDiscountModal(false);
  }

  function handleRemoveDiscount() {
    setDiscount(null);
    showToast("Discount removed", "success");
  }

  // Payment handler with receipt/invoice printing - IMPROVED FOR OFFLINE SYNC
  async function handleConfirmPayment(paymentDetails) {
    const cartItems = pendingPayment?.cart || cart;
    const total = pendingPayment?.total || getTotalAmount();
    const discountData = pendingPayment?.discount || discount;
    const finalTotal = discountData ? discountData.finalTotal : total;
    
    if (cartItems.length === 0) {
      showToast("Cart is empty", "error");
      return;
    }

    if (!currentUser) {
      showToast("Please login to process payments", "error");
      return;
    }

    // Check stock availability and expiration
    for (const item of cartItems) {
      const p = productsMap.get(item.barcode);
      if (!p || Number(p.available_stock || 0) < item.qty) {
        showToast(`Insufficient stock for ${item.name}`, "error");
        return;
      }
      
      if (p.expiration_date && isExpired(p.expiration_date)) {
        showToast(`Cannot sell expired product: ${item.name}`, "error");
        return;
      }
    }

    const timestampISO = new Date().toISOString();
    const currentReceipt = receiptNumber;

    // Build per-item sales + persist
    const newSales = cartItems.map((item) => {
      const prod = productsMap.get(item.barcode) || {};
      const buyP = Number(prod.buy_price) || 0;
      const itemTotal = item.price * item.qty;
      const itemDiscount = discountData ? (itemTotal / total) * discountData.amount : 0;
      
      return {
        timestamp: timestampISO,
        receipt_number: currentReceipt,
        teller_number: TELLER_NUMBER,
        user_name: currentUser.name,
        barcode: item.barcode,
        name: item.name,
        price: item.price,
        quantity: item.qty,
        total: itemTotal - itemDiscount,
        discount: itemDiscount,
        buy_price: buyP,
        profit: (item.price - buyP) * item.qty,
        payment_method: paymentDetails.method,
        discount_reason: discountData?.reason || ""
      };
    });
    
    // Always save to offline queue first
    newSales.forEach(sale => offlineSyncManager.addOfflineSale(sale));
    
    // Update products stock locally
    const updatedProducts = products.map((p) => {
      const item = cartItems.find(it => it.barcode === p.barcode);
      if (item) {
        return {
          ...p,
          items_sold: Number(p.items_sold) + item.qty,
          available_stock: Math.max(0, Number(p.available_stock) - item.qty)
        };
      }
      return p;
    });
    
    setProducts(updatedProducts);
    
    // Save updated products to Supabase
    await setCsvURLFromRows(updatedProducts);

    // Prepare receipt/invoice items
    const items = cartItems.map((i) => ({ name: i.name, qty: i.qty, price: i.price }));
    
    // Update receipt counter
    if (navigator.onLine) {
      await dataManager.updateReceiptCounter(currentReceipt + 1);
    }
    
    // Store items for receipt and show receipt
    setReceiptItems(items);
    setShowReceipt(true);
    setCart([]);
    setReceiptNumber(currentReceipt + 1);
    setDiscount(null);
    setShowPaymentModal(false);
    setPendingPayment(null);
    
    // Try to sync immediately if online
    if (navigator.onLine) {
      setTimeout(() => {
        offlineSyncManager.syncOfflineSales();
      }, 500);
    }
    
    // Print the document
    setTimeout(() => {
      const printDetails = {
        ...paymentDetails,
        receiptNumber: currentReceipt.toString()
      };
      const isInvoice = paymentDetails.method === "credit";
      printReceiptOrInvoice(items, printDetails, discountData, isInvoice);
    }, 1000);
    
    // Show appropriate message based on connectivity
    const connectivityMsg = navigator.onLine ? "Syncing with cloud..." : "Saved offline, will sync when connection is restored";
    showToast(`Payment processed${paymentDetails.method === 'credit' ? ' (Invoice)' : ' (Receipt)'}: TSH ${finalTotal.toLocaleString()}. ${connectivityMsg}`, "success");
  }

  // Process payment with discount and payment type selection
  function processPaymentWithOptions() {
    if (cart.length === 0) {

  // Load CSV file

    if (!f) return;
    
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const rows = parseProductsCSV(String(ev.target.result||""));
        setProducts(rows);
        
        // Save to Supabase
        const saved = await dataManager.saveProducts(rows);
        if (saved) {
          showToast(`Loaded ${rows.length} products to cloud`, "success");

          showToast(`Products saved locally only`, "warning");
        }
        
        setCsvURLFromRows(rows);
        setCsvFileName(f.name);

        alert("Invalid CSV format: " + err?.message);
      }
    };

    e.target.value = "";

  // Add/Update product
  async function addOrUpdateProduct(p) {
    const updatedProducts = [...products];
    const idx = updatedProducts.findIndex((x) => x.barcode === p.barcode);
    
    if (idx >= 0) { 
      updatedProducts[idx] = { ...updatedProducts[idx], ...p }; 
    } else { 
      updatedProducts.push(p); 
    }
    
    setProducts(updatedProducts);
    
    // Save to Supabase
    const saved = await dataManager.saveProducts(updatedProducts);
    if (saved) {
      showToast("Product saved to cloud", "success");
    } else {
      showToast("Product saved locally only", "warning");
    }
    
    setShowAdd(false);
  }

  // Add to cart by barcode
  function addToCartByBarcode(bc) {
    const p = productsMap.get(bc);
    if (!p) { 
      setPendingBarcode(bc); 
      setShowAdd(true); 
      return; 
    }
    
    if (Number(p.available_stock || 0) <= 0) {
      showToast(`${p.name} is out of stock`, "error");
      return;
    }

    // Check if expired
    if (p.expiration_date && isExpired(p.expiration_date)) {
      showToast(`${p.name} has expired (${formatDate(p.expiration_date)})`, "error");
      return;
    }

    // Warn if expiring soon
    if (p.expiration_date && isExpiringSoon(p.expiration_date)) {
      showToast(`${p.name} expires on ${formatDate(p.expiration_date)}`, "warning");
    }
    
    setCart((prev) => {
      const idx = prev.findIndex((x) => x.barcode === bc);
      if (idx >= 0) { 
        const next = [...prev]; 
        const newQty = next[idx].qty + 1;
        if (newQty > Number(p.available_stock || 0)) {
          showToast(`Only ${p.available_stock} units available`, "error");
          return prev;
        }
        next[idx] = { ...next[idx], qty: newQty }; 
        return next; 
      }
      return [...prev, { 
        barcode: p.barcode, 
        name: p.name, 
        price: Number(p.price)||0, 
        qty: 1 
      }];
    });
    showToast(`${p.name} added to cart`, "success");
  }

  function updateQuantity(bc, q) {
    const qty = Math.max(1, Number(q) || 1);
    const p = productsMap.get(bc);
    
    if (p && qty > Number(p.available_stock || 0)) {
      showToast(`Only ${p.available_stock} units available`, "error");
      return;
    }
    
    setCart((prev) => prev.map((x) => x.barcode === bc ? { ...x, qty } : x));
  }

    setCart((prev) => prev.filter((x) => x.barcode !== bc));
  }
  
  function clearCart() { 
    setCart([]); 
    showToast("Cart cleared", "success");
  }

  function getTotalAmount() { 
    return cart.reduce((s, i) => s + i.qty * i.price, 0); 
  }

  // Update the stock handler to handle price changes
  async function handleAddStock({ barcode, qty, buy_price, sell_price, user }) {
    const p = productsMap.get(barcode);
    if (!p) { 
      alert("Product not found. Please add the product first."); 
      return; 
    }
    
    const qtyChange = Number(qty || 0);
    const newAvailable = Math.max(0, (Number(p.available_stock) || 0) + qtyChange);
    const newBuyPrice = buy_price !== null ? Number(buy_price) : Number(p.buy_price);
    const newSellPrice = sell_price !== null ? Number(sell_price) : Number(p.price);
    
    const updatedProducts = products.map(x => x.barcode === barcode
      ? {
          ...x,
          available_stock: newAvailable,
          buy_price: newBuyPrice,
          price: newSellPrice
        }
      : x
    );
    
    setProducts(updatedProducts);
    
    // Save to Supabase
    const saved = await dataManager.saveProducts(updatedProducts);
    if (!saved) {
      showToast("Stock update saved locally only", "warning");
    }
    
    const entry = {
      timestamp: new Date().toISOString(),
      user: user || (currentUser?.name || "Manager"),
      barcode,
      name: p.name,
      qty: qtyChange,
      buy_price: newBuyPrice,
      sell_price: newSellPrice
    };
    
    // Save stock log to localStorage only
    const logSaved = await dataManager.saveStockLog([entry]);
    if (logSaved) {
      setStockLog(prev => [...prev, entry]);
      showToast(`Stock and prices updated for ${p.name}`, "success");
    } else {
      showToast("Stock log saved locally only", "warning");
    }
    
    setStockModalOpen(false);
  }

                <div className="flex flex-col items-start">
                  <span className="font-medium text-sm">{currentUser.name}</span>
                  <span className="text-xs opacity-90">{currentUser.role}</span>
                </div>
                <button onClick={handleLogout} className="text-white hover:text-blue-100 text-sm font-medium">
                  Logout
                </button>
              </div>
            ) : (
              <button onClick={() => setShowLogin(true)} className="btn btn-primary">
                <UserIcon />
                <span>Login</span>
              </button>
            )}
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-8">
        {/* Cloud Status Indicator */}
        {dataManager.useLocalStorage ? (
          <div className="mb-4 p-3 bg-gradient-to-r from-yellow-50 to-orange-50 border border-yellow-200 rounded-lg">
            <div className="flex items-center gap-2">
              <AlertIcon className="text-yellow-600" />
              <span className="text-sm text-yellow-800">
                <strong>Offline Mode:</strong> Using localStorage. Configure Supabase for cloud sync.
              </span>
            </div>
          </div>
        ) : (
          <div className="mb-4 p-3 bg-gradient-to-r from-green-50 to-emerald-50 border border-green-200 rounded-lg">
            <div className="flex items-center gap-2">
              <span className="status-indicator status-online"></span>
              <span className="text-sm text-green-800">
                <strong>Cloud Mode:</strong> Data synchronized with Supabase
              </span>
            </div>
          </div>
        )}

        {/* Offline Sales Sync Indicator */}
        {offlineSyncManager.getOfflineSalesCount() > 0 && (
          <div className="mb-4 p-3 bg-gradient-to-r from-blue-50 to-blue-100 border border-blue-200 rounded-lg">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <ClockIcon className="text-blue-600" />
                <span className="text-sm text-blue-800">
                  <strong>Offline Sales:</strong> {offlineSyncManager.getOfflineSalesCount()} sale(s) queued for sync
                </span>
              </div>
              <div className="flex items-center gap-2">
                <button 
                  onClick={handleManualSync}
                  className="btn btn-primary btn-sm"
                  disabled={!navigator.onLine}
                >
                  Sync Now
                </button>
                {!navigator.onLine && (
                  <span className="text-xs text-blue-700">(Offline - will sync when connection is restored)</span>
                )}
              </div>
            </div>
          </div>
        )}

        {/* Alert Banner */}
        {alerts.total > 0 && (
          <div className="mb-6 p-4 bg-gradient-to-r from-yellow-50 to-orange-50 border border-yellow-200 rounded-lg">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <AlertIcon />
                <div>
                  <h3 className="font-semibold text-yellow-800">Inventory Alerts</h3>
                  <p className="text-sm text-yellow-700">
                    {alerts.lowStock > 0 && `${alerts.lowStock} low stock`}
                    {alerts.expired > 0 && (alerts.lowStock > 0 ? `, ${alerts.expired} expired` : `${alerts.expired} expired`)}
                    {alerts.expiring > 0 && (alerts.lowStock > 0 || alerts.expired > 0 ? `, ${alerts.expiring} expiring soon` : `${alerts.expiring} expiring soon`)}
                  </p>
                </div>
              </div>
              <button onClick={() => setInventoryOpen(true)} className="btn btn-outline btn-sm">
                View Details
              </button>
            </div>
          </div>
        )}

        {isManager && (
          <div className="glass-card rounded-xl shadow-lg p-6 mb-8">
            <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
              <div className="flex flex-col sm:flex-row sm:items-center gap-4">
                <button onClick={() => fileInputRef.current?.click()} className="btn btn-secondary text-sm px-4 py-2 whitespace-nowrap">
                  Load CSV
                </button>
                <input type="file" accept=".csv" className="hidden" ref={fileInputRef} onChange={onOpenCSV} />
                <div className="text-slate-600 text-sm">
                  <strong>{products.length}</strong> products loaded 
                  {products.length > 0 && <span className="text-slate-500"> from {csvFileName}</span>}
                </div>
              </div>
              
              <div className="flex flex-wrap items-center gap-2">
                <button onClick={() => setShowSales(true)} className="btn btn-secondary text-sm px-4 py-2">
                  <SalesIcon /> Sales
                </button>
                <button onClick={() => { setPendingBarcode(""); setShowAdd(true); }} className="btn btn-primary text-sm px-4 py-2">
                  <PlusIcon /> Product
                </button>
                <button onClick={() => setInventoryOpen(true)} className="btn btn-secondary text-sm px-4 py-2 relative">
                  Inventory
                  {alerts.total > 0 && <AlertBadge count={alerts.total} />}
                </button>
                <button onClick={() => setStockModalOpen(true)} className="btn btn-success text-sm px-4 py-2">
                  Add Stock
                </button>
                <button onClick={() => setStockHistoryOpen(true)} className="btn btn-secondary text-sm px-4 py-2">
                  Stock History
                </button>
                <button onClick={() => setUserManagementOpen(true)} className="btn btn-secondary text-sm px-4 py-2">
                  <UsersIcon /> Users
                </button>
                <button onClick={() => setEmployeePerformanceOpen(true)} className="btn btn-secondary text-sm px-4 py-2">
                  <TrendingUpIcon /> Performance
                </button>
                {isManager && (
                  <button onClick={() => setShowNotificationModal(true)} className="btn btn-secondary text-sm px-4 py-2">
                    Send Notification
                  </button>
                )}
                <button onClick={() => setDataToolsOpen(true)} className="btn btn-secondary text-sm px-4 py-2">
                  Data Tools
                </button>
                {csvURL && (
                  <a download={csvFileName || `products_${monthKey()}.csv`} href={csvURL} className="btn btn-outline text-sm px-4 py-2">
                    <DownloadIcon /> CSV
                  </a>
                )}
              </div>
            </div>
            
            <div className="mt-4 p-4 bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg border border-blue-200">
              <p className="text-xs text-blue-800">
                <strong>Enhanced CSV Format:</strong> <code className="mono bg-white px-1 rounded">barcode,name,price,buy_price,opening_stock,items_sold,available_stock,reorder_level,expiration_date</code>
                <br />
                New features: Low stock alerts, expiration tracking, sales reporting, user management, employee performance, and ABC analysis.
              </p>
            </div>
          </div>
        )}

        <div className="grid lg:grid-cols-3 gap-8">
          {/* Left Panel - Barcode Scanner & Products */}
          <div className="lg:col-span-2 space-y-8">
            {/* Barcode Scanner */}
            <div className="glass-card rounded-xl shadow-lg p-6 hover-scale">
              <div className="flex items-center gap-3 text-slate-700 mb-6">
                <BarcodeIcon />
                <h3 className="text-xl font-semibold">Barcode Scanner</h3>
              </div>
              <form onSubmit={handleBarcodeSubmit} className="flex gap-4">
                <input 
                  ref={barcodeInputRef} 
                  value={barcode} 
                  onChange={(e) => setBarcode(e.target.value)} 
                  placeholder="Scan or type barcode to add to cart" 
                  className="form-input flex-1 text-lg h-14" 
                />
                <button type="submit" className="btn btn-primary px-6 h-14 text-lg">
                  <CartIcon />
                </button>
              </form>
              <div className="mt-4">
                <input 
                  list="desc-suggestions"
                  value={descQuery}
                  onChange={(e) => {
                    const v = e.target.value;
                    setDescQuery(v);
                    if (v.includes("—")) {
                      const bc = v.split("—")[0].trim();
                      if (productsMap.has(bc)) {
                        addToCartByBarcode(bc);
                        setDescQuery("");
                        setTimeout(() => {
                          if (barcodeInputRef.current) barcodeInputRef.current.focus();
                        }, 50);
                      }
                    }
                  }}
                  placeholder="Type description, name, or barcode and pick…"
                  className="form-input w-full"
                />
                <datalist id="desc-suggestions">
                  {products.map((p) => (
                    <option
                      key={p.barcode}
                      value={`${p.barcode} — ${p.name}`}
                    />
                  ))}
                </datalist>
              </div>

              {barcode && !productsMap.has(barcode.trim()) && (
                <div className="mt-3 p-3 bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-lg">
                  <p className="text-sm text-amber-800">
                    <strong>Product not found.</strong> Press the cart icon to create a new product with this barcode.
                  </p>
                </div>
              )}
            </div>

            {/* Quick Access Products */}
            <div className="glass-card rounded-xl shadow-lg p-6">
              <h3 className="text-xl font-semibold text-slate-700 mb-6">Quick Access Products</h3>
              {products.length === 0 ? (
                <div className="text-center py-12 text-slate-500">
                  <p className="text-lg mb-2 font-medium">No products available</p>
                  <p className="text-sm">
                    {isManager ? "Load a products CSV file to see quick access items." : "Contact manager to load products."}
                  </p>
                </div>
              ) : (
                <div className="product-grid">
                  {products.slice(0, 12).map((p) => {
                    const alertClass = getProductAlertClass(p);
                    const isAlert = alertClass !== "";
                    
                    return (
                      <div 
                        key={p.barcode} 
                        className={`product-card ${alertClass}`} 
                        onClick={() => addToCartByBarcode(p.barcode)}
                      >
                        <div className="product-card-name">{p.name}</div>
                        <div className="product-card-price">TSH {Number(p.price).toLocaleString()}</div>
                        <div className="product-card-stock">
                          Stock: {Number(p.available_stock||0).toLocaleString()}
                          {p.expiration_date && (
                            <div className="text-xs mt-1">
                              Exp: {formatDate(p.expiration_date)}
                            </div>
                          )}
                        </div>
                        {isAlert && (
                          <div className="absolute top-1 left-1">
                            <AlertIcon />
                          </div>
                        )}
                        <div className="product-card-add-icon">
                          <PlusIcon />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* Right Panel - Cart */}
          <div className="space-y-8">
            <div className="glass-card rounded-xl shadow-lg p-6">
              <h3 className="text-xl font-semibold text-slate-700 mb-6">Shopping Cart</h3>
              
              {cart.length === 0 ? (
                <div className="text-center py-12 text-slate-500">
                  <div className="mb-4">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="mx-auto opacity-50">
                      <circle cx="9" cy="21" r="1"/>
                      <circle cx="20" cy="21" r="1"/>
                      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                    </svg>
                  </div>
                  <p className="text-lg mb-2 font-medium">Cart is empty</p>
                  <p className="text-sm">Scan or select products to add them to cart</p>
                </div>
              ) : (
                <div className="space-y-4">
                  {cart.map((item) => (
                    <div key={item.barcode} className="cart-item">
                      <div className="cart-item-info">
                        <div className="cart-item-name">{item.name}</div>
                      </div>
                      <div className="cart-item-controls">
                        <input 
                          type="number" 
                          value={item.qty} 
                          min="1" 
                          onChange={(e) => updateQuantity(item.barcode, e.target.value)} 
                          className="qty-input"
                        />
                        <div className="price-display">TSH {item.price.toLocaleString()}</div>
                        <button onClick={() => removeItem(item.barcode)} className="btn btn-outline px-3 py-1 text-sm">
                          Remove
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              
              {cart.length > 0 && (
                <>
                  <div className="flex items-center justify-between mt-6 pt-4 border-t-2 border-slate-200">
                    <div className="text-slate-600">
                      <span className="font-medium">Items: {cart.reduce((s,i)=>s+i.qty,0)}</span>
                    </div>
                    <div className="text-right">
                      <div className="text-lg font-bold text-slate-800">
                        Total: TSH {getTotalAmount().toLocaleString()}
                      </div>
                      {discount && (
                        <div className="text-sm text-green-600">
                          Discount: -TSH {discount.amount.toLocaleString()}
                          {discount.reason && ` (${discount.reason})`}
                          <button 
                            onClick={handleRemoveDiscount}
                            className="ml-2 text-red-600 hover:text-red-800 text-xs"
                          >
                            Remove
                          </button>
                        </div>
                      )}
                      {discount && (
                        <div className="text-xl font-bold text-blue-700">
                          Final: TSH {discount.finalTotal.toLocaleString()}
                        </div>
                      )}
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-3 gap-4 mt-6">
                    <button onClick={clearCart} className="btn btn-outline">
                      Clear Cart
                    </button>
                    <button 
                      onClick={() => setShowDiscountModal(true)}
                      className="btn btn-secondary"
                    >
                      {discount ? 'Edit Discount' : 'Add Discount'}
                    </button>
                    <button onClick={processPaymentWithOptions} className="btn btn-success">
                      Checkout
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>

        {/* Modals */}
        {showLogin && (
          <LoginModal users={users} onLogin={handleLogin} onCancel={() => setShowLogin(false)} />
        )}
        {showAdd && (
          <AddProductModal 
            initialBarcode={pendingBarcode} 
            onCancel={() => setShowAdd(false)} 
            onSave={addOrUpdateProduct} 
          />
        )}
        {showSales && (
          <SalesHistoryModal 
            sales={sales} 
            products={products} 
            onClose={() => setShowSales(false)} 
            onDownload={handleDownloadSales} 
            onOpenAnalytics={() => setAnalyticsOpen(true)} 
          />
        )}
        {analyticsOpen && (
          <AnalyticsModal 
            sales={sales} 
            products={products} 
            onClose={() => setAnalyticsOpen(false)} 
          />
        )}
        {showReceipt && (
          <Receipt 
            receiptNumber={receiptNumber - 1} 
            teller={TELLER_NUMBER} 
            timestampDisp={new Date().toLocaleString()} 
            items={receiptItems} 
            cart={cart.length > 0 ? cart : receiptItems.map(i => ({name: i.name, qty: i.qty, price: i.price}))} 
            total={receiptItems.reduce((s,i)=> s + i.qty*i.price, 0)} 
            onClose={closeReceipt} 
          />
        )}
        {inventoryOpen && (
          <InventoryModal
            products={products}
            onClose={() => setInventoryOpen(false)}
            onDeleteSelected={deleteSelectedProducts}
            onDeleteAll={deleteAllProducts}
            onOpenABC={() => setABCAnalysisOpen(true)}
          />
        )}
        {stockModalOpen && (
          <AddStockModal
            products={products}
            currentUser={currentUser?.name}
            onCancel={() => setStockModalOpen(false)}
            onSave={handleAddStock}
          />
        )}
        {stockHistoryOpen && (
          <StockHistoryModal
            stockLog={stockLog}
            onClose={() => setStockHistoryOpen(false)}
            onDownload={downloadStockLog}
          />
        )}
        {dataToolsOpen && (
          <DataToolsModal
            onClose={() => setDataToolsOpen(false)}
            onDeleteRange={deleteSalesInRange}
            onDeleteAll={deleteAllSales}
          />
        )}
        {userManagementOpen && isManager && (
          <UserManagementModal
            users={users}
            currentUser={currentUser}
            onClose={() => setUserManagementOpen(false)}
            onSave={handleSaveUsers}
          />
        )}
        {employeePerformanceOpen && isManager && (
          <EmployeePerformanceModal
            sales={sales}
            users={users}
            onClose={() => setEmployeePerformanceOpen(false)}
          />
        )}
        {abcAnalysisOpen && (
          <ABCAnalysisModal
            products={products}
            sales={sales}
            onClose={() => setABCAnalysisOpen(false)}
          />
        )}
        {showNotificationModal && isManager && (
          <SendNotificationModal
            onClose={() => setShowNotificationModal(false)}
            onSend={handleSendNotification}
          />
        )}
        
        {/* NEW MODALS */}
        {showDiscountModal && (
          <DiscountModal
            currentTotal={getTotalAmount()}
            onClose={() => setShowDiscountModal(false)}
            onApply={handleApplyDiscount}
          />
        )}
        {showPaymentModal && (
          <PaymentTypeModal
            total={discount ? discount.finalTotal : getTotalAmount()}
            discount={discount}
            onClose={() => setShowPaymentModal(false)}
            onConfirm={handleConfirmPayment}
          />
        )}

        {/* Toast Notification */}
        {toast && (
          <div className={`toast ${toast.type === 'success' ? 'toast-success' : toast.type === 'warning' ? 'toast-warning' : 'toast-error'}`}>
            {toast.message}
          </div>
        )}
      </main>
    </div>
  );
}

// Render the application
ReactDOM.render(<POSSystem />, document.getElementById('root'));
</script>
</body>
</html>
