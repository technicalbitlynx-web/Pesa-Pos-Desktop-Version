  const [userManagementOpen, setUserManagementOpen] = useState(false);
  const [employeePerformanceOpen, setEmployeePerformanceOpen] = useState(false);
  const [abcAnalysisOpen, setABCAnalysisOpen] = useState(false);
  const [receiptItems, setReceiptItems] = useState([]);
  const [credits, setCredits] = useState([]);
  const [creditManagementOpen, setCreditManagementOpen] = useState(false);
  
  // UPDATED: Price Editing Modal State - renamed to better reflect its purpose
  const [priceEditModalOpen, setPriceEditModalOpen] = useState(false);
  const [editingProduct, setEditingProduct] = useState(null);
  const [editingCartItem, setEditingCartItem] = useState(null);

  // Calculate alerts
  const alerts = useMemo(() => {
    let lowStock = 0, expired = 0, expiring = 0;
    
    products.forEach(p => {
      const qty = Number(p.available_stock) || 0;
      const reorderLevel = Number(p.reorder_level) || 0;
      
      if (qty <= reorderLevel && reorderLevel > 0) lowStock++;
      if (p.expiration_date && isExpired(p.expiration_date)) expired++;
      if (p.expiration_date && isExpiringSoon(p.expiration_date) && !isExpired(p.expiration_date)) expiring++;
    });
    
    return { lowStock, expired, expiring, total: lowStock + expired + expiring };
  }, [products]);

  const isManager = currentUser?.role === 'manager';

  // Auto-focus barcode input
  useEffect(() => {
    if (barcodeInputRef.current) {
      barcodeInputRef.current.focus();
    }
  }, []);

  // Toast auto-hide
  useEffect(() => {
    if (toast) {
      const timer = setTimeout(() => setToast(null), 4000);
      return () => clearTimeout(timer);
    }
  }, [toast]);

  // Load all data from localStorage on startup
  useEffect(() => {
    // Load Users
    const savedUsers = localStorage.getItem("pos_users_csv");
    if (savedUsers) {
      try {
        const parsed = parseUsersCSV(savedUsers);
        setUsers(parsed);
      } catch (_) {}
    }

    // Load Stock Log
    const savedLog = localStorage.getItem("pos_stock_log_csv");
    if (savedLog) {
      try { 
        const rows = parseStockLogCSV(savedLog); 
        setStockLog(rows); 
      } catch(_) {}
    }

    // Load Credits
    const savedCredits = localStorage.getItem("pos_credits_csv");
    if (savedCredits) {
      try {
        const parsedCredits = parseCreditsCSV(savedCredits);
        setCredits(parsedCredits);
      } catch (_) {}
    }

    // Load other data...
    const nowKey = monthKey();
    const prevKey = prevMonthKey();

    const savedSales = localStorage.getItem("pos_sales_csv");
    if (savedSales) { 
      try { 
        const parsed = parseSalesCSV(savedSales); 
        if (parsed.length > 0) setSales(parsed); 
      } catch (_) {} 
    }

    const savedUser = localStorage.getItem("pos_current_user");
    if (savedUser) { 
      try { 
        const u = JSON.parse(savedUser); 
        setCurrentUser(u); 
      } catch (_) {} 
    }

    const savedReceipt = localStorage.getItem("pos_receipt_counter");
    if (savedReceipt) setReceiptNumber(parseInt(savedReceipt, 10) || 1001);

    const savedProducts = localStorage.getItem(`pos_products_csv_${nowKey}`);
    const legacy = localStorage.getItem("pos_products_csv");

    if (savedProducts) {
      try {
        const rows = parseProductsCSV(savedProducts);
        setProducts(rows);
        setCsvURLFromRows(rows, nowKey);
        setCsvFileName(`products_${nowKey}.csv`);
        return;
      } catch (_) {}
    }

    const savedPrev = localStorage.getItem(`pos_products_csv_${prevKey}`);
    if (savedPrev) {
      try {
        const rowsPrev = parseProductsCSV(savedPrev);
        const rolled = rowsPrev.map((p) => ({ 
          ...p, 
          opening_stock: Number(p.available_stock) || 0, 
          items_sold: 0, 
          available_stock: Number(p.available_stock) || 0 
        }));
        setProducts(rolled);
        setCsvURLFromRows(rolled, nowKey);
        setCsvFileName(`products_${nowKey}.csv`);
        showToast("New month file created from last month's closing stock", "success");
        return;
      } catch (_) {}
    }
    
    if (legacy) {
      try {
        const lines = legacy.split(/\r?\n/).filter((l) => l.trim());
        const headers = lines[0].split(",").map((h) => h.trim().toLowerCase());
        const iB = headers.indexOf("barcode");
        const iN = headers.indexOf("name");
        const iP = headers.indexOf("price");
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
          const cols = splitCSVRow(lines[i]);
          const r = { 
            barcode: (cols[iB]||"").trim(), 
            name: (cols[iN]||"").trim(), 
            price: Number((cols[iP]||"").trim())||0, 
            buy_price: 0, 
            opening_stock: 0, 
            items_sold: 0, 
            available_stock: 0,
            reorder_level: 0,
            expiration_date: ""
          };
          if (r.barcode && r.name) rows.push(r);
        }
        setProducts(rows);
        setCsvURLFromRows(rows, nowKey);
        setCsvFileName(`products_${nowKey}.csv`);
      } catch (_) {}
    }
  }, []);

  // Auto-save all data when window is about to close
  useEffect(() => {
    const handleBeforeUnload = () => {
      downloadAllCSV();
    };

    window.addEventListener('beforeunload', handleBeforeUnload);
    
    return () => {
      window.removeEventListener('beforeunload', handleBeforeUnload);
    };
  }, [products, sales, credits, stockLog, users]);

  // Toast helpers
  const showToast = (message, type = "success") => {
    setToast({ message, type });
  };

  // Products map for quick lookup
  const productsMap = useMemo(() => {
    const m = new Map();
    for (const r of products) m.set(r.barcode, r);
    return m;
  }, [products]);

  // CSV persistence helpers
  function setCsvURLFromRows(rows, key = monthKey()) {
    const csv = productsToCSV(rows);
    localStorage.setItem(`pos_products_csv_${key}`, csv);
    const url = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
    if (csvURL) URL.revokeObjectURL(csvURL);
    setCsvURL(url);
  }
  
  function setSalesCsvURLFromRows(rows) {
    const csv = salesToCSV(rows);
    localStorage.setItem("pos_sales_csv", csv);
  }

  function persistCredits(creditRows) {
    const csv = creditsToCSV(creditRows);
    localStorage.setItem("pos_credits_csv", csv);
    setCredits(creditRows);
  }

  // Download all CSV files function
  function downloadAllCSV() {
    const dataToDownload = [
      { data: productsToCSV(products), filename: `products_${monthKey()}.csv` },
      { data: salesToCSV(sales), filename: `sales_${new Date().toISOString().split('T')[0]}.csv` },
      { data: creditsToCSV(credits), filename: `credits_${new Date().toISOString().split('T')[0]}.csv` },
      { data: stockLogToCSV(stockLog), filename: `stock_log_${new Date().toISOString().split('T')[0]}.csv` },
      { data: usersToCSV(users), filename: `users_${new Date().toISOString().split('T')[0]}.csv` }
    ];

    dataToDownload.forEach(({ data, filename }) => {
      const blob = new Blob([data], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    showToast("All data exported to CSV files", "success");
  }

  // Payment handler with credit tracking
  function handleConfirmPayment(paymentDetails) {
    const cartItems = pendingPayment?.cart || cart;
    const total = pendingPayment?.total || getTotalAmount();
    
    if (cartItems.length === 0) {
      showToast("Cart is empty", "error");
      return;
    }

    if (!currentUser) {
      showToast("Please login to process payments", "error");
      return;
    }

    // Check stock availability and expiration
    for (const item of cartItems) {
      const p = productsMap.get(item.barcode);
      if (!p || Number(p.available_stock || 0) < item.qty) {
        showToast(`Insufficient stock for ${item.name}`, "error");
        return;
      }
      
      if (p.expiration_date && isExpired(p.expiration_date)) {
        showToast(`Cannot sell expired product: ${item.name}`, "error");
        return;
      }
    }

    const timestampISO = new Date().toISOString();
    const currentReceipt = receiptNumber;

    // Build per-item sales + persist
    const newSales = cartItems.map((item) => {
      const prod = productsMap.get(item.barcode) || {};
      const buyP = Number(prod.buy_price) || 0;
      const itemTotal = item.price * item.qty;
      
      return {
        timestamp: timestampISO,
        receipt_number: currentReceipt,
        teller_number: TELLER_NUMBER,
        user_name: currentUser.name,
        barcode: item.barcode,
        name: item.name,
        price: item.price,
        quantity: item.qty,
        total: itemTotal,
        buy_price: buyP,
        profit: (item.price - buyP) * item.qty,
        payment_method: paymentDetails.method,
        credit_id: paymentDetails.method === "credit" ? `CREDIT_${currentReceipt}` : "",
        payment_date: paymentDetails.method === "cash" || paymentDetails.method === "card" ? timestampISO : ""
      };
    });
    
    // If it's a credit sale, create credit record
    if (paymentDetails.method === "credit") {
      const creditRecord = {
        id: `CREDIT_${currentReceipt}`,
        receipt_number: currentReceipt.toString(),
        customer_name: paymentDetails.customerName,
        customer_phone: paymentDetails.customerPhone,
        original_amount: total,
        paid_amount: 0,
        balance_amount: total,
        sale_date: timestampISO,
        due_date: paymentDetails.dueDate || new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
        status: "pending",
        payment_history: [],
        last_updated: timestampISO,
        items: cartItems.map(item => ({
          name: item.name,
          barcode: item.barcode,
          quantity: item.qty,
          price: item.price,
          total: item.qty * item.price
        }))
      };
      
      setCredits(prev => {
        const updated = [...prev, creditRecord];
        persistCredits(updated);
        return updated;
      });
    }
    
    setSales((prev) => { 
      const updatedSales = [...prev, ...newSales]; 
      setSalesCsvURLFromRows(updatedSales); 
      return updatedSales; 
    });

    // Update products stock
    setProducts((prev) => {
      const next = prev.map((p) => ({ ...p }));
      for (const it of cartItems) {
        const idx = next.findIndex((x) => x.barcode === it.barcode);
        if (idx >= 0) {
          next[idx].items_sold = Number(next[idx].items_sold)||0; 
          next[idx].available_stock = Number(next[idx].available_stock)||0;
          next[idx].items_sold += it.qty;
          next[idx].available_stock = Math.max(0, next[idx].available_stock - it.qty);
        }
      }
      setCsvURLFromRows(next);
      return next;
    });

    // Prepare receipt/invoice items
    const items = cartItems.map((i) => ({ name: i.name, qty: i.qty, price: i.price }));
    
    // Print receipt or invoice based on payment method
    const isInvoice = paymentDetails.method === "credit";
    const printDetails = {
      ...paymentDetails,
      receiptNumber: currentReceipt.toString()
    };
    
    // Store items for receipt and show receipt
    setReceiptItems(items);
    setShowReceipt(true);
    setCart([]);
    setReceiptNumber(currentReceipt + 1);
    setShowPaymentModal(false);
    setPendingPayment(null);
    localStorage.setItem("pos_receipt_counter", String(currentReceipt + 1));
    
    // Print the document
    setTimeout(() => {
      printReceiptOrInvoice(items, printDetails, isInvoice);
    }, 1000);
    
    showToast(`Payment processed${isInvoice ? ' (Invoice)' : ' (Receipt)'}: TSH ${total.toLocaleString()}`, "success");
  }

  // Update credit payment
  function handleUpdateCredit(updatedCredit, updatedSales) {
    setCredits(prev => {
      const newCredits = prev.map(c => c.id === updatedCredit.id ? updatedCredit : c);
      persistCredits(newCredits);
      return newCredits;
    });
    
    setSales(updatedSales);
    setSalesCsvURLFromRows(updatedSales);
    
    showToast(`Payment of TSH ${updatedCredit.payment_history[updatedCredit.payment_history.length - 1].amount.toLocaleString()} recorded for ${updatedCredit.customer_name}`, "success");
  }

  // Process payment with payment type selection
  function processPaymentWithOptions() {
    if (cart.length === 0) {
      showToast("Cart is empty", "error");
      return;
    }

    const total = getTotalAmount();
    setPendingPayment({
      cart: [...cart],
      total: total
    });
    setShowPaymentModal(true);
  }

  // Load CSV file
  const fileInputRef = useRef(null);
  function onOpenCSV(e) {
    const f = e.target.files?.[0]; 
    if (!f) return;
    
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const rows = parseProductsCSV(String(ev.target.result||""));
        setProducts(rows);
        setCsvURLFromRows(rows);
        setCsvFileName(f.name);
        showToast(`Loaded ${rows.length} products successfully`, "success");
      } catch (err) {
        alert("Invalid CSV format: " + err?.message);
      }
    };
    reader.readAsText(f);
    e.target.value = "";
  }

  // Add/Update product
  function addOrUpdateProduct(p) {
    setProducts((prev) => {
      const idx = prev.findIndex((x) => x.barcode === p.barcode);
      let next;
      if (idx >= 0) { 
        next = [...prev]; 
        next[idx] = { ...prev[idx], ...p }; 
      } else { 
        next = [...prev, p]; 
      }
      setCsvURLFromRows(next);
      return next;
    });
    setShowAdd(false);
    showToast("Product saved successfully", "success");
  }

  // UPDATED: Add to cart by barcode - now shows price & quantity modal
  function addToCartByBarcode(bc) {
    const p = productsMap.get(bc);
    if (!p) { 
      setPendingBarcode(bc); 
      setShowAdd(true); 
      return; 
    }
    
    if (Number(p.available_stock || 0) <= 0) {
      showToast(`${p.name} is out of stock`, "error");
      return;
    }

    // Check if expired
    if (p.expiration_date && isExpired(p.expiration_date)) {
      showToast(`${p.name} has expired (${formatDate(p.expiration_date)})`, "error");
      return;
    }

    // Warn if expiring soon
    if (p.expiration_date && isExpiringSoon(p.expiration_date)) {
      showToast(`${p.name} expires on ${formatDate(p.expiration_date)}`, "warning");
    }
    
    const defaultPrice = Number(p.price) || 0;
    
    // Show price & quantity edit modal for managers
    if (isManager) {
      setEditingProduct(p);
      setEditingCartItem({
        barcode: p.barcode,
        name: p.name,
        price: defaultPrice,
        qty: 1
      });
      setPriceEditModalOpen(true);
      return;
    }
    
    // For non-managers, add with default price and quantity 1
    setCart((prev) => {
      const idx = prev.findIndex((x) => x.barcode === bc);
      if (idx >= 0) { 
        const next = [...prev]; 
        const newQty = next[idx].qty + 1;
        if (newQty > Number(p.available_stock || 0)) {
          showToast(`Only ${p.available_stock} units available`, "error");
          return prev;
        }
        next[idx] = { ...next[idx], qty: newQty }; 
        return next; 
      }
      return [...prev, { 
        barcode: p.barcode, 
        name: p.name, 
        price: defaultPrice, 
        qty: 1 
      }];
    });
    showToast(`${p.name} added to cart at TSH ${defaultPrice.toLocaleString()}`, "success");
  }

  // UPDATED: Handle price and quantity edit from modal
  function handlePriceEditSave(newPrice, newQuantity) {
    if (!editingProduct || !editingCartItem) return;
    
    const { barcode, name } = editingCartItem;
    const p = productsMap.get(barcode);
    
    // Check stock
    if (newQuantity > Number(p.available_stock || 0)) {
      showToast(`Only ${p.available_stock} units available`, "error");
      setPriceEditModalOpen(false);
      setEditingProduct(null);
      setEditingCartItem(null);
      return;
    }
    
    setCart((prev) => {
      const idx = prev.findIndex((x) => x.barcode === barcode);
      if (idx >= 0) { 
        const next = [...prev]; 
        next[idx] = { ...next[idx], qty: newQuantity, price: newPrice }; 
        return next; 
      }
      return [...prev, { 
        barcode: barcode, 
        name: name, 
        price: newPrice, 
        qty: newQuantity 
      }];
    });
    
    showToast(`${name} (${newQuantity} units) added to cart at TSH ${newPrice.toLocaleString()} each`, "success");
    setPriceEditModalOpen(false);
    setEditingProduct(null);
    setEditingCartItem(null);
  }

  // UPDATED: Allow price editing when updating quantity for managers
  function updateQuantity(bc, q) {
    const qty = Math.max(1, Number(q) || 1);
    const p = productsMap.get(bc);
    
    if (p && qty > Number(p.available_stock || 0)) {
      showToast(`Only ${p.available_stock} units available`, "error");
      return;
    }
    
    // For managers, show price edit modal when changing quantity
    if (isManager) {
      const item = cart.find(x => x.barcode === bc);
      if (item) {
        setEditingProduct(p);
        setEditingCartItem({
          barcode: bc,
          name: item.name,
          price: item.price,
          qty: qty
        });
        setPriceEditModalOpen(true);
        return;
      }
    }
    
    setCart((prev) => prev.map((x) => x.barcode === bc ? { ...x, qty } : x));
  }
  
  function removeItem(bc) {
    setCart((prev) => prev.filter((x) => x.barcode !== bc));
  }
  
  function clearCart() { 
    setCart([]); 
    showToast("Cart cleared", "success");
  }

  function getTotalAmount() { 
    return cart.reduce((s, i) => s + i.qty * i.price, 0); 
  }

  // Update the stock handler to handle price changes
  function handleAddStock({ barcode, qty, buy_price, sell_price, user }) {
    const p = productsMap.get(barcode);
    if (!p) { 
      alert("Product not found. Please add the product first."); 
      return; 
    }
    
    const qtyChange = Number(qty || 0);
    const newAvailable = Math.max(0, (Number(p.available_stock) || 0) + qtyChange);
    const newBuyPrice = buy_price !== null ? Number(buy_price) : Number(p.buy_price);
    const newSellPrice = sell_price !== null ? Number(sell_price) : Number(p.price);
    
    setProducts(prev => {
      const next = prev.map(x => x.barcode === barcode
        ? {
            ...x,
            available_stock: newAvailable,
            buy_price: newBuyPrice,
            price: newSellPrice
          }
        : x
      );
      setCsvURLFromRows(next);
      return next;
    });
    
    const entry = {
      timestamp: new Date().toISOString(),
      user: user || (currentUser?.name || "Manager"),
      barcode,
      name: p.name,
      qty: qtyChange,
      buy_price: newBuyPrice,
      sell_price: newSellPrice
    };
    
    persistStockLog([...stockLog, entry]);
    setStockModalOpen(false);
    showToast(`Stock and prices updated for ${p.name}`, "success");
  }
  
  function downloadStockLog() {
    const csv = stockLogToCSV(stockLog);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; 
    a.download = `stock_log_${new Date().toISOString().split("T")[0]}.csv`;
    document.body.appendChild(a); 
    a.click(); 
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function persistStockLog(rows) {
    const csv = stockLogToCSV(rows);
    localStorage.setItem("pos_stock_log_csv", csv);
    setStockLog(rows);
  }

  // Sales deletion handlers
  function deleteSalesInRange(fromStr, toStr) {
    const from = fromStr ? new Date(fromStr+"T00:00:00").getTime() : -Infinity;
    const to   = toStr   ? new Date(toStr+"T23:59:59").getTime()   : +Infinity;
    
    setSales(prev => {
      const kept = prev.filter(s => {
        const t = new Date(s.timestamp).getTime();
        return !(t >= from && t <= to);
      });
      setSalesCsvURLFromRows(kept);
      return kept;
    });
    showToast("Selected sales period deleted", "success");
  }
  
  function deleteAllSales() {
    setSales(()=> {
      const empty = [];
      setSalesCsvURLFromRows(empty);
      return empty;
    });
    showToast("All sales history deleted", "success");
  }

  // Inventory delete handlers
  function deleteSelectedProducts(barcodes) {
    setProducts(prev => {
      const next = prev.filter(p => !barcodes.includes(p.barcode));
      setCsvURLFromRows(next);
      return next;
    });
    showToast(`${barcodes.length} products deleted`, "success");
  }
  
  function deleteAllProducts() {
    setProducts(() => {
      const next = [];
      setCsvURLFromRows(next);
      return next;
    });
    showToast("All products deleted from current month", "success");
  }

  // Barcode submit handler
  function handleBarcodeSubmit(e) { 
    e.preventDefault(); 
    if (!barcode.trim()) return; 
    addToCartByBarcode(barcode.trim()); 
    setBarcode(""); 
    setTimeout(() => {
      if (barcodeInputRef.current) {
        barcodeInputRef.current.focus();
      }
    }, 100);
  }

  function handleDownloadSales() {
    const csv = salesToCSV(sales);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; 
    a.download = `sales_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a); 
    a.click(); 
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function handleLogin(u) { 
    setCurrentUser(u); 
    localStorage.setItem("pos_current_user", JSON.stringify(u)); 
    setShowLogin(false); 
    showToast(`Welcome, ${u.name}`, "success");
  }
  
  function handleLogout() { 
    setCurrentUser(null); 
    localStorage.removeItem("pos_current_user"); 
    showToast("Logged out successfully", "success");
  }
  
  function closeReceipt() { 
    setShowReceipt(false); 
  }

  function selfTest() { 
    alert("Printer test: Use the sales/receipt print buttons to test your configured printer."); 
  }

  // Filter products with alerts for display
  const productsWithAlerts = useMemo(() => {
    return products.filter(p => {
      const qty = Number(p.available_stock) || 0;
      const reorderLevel = Number(p.reorder_level) || 0;
      
      return (qty <= reorderLevel && reorderLevel > 0) ||
             (p.expiration_date && isExpired(p.expiration_date)) ||
             (p.expiration_date && isExpiringSoon(p.expiration_date));
    });
  }, [products]);

  const getProductAlertClass = (p) => {
    if (p.expiration_date && isExpired(p.expiration_date)) {
      return "expired-item";
    }
    if (p.expiration_date && isExpiringSoon(p.expiration_date)) {
      return "expiring-soon-item";
    }
    if (Number(p.available_stock) <= Number(p.reorder_level) && Number(p.reorder_level) > 0) {
      return "low-stock-item";
    }
    return "";
  };

  return (
    <div className="min-h-screen gradient-bg text-slate-800">
      <header className="sticky top-0 z-20 glass-card border-b border-slate-200">
        <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <img src="./Zabbb Phone Accesories.jpeg" alt="DM Logo" className="h-12 w-auto drop-shadow-md" />
            <div>
              <h1 className="text-2xl font-bold text-gradient">Zabbb Phone Accesories</h1>
              <p className="text-sm text-slate-600 baseline-safe">"We love to serve you"</p>
            </div>
          </div>
          
          <div className="flex items-center gap-3">
  {alerts.total > 0 && (
    <div className="relative">
      <button 
        onClick={() => setInventoryOpen(true)} 
        className="btn btn-secondary relative"
        title={`${alerts.lowStock} low stock, ${alerts.expired} expired, ${alerts.expiring} expiring soon`}
      >
        <AlertIcon />
        <span>Alerts</span>
        <AlertBadge count={alerts.total} />
      </button>
    </div>
  )}
  {currentUser ? (
    <div className="flex items-center gap-3 bg-green-50 text-green-800 px-4 py-2 rounded-full border border-green-200">
      <UserIcon />
      <div className="flex flex-col items-start">
        <span className="font-medium text-sm">{currentUser.name}</span>
        <span className="text-xs opacity-75">{currentUser.role}</span>
      </div>
      <button onClick={handleLogout} className="text-green-600 hover:text-green-800 text-sm font-medium">
        Logout
      </button>
    </div>
  ) : (
    <button onClick={() => setShowLogin(true)} className="btn btn-primary">
      <UserIcon />
      <span>Login</span>
    </button>
  )}
</div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-8">
        {/* Alert Banner */}
        {alerts.total > 0 && (
          <div className="mb-6 p-4 bg-gradient-to-r from-yellow-50 to-orange-50 border border-yellow-200 rounded-lg">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <AlertIcon />
                <div>
                  <h3 className="font-semibold text-yellow-800">Inventory Alerts</h3>
                  <p className="text-sm text-yellow-700">
                    {alerts.lowStock > 0 && `${alerts.lowStock} low stock`}
                    {alerts.expired > 0 && (alerts.lowStock > 0 ? `, ${alerts.expired} expired` : `${alerts.expired} expired`)}
                    {alerts.expiring > 0 && (alerts.lowStock > 0 || alerts.expired > 0 ? `, ${alerts.expiring} expiring soon` : `${alerts.expiring} expiring soon`)}
                  </p>
                </div>
              </div>
              <button onClick={() => setInventoryOpen(true)} className="btn btn-outline btn-sm">
                View Details
              </button>
            </div>
          </div>
        )}

        {isManager && (
          <div className="glass-card rounded-xl shadow-lg p-6 mb-8">
            <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
              <div className="flex flex-col sm:flex-row sm:items-center gap-4">
                <button onClick={() => fileInputRef.current?.click()} className="btn btn-secondary text-xs px-3 whitespace-nowrap">
                  Load CSV
                </button>
                <input type="file" accept=".csv" className="hidden" ref={fileInputRef} onChange={onOpenCSV} />
                <div className="text-slate-600 text-sm">
                  <strong>{products.length}</strong> products loaded 
                  {products.length > 0 && <span className="text-slate-500"> from {csvFileName}</span>}
                </div>
              </div>
              
              <div className="flex flex-wrap items-center gap-2">
                <button onClick={() => setShowSales(true)} className="btn btn-secondary text-sm px-3 py-1">
                  <SalesIcon /> Sales
                </button>
                <button onClick={() => { setPendingBarcode(""); setShowAdd(true); }} className="btn btn-primary text-sm px-3 py-1">
                  <PlusIcon /> Product
                </button>
                <button onClick={() => setInventoryOpen(true)} className="btn btn-secondary text-sm px-3 py-1 relative">
                  Inventory
                  {alerts.total > 0 && <AlertBadge count={alerts.total} />}
                </button>
                <button onClick={() => setStockModalOpen(true)} className="btn btn-success text-sm px-3 py-1">
                  Add Stock
                </button>
                <button onClick={() => setStockHistoryOpen(true)} className="btn btn-secondary text-sm px-3 py-1">
                  Stock History
                </button>
                <button onClick={() => setUserManagementOpen(true)} className="btn btn-secondary text-sm px-3 py-1">
                  <UsersIcon /> Users
                </button>
                <button onClick={() => setEmployeePerformanceOpen(true)} className="btn btn-secondary text-sm px-3 py-1">
                  <TrendingUpIcon /> Performance
                </button>
                <button onClick={() => setCreditManagementOpen(true)} className="btn btn-secondary text-sm px-3 py-1">
                  <CreditIcon /> Credits
                </button>
                <button onClick={() => setDataToolsOpen(true)} className="btn btn-secondary text-sm px-3 py-1">
                  Data Tools
                </button>
                <button onClick={downloadAllCSV} className="btn btn-primary text-sm px-3 py-1">
                  <DownloadIcon /> Export All
                </button>
                {csvURL && (
                  <a download={csvFileName || `products_${monthKey()}.csv`} href={csvURL} className="btn btn-outline text-sm px-3 py-1">
                    <DownloadIcon /> Products CSV
                  </a>
                )}
              </div>
            </div>
            
            <div className="mt-4 p-4 bg-blue-50 rounded-lg">
              <p className="text-xs text-blue-800">
                <strong>Enhanced CSV Format:</strong> <code className="mono bg-white px-1 rounded">barcode,name,price,buy_price,opening_stock,items_sold,available_stock,reorder_level,expiration_date</code>
                <br />
                New features: Credit tracking, low stock alerts, expiration tracking, sales reporting, user management, employee performance, and ABC analysis.
              </p>
            </div>
          </div>
        )}

        <div className="grid lg:grid-cols-3 gap-8">
          {/* Left Panel - Barcode Scanner & Products */}
          <div className="lg:col-span-2 space-y-8">
            {/* Barcode Scanner */}
            <div className="glass-card rounded-xl shadow-lg p-6 hover-scale">
              <div className="flex items-center gap-3 text-slate-700 mb-6">
                <BarcodeIcon />
                <h3 className="text-xl font-semibold">Barcode Scanner</h3>
              </div>
              <form onSubmit={handleBarcodeSubmit} className="flex gap-4">
                <input 
                  ref={barcodeInputRef} 
                  value={barcode} 
                  onChange={(e) => setBarcode(e.target.value)} 
                  placeholder="Scan or type barcode to add to cart" 
                  className="form-input flex-1 text-lg h-14" 
                />
                <button type="submit" className="btn btn-primary px-6 h-14 text-lg">
                  <CartIcon />
                </button>
              </form>
              <div className="mt-4">
  <input 
    list="desc-suggestions"
    value={descQuery}
    onChange={(e) => {
      const v = e.target.value;
      setDescQuery(v);
      if (v.includes("—")) {
        const bc = v.split("—")[0].trim();
        if (productsMap.has(bc)) {
          addToCartByBarcode(bc);
          setDescQuery("");
          setTimeout(() => {
            if (barcodeInputRef.current) barcodeInputRef.current.focus();
          }, 50);
        }
      }
    }}
    placeholder="Type description, name, or barcode and pick…"
    className="form-input w-full"
  />
  <datalist id="desc-suggestions">
    {products.map((p) => (
      <option
        key={p.barcode}
        value={`${p.barcode} — ${p.name}`}
      />
    ))}
  </datalist>
</div>

              {barcode && !productsMap.has(barcode.trim()) && (
                <div className="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg">
                  <p className="text-sm text-amber-800">
                    <strong>Product not found.</strong> Press the cart icon to create a new product with this barcode.
                  </p>
                </div>
              )}
            </div>

            {/* Quick Access Products */}
            <div className="glass-card rounded-xl shadow-lg p-6">
              <h3 className="text-xl font-semibold text-slate-700 mb-6">Quick Access Products</h3>
              {products.length === 0 ? (
                <div className="text-center py-12 text-slate-500">
                  <p className="text-lg mb-2">No products available</p>
                  <p className="text-sm">
                    {isManager ? "Load a products CSV file to see quick access items." : "Contact manager to load products."}
                  </p>
                </div>
              ) : (
                <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4">
                  {products.slice(0, 12).map((p) => {
                    const alertClass = getProductAlertClass(p);
                    const isAlert = alertClass !== "";
                    
                    return (
                      <div 
                        key={p.barcode} 
                        className={`product-card ${alertClass}`} 
                        onClick={() => addToCartByBarcode(p.barcode)}
                      >
                        <div className="product-card-name">{p.name}</div>
                        <div className="product-card-price">TSH {Number(p.price).toLocaleString()}</div>
                        <div className="product-card-stock">
                          Stock: {Number(p.available_stock||0).toLocaleString()}
                          {p.expiration_date && (
                            <div className="text-xs mt-1">
                              Exp: {formatDate(p.expiration_date)}
                            </div>
                          )}
                        </div>
                        {isAlert && (
                          <div className="absolute top-1 left-1">
                            <AlertIcon />
                          </div>
                        )}
                        <div className="product-card-add-icon">
                          <PlusIcon />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* Right Panel - Cart */}
          <div className="space-y-8">
            <div className="glass-card rounded-xl shadow-lg p-6">
              <h3 className="text-xl font-semibold text-slate-700 mb-6">Shopping Cart</h3>
              
              {cart.length === 0 ? (
                <div className="text-center py-12 text-slate-500">
                  <div className="mb-4">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="mx-auto opacity-50">
                      <circle cx="9" cy="21" r="1"/>
                      <circle cx="20" cy="21" r="1"/>
                      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                    </svg>
                  </div>
                  <p className="text-lg mb-2">Cart is empty</p>
                  <p className="text-sm">Scan or select products to add them to cart</p>
                </div>
              ) : (
                <div className="space-y-4">
                  {cart.map((item) => (
                    <div key={item.barcode} className="cart-item">
                      <div className="cart-item-info">
                        <div className="cart-item-name">{item.name}</div>
                        <div className="text-xs text-slate-500">
                          Price: TSH {item.price.toLocaleString()} each
                        </div>
                      </div>
                      <div className="cart-item-controls">
                        <input 
                          type="number" 
                          value={item.qty} 
                          min="1" 
                          onChange={(e) => updateQuantity(item.barcode, e.target.value)} 
                          className="qty-input"
                        />
                        <div className="price-display">TSH {item.price.toLocaleString()}</div>
                        <button onClick={() => removeItem(item.barcode)} className="btn btn-outline px-3 py-1 text-sm">
                          Remove
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              
              {cart.length > 0 && (
                <>
                  <div className="flex items-center justify-between mt-6 pt-4 border-t-2 border-slate-200">
                    <div className="text-slate-600">
                      <span className="font-medium">Items: {cart.reduce((s,i)=>s+i.qty,0)}</span>
                    </div>
                    <div className="text-right">
                      <div className="text-lg font-bold mono text-slate-800">
                        Total: TSH {getTotalAmount().toLocaleString()}
                      </div>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4 mt-6">
                    <button onClick={clearCart} className="btn btn-outline">
                      Clear Cart
                    </button>
                    <button onClick={processPaymentWithOptions} className="btn btn-success">
                      Checkout
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>

        {/* Modals */}
        {showLogin && (
          <LoginModal users={users} onLogin={handleLogin} onCancel={() => setShowLogin(false)} />
        )}
        {showAdd && (
          <AddProductModal 
            initialBarcode={pendingBarcode} 
            onCancel={() => setShowAdd(false)} 
            onSave={addOrUpdateProduct} 
          />
        )}
        {showSales && (
          <SalesHistoryModal 
            sales={sales} 
            products={products}
            credits={credits}
            onClose={() => setShowSales(false)} 
            onDownload={handleDownloadSales} 
            onOpenAnalytics={() => setAnalyticsOpen(true)} 
            onOpenCredits={() => setCreditManagementOpen(true)}
          />
        )}
        {analyticsOpen && (
          <AnalyticsModal 
            sales={sales} 
            products={products} 
            onClose={() => setAnalyticsOpen(false)} 
          />
        )}
        {showReceipt && (
          <Receipt 
            receiptNumber={receiptNumber - 1} 
            teller={TELLER_NUMBER} 
            timestampDisp={new Date().toLocaleString()} 
            items={receiptItems} 
            cart={cart.length > 0 ? cart : receiptItems.map(i => ({name: i.name, qty: i.qty, price: i.price}))} 
            total={receiptItems.reduce((s,i)=> s + i.qty*i.price, 0)} 
            onClose={closeReceipt} 
          />
        )}
        {inventoryOpen && (
          <InventoryModal
            products={products}
            onClose={() => setInventoryOpen(false)}
            onDeleteSelected={deleteSelectedProducts}
            onDeleteAll={deleteAllProducts}
            onOpenABC={() => setABCAnalysisOpen(true)}
          />
        )}
        {stockModalOpen && (
          <AddStockModal
            products={products}
            currentUser={currentUser?.name}
            onCancel={() => setStockModalOpen(false)}
            onSave={handleAddStock}
          />
        )}
        {stockHistoryOpen && (
          <StockHistoryModal
            stockLog={stockLog}
            onClose={() => setStockHistoryOpen(false)}
            onDownload={downloadStockLog}
          />
        )}
        {dataToolsOpen && (
          <DataToolsModal
            onClose={() => setDataToolsOpen(false)}
            onDeleteRange={deleteSalesInRange}
            onDeleteAll={deleteAllSales}
          />
        )}
        {userManagementOpen && isManager && (
          <UserManagementModal
            users={users}
            currentUser={currentUser}
            onClose={() => setUserManagementOpen(false)}
            onSave={persistUsers}
          />
        )}
        {employeePerformanceOpen && isManager && (
          <EmployeePerformanceModal
            sales={sales}
            users={users}
            onClose={() => setEmployeePerformanceOpen(false)}
          />
        )}
        {abcAnalysisOpen && (
          <ABCAnalysisModal
            products={products}
            sales={sales}
            onClose={() => setABCAnalysisOpen(false)}
          />
        )}
        {creditManagementOpen && (
          <CreditManagementModal
            credits={credits}
            sales={sales}
            onClose={() => setCreditManagementOpen(false)}
            onUpdateCredit={handleUpdateCredit}
          />
        )}
        
        {/* UPDATED: PRICE & QUANTITY EDIT MODAL */}
        {priceEditModalOpen && editingProduct && (
          <PriceEditModal
            product={editingProduct}
            currentPrice={editingCartItem?.price || editingProduct.price}
            currentQuantity={editingCartItem?.qty || 1}
            onClose={() => {
              setPriceEditModalOpen(false);
              setEditingProduct(null);
              setEditingCartItem(null);
            }}
            onSave={handlePriceEditSave}
          />
        )}
        
        {/* PAYMENT MODAL */}
        {showPaymentModal && (
          <PaymentTypeModal
            total={getTotalAmount()}
            onClose={() => setShowPaymentModal(false)}
            onConfirm={handleConfirmPayment}
          />
        )}

        {/* Toast Notification */}
        {toast && (
          <div className={`toast ${toast.type === 'success' ? 'toast-success' : toast.type === 'warning' ? 'toast-warning' : 'toast-error'}`}>
            {toast.message}
          </div>
        )}
      </main>
    </div>
  );
}

// Render the application
ReactDOM.render(<POSSystem />, document.getElementById('root'));
</script>
</body>
</html>
