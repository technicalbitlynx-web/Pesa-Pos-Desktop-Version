/* ---------- Time helpers (monthly files) ---------- */
function monthKey(d=new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2, "0");
  return `${y}_${m}`;
}
function prevMonthKey(d=new Date()) {
  const prev = new Date(d.getFullYear(), d.getMonth()-1, 1);
  return monthKey(prev);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString();
}

function isExpired(expirationDate) {
  if (!expirationDate) return false;
  return new Date(expirationDate) < new Date();
}

function isExpiringSoon(expirationDate, days = 7) {
  if (!expirationDate) return false;
  const expDate = new Date(expirationDate);
  const warningDate = new Date();
  warningDate.setDate(warningDate.getDate() + days);
  return expDate <= warningDate && expDate >= new Date();
}

function getDaysBetween(date1, date2) {
  const oneDay = 24 * 60 * 60 * 1000;
  return Math.round((new Date(date1) - new Date(date2)) / oneDay);
}

/* ---------- Credit Sales Management ---------- */
function parseCreditsCSV(text) {
  const lines = text.split(/\r?\n/).filter((l) => l.trim());
  if (lines.length === 0) return [];
  const headers = lines[0].split(",").map((h) => h.trim().toLowerCase());
  const hIndex = (h) => headers.indexOf(h);
  const rows = [];
  
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVRow(lines[i]);
    const row = {
      id: hIndex("id") >= 0 ? (cols[hIndex("id")] || "").trim() : "",
      receipt_number: hIndex("receipt_number") >= 0 ? (cols[hIndex("receipt_number")] || "").trim() : "",
      customer_name: hIndex("customer_name") >= 0 ? (cols[hIndex("customer_name")] || "").trim() : "",
      customer_phone: hIndex("customer_phone") >= 0 ? (cols[hIndex("customer_phone")] || "").trim() : "",
      original_amount: hIndex("original_amount") >= 0 ? Number((cols[hIndex("original_amount")] || "0").trim()) : 0,
      paid_amount: hIndex("paid_amount") >= 0 ? Number((cols[hIndex("paid_amount")] || "0").trim()) : 0,
      balance_amount: hIndex("balance_amount") >= 0 ? Number((cols[hIndex("balance_amount")] || "0").trim()) : 0,
      sale_date: hIndex("sale_date") >= 0 ? (cols[hIndex("sale_date")] || "").trim() : "",

      status: hIndex("status") >= 0 ? (cols[hIndex("status")] || "").trim() : "pending",

      last_updated: hIndex("last_updated") >= 0 ? (cols[hIndex("last_updated")] || "").trim() : "",
      items: hIndex("items") >= 0 ? JSON.parse(cols[hIndex("items")] || "[]") : []

    if (row.receipt_number && row.customer_name) rows.push(row);

}

function creditsToCSV(rows) {

  const esc = (v) => {

  const body = rows

/* ---------- Products CSV Helpers (Enhanced with new fields) ---------- */
function parseProductsCSV(text) {

/* ---------- Sales CSV (with buy_price & profit & user info & payment method & credit_id) ---------- */
function parseSalesCSV(text) {
  const lines = text.split(/\r?\n/).filter((l) => l.trim());
  if (lines.length === 0) return [];
  const headers = lines[0].split(",").map((h) => h.trim().toLowerCase());
  const idxTimestamp = headers.indexOf("timestamp");
  const idxReceipt = headers.indexOf("receipt_number");
  const idxTeller = headers.indexOf("teller_number");
  const idxUser = headers.indexOf("user_name");
  const idxBarcode = headers.indexOf("barcode");
  const idxName = headers.indexOf("name");
  const idxPrice = headers.indexOf("price");
  const idxQuantity = headers.indexOf("quantity");
  const idxTotal = headers.indexOf("total");
  const idxBuy = headers.indexOf("buy_price");
  const idxProfit = headers.indexOf("profit");
  const idxPaymentMethod = headers.indexOf("payment_method");
  const idxCreditId = headers.indexOf("credit_id");
  const idxPaymentDate = headers.indexOf("payment_date");
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVRow(lines[i]);
    const timestamp = idxTimestamp >= 0 ? (cols[idxTimestamp] || "").trim() : "";
    const receipt = idxReceipt >= 0 ? (cols[idxReceipt] || "").trim() : "";
    const teller = idxTeller >= 0 ? (cols[idxTeller] || "").trim() : "";
    const user_name = idxUser >= 0 ? (cols[idxUser] || "").trim() : "";
    const barcode = idxBarcode >= 0 ? (cols[idxBarcode] || "").trim() : "";
    const name = idxName >= 0 ? (cols[idxName] || "").trim() : "";
    const price = idxPrice >= 0 ? Number((cols[idxPrice] || "").trim()) : NaN;
    const quantity = idxQuantity >= 0 ? Number((cols[idxQuantity] || "").trim()) : NaN;
    const total = idxTotal >= 0 ? Number((cols[idxTotal] || "").trim()) : NaN;
    const buy_price = idxBuy >= 0 ? Number((cols[idxBuy] || "").trim()) : 0;
    const profit = idxProfit >= 0 ? Number((cols[idxProfit] || "").trim()) : (price - buy_price) * quantity;
    const payment_method = idxPaymentMethod >= 0 ? (cols[idxPaymentMethod] || "").trim() : "cash";
    const credit_id = idxCreditId >= 0 ? (cols[idxCreditId] || "").trim() : "";
    const payment_date = idxPaymentDate >= 0 ? (cols[idxPaymentDate] || "").trim() : "";
    
    if (timestamp && receipt && teller && barcode && name && !Number.isNaN(price) && !Number.isNaN(quantity) && !Number.isNaN(total)) {
      out.push({ 
        timestamp, 
        receipt_number: receipt, 
        teller_number: teller, 
        user_name: user_name || "Unknown", 
        barcode, 
        name, 
        price, 
        quantity, 
        total, 
        buy_price, 
        profit, 
        payment_method,
        credit_id,
        payment_date
      });
    }
  }
  return out;
}

  const esc = (v) => {
    const s = String(v || "");
    return /[\",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const body = sales
    .map((s) => [
      esc(s.timestamp), 
      esc(s.receipt_number), 
      esc(s.teller_number), 
      esc(s.user_name || "Unknown"), 
      esc(s.barcode), 
      esc(s.name), 
      esc(s.price), 
      esc(s.quantity), 
      esc(s.total), 
      esc(s.buy_price ?? 0), 
      esc(s.profit ?? ((s.price - (s.buy_price ?? 0)) * s.quantity)),
      esc(s.payment_method || "cash"),
      esc(s.credit_id || ""),
      esc(s.payment_date || "")
    ].join(","))
    .join("\n");
  return header + "\n" + body + "\n";
}

function splitCSVRow(row) {
  const result = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') {
      if (inQuotes && row[i + 1] === '"') { cur += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (ch === ',' && !inQuotes) { result.push(cur); cur = ""; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

/* ---------- Stock Log CSV (restocking history) ---------- */
function parseStockLogCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) return [];
  const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
  const H = n => headers.indexOf(n);
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVRow(lines[i]);
    const row = {
      timestamp: (cols[H("timestamp")] || "").trim(),
      user: (cols[H("user")] || "").trim(),
      barcode: (cols[H("barcode")] || "").trim(),
      name: (cols[H("name")] || "").trim(),
      qty: Number((cols[H("qty")] || "0").trim()),
      buy_price: Number((cols[H("buy_price")] || "0").trim()),
      sell_price: Number((cols[H("sell_price")] || "0").trim()),
    };
    if (row.timestamp && row.barcode) out.push(row);
  }
  return out;
}

function stockLogToCSV(rows) {
  const header = "timestamp,user,barcode,name,qty,buy_price,sell_price";
  const esc = (v) => {
    const s = String(v ?? "");
    return /[\",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const body = rows.map(r => [
    esc(r.timestamp), esc(r.user || ""), esc(r.barcode), esc(r.name || ""),
    esc(r.qty), esc(r.buy_price ?? 0), esc(r.sell_price ?? 0)
  ].join(",")).join("\n");
  return header + "\n" + body + "\n";
}

/* ---------- User Management CSV ---------- */
function parseUsersCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) return DEFAULT_USERS;
  const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
  const H = n => headers.indexOf(n);
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVRow(lines[i]);
    const user = {
      id: Number((cols[H("id")] || "0").trim()),
      username: (cols[H("username")] || "").trim(),
      password: (cols[H("password")] || "").trim(),
      name: (cols[H("name")] || "").trim(),
      role: (cols[H("role")] || "teller").trim(),
      created: (cols[H("created")] || new Date().toISOString()).trim(),
    };
    if (user.username && user.password) out.push(user);
  }
  return out.length > 0 ? out : DEFAULT_USERS;
}

function usersToCSV(users) {
  const header = "id,username,password,name,role,created";
  const esc = (v) => {
    const s = String(v ?? "");
    return /[\",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const body = users.map(u => [
    esc(u.id), esc(u.username), esc(u.password), esc(u.name), esc(u.role), esc(u.created)
  ].join(",")).join("\n");
  return header + "\n" + body + "\n";
}

/* ---------- Payment Type Modal ---------- */
function PaymentTypeModal({ total, onClose, onConfirm }) {
  const [paymentMethod, setPaymentMethod] = useState("cash");
  const [cashReceived, setCashReceived] = useState("");
  const [customerName, setCustomerName] = useState("");
  const [customerPhone, setCustomerPhone] = useState("");
  const [dueDate, setDueDate] = useState("");

  const calculateChange = () => {
    if (paymentMethod !== "cash") return 0;
    const received = parseFloat(cashReceived) || 0;
    return Math.max(0, received - total);
  };

  const change = calculateChange();

  // Set default due date to 30 days from now
  useEffect(() => {
    if (paymentMethod === "credit" && !dueDate) {
      const futureDate = new Date();
      futureDate.setDate(futureDate.getDate() + 30);
      setDueDate(futureDate.toISOString().split('T')[0]);
    }
  }, [paymentMethod, dueDate]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-md p-6">
        <div className="text-center mb-6">
          <h2 className="text-2xl font-bold text-slate-800">Payment Details</h2>
          <div className="text-lg font-medium text-slate-700">
            Total: TSH {total.toLocaleString()}
          </div>
        </div>

        <div className="space-y-4">
          <div>
            <label className="form-label">Payment Method</label>
            <div className="grid grid-cols-3 gap-2">
              <button 
                className={`btn ${paymentMethod === "cash" ? "btn-primary" : "btn-outline"}`}
                onClick={() => setPaymentMethod("cash")}
              >
                Cash
              </button>
              <button 
                className={`btn ${paymentMethod === "credit" ? "btn-primary" : "btn-outline"}`}
                onClick={() => setPaymentMethod("credit")}
              >
                Credit
              </button>
              <button 
                className={`btn ${paymentMethod === "card" ? "btn-primary" : "btn-outline"}`}
                onClick={() => setPaymentMethod("card")}
              >
                Card
              </button>
            </div>
          </div>

          {paymentMethod === "cash" && (
            <div>
              <label className="form-label">Cash Received (TSH)</label>
              <input 
                type="number"
                value={cashReceived}
                onChange={(e) => setCashReceived(e.target.value)}
                className="form-input"
                placeholder="Enter amount received"
                min={total}
                step="1"
              />
              {cashReceived && parseFloat(cashReceived) >= total && (
                <div className="mt-2 p-2 bg-green-50 text-green-700 rounded">
                  Change: TSH {change.toLocaleString()}
                </div>
              )}
            </div>
          )}

          {paymentMethod === "credit" && (
            <div className="space-y-3">
              <div>
                <label className="form-label">Customer Name *</label>
                <input 
                  type="text"
                  value={customerName}
                  onChange={(e) => setCustomerName(e.target.value)}
                  className="form-input"
                  placeholder="Enter customer name"
                  required
                />
              </div>
              <div>
                <label className="form-label">Customer Phone</label>
                <input 
                  type="tel"
                  value={customerPhone}
                  onChange={(e) => setCustomerPhone(e.target.value)}
                  className="form-input"
                  placeholder="Enter phone number"
                />
              </div>
              <div>
                <label className="form-label">Due Date</label>
                <input 
                  type="date"
                  value={dueDate}
                  onChange={(e) => setDueDate(e.target.value)}
                  className="form-input"
                  required
                />
              </div>
            </div>
          )}

          <div className="p-3 bg-blue-50 rounded-lg">
            <div className="text-sm text-blue-800">
              <strong>Note:</strong> {paymentMethod === "cash" 
                ? "A receipt will be printed after payment confirmation."
                : paymentMethod === "credit" 
                ? "An invoice will be printed with customer details. You can update payment later."
                : "Card payment receipt will be printed."
              }
            </div>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-4 mt-6">
          <button onClick={onClose} className="btn btn-outline">
            Back
          </button>
          <button 
            onClick={() => onConfirm({
              method: paymentMethod,
              cashReceived: parseFloat(cashReceived) || 0,
              change: change,
              customerName: customerName.trim(),
              customerPhone: customerPhone.trim(),
              dueDate: dueDate
            })}
            className="btn btn-success"
            disabled={
              paymentMethod === "cash" && (!cashReceived || parseFloat(cashReceived) < total) ||
              paymentMethod === "credit" && !customerName.trim()
            }
          >
            Confirm Payment
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------- Updated Receipt/Invoice Builder ---------- */
function buildReceiptHTML(items, paymentDetails, isInvoice = false) {
  const subtotal = items.reduce((s,i)=> s + (Number(i.qty)||0) * (Number(i.price)||0), 0);
  const total = subtotal;
  const change = paymentDetails?.change || 0;
  const cashReceived = paymentDetails?.cashReceived || 0;
  
  const rows = items.map(i => {
    const qty = Number(i.qty)||0;
    const price = Number(i.price)||0;
    const line = qty * price;
    const safeName = String(i.name ?? "").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return `<tr>
      <td class="desc">${safeName}</td>
      <td class="qty" style="text-align:right">${qty}</td>
      <td class="price" style="text-align:right">TSH ${price.toLocaleString()}</td>
      <td class="total" style="text-align:right">TSH ${line.toLocaleString()}</td>
    </tr>`;
  }).join("");
  
  const now = new Date();
  const datetimeStr = now.toLocaleString();

    : `<h1>SALES RECEIPT</h1>`;

    <p class="meta">Change: TSH ${change.toLocaleString()}</p>

    <p class="meta">Payment Method: CREDIT</p>
    ${paymentDetails.customerName ? `<p class="meta">Customer: ${paymentDetails.customerName}</p>` : ''}
    ${paymentDetails.customerPhone ? `<p class="meta">Phone: ${paymentDetails.customerPhone}</p>` : ''}
    ${paymentDetails.dueDate ? `<p class="meta">Due Date: ${new Date(paymentDetails.dueDate).toLocaleDateString()}</p>` : ''}
    <p class="meta">Total Amount: TSH ${total.toLocaleString()}</p>
    <p class="meta">Status: PENDING PAYMENT</p>

    <p class="meta">Payment Method: CARD</p>
  `;

  return `<!DOCTYPE html>

    .logo{ display:block; margin:0 auto 6px auto; width:72px; height:auto; }

<body>

function printReceiptOrInvoice(items, paymentDetails, isInvoice = false) {
  const w = window.open("", "_blank", "width=400,height=600");
  const html = buildReceiptHTML(items, paymentDetails, isInvoice);
  w.document.open(); 
  w.document.write(html); 
  w.document.close();
  w.focus(); 
  setTimeout(() => {
    w.print(); 
    w.close();
  }, 500);
}

  const [newBuyPrice, setNewBuyPrice] = React.useState("");
  const [newSellPrice, setNewSellPrice] = React.useState("");
  const [priceHistory, setPriceHistory] = React.useState([]);
  
  const map = React.useMemo(()=>new Map(products.map(p=>[p.barcode,p])), [products]);

  const prod = map.get(barcode);
  
  React.useEffect(() => {
    if (prod) {
      const history = JSON.parse(localStorage.getItem(`price_history_${barcode}`) || '[]');
      setPriceHistory(history.slice(0, 5));
    } else {
      setPriceHistory([]);
    }
  }, [barcode, prod]);

  const suggestions = React.useMemo(()=>{
    const q = String(barcode||"").toLowerCase();
    if (!q) return [];
    return products
      .filter(p => String(p.barcode||"").includes(q) || (p.name||"").toLowerCase().includes(q))
      .slice(0,8);
  }, [barcode, products]);

  const valid = String(barcode||"").trim() && !Number.isNaN(Number(qty)) && Number(qty) !== 0;

  const handleSave = () => {
    if (prod && (newBuyPrice || newSellPrice)) {
      const historyEntry = {
        date: new Date().toISOString(),
        user: currentUser || "Manager",
        oldBuyPrice: prod.buy_price,
        newBuyPrice: newBuyPrice || prod.buy_price,
        oldSellPrice: prod.price,
        newSellPrice: newSellPrice || prod.price,
        quantityAdded: Number(qty) || 0
      };
      
      const history = JSON.parse(localStorage.getItem(`price_history_${barcode}`) || '[]');
      history.unshift(historyEntry);
      localStorage.setItem(`price_history_${barcode}`, JSON.stringify(history.slice(0, 50)));
    }

    onSave({
      barcode: String(barcode||"").trim(),
      qty: Number(qty),
      buy_price: newBuyPrice ? Number(newBuyPrice) : null,
      sell_price: newSellPrice ? Number(newSellPrice) : null,

/* ---------- User Management Modal ---------- */
function UserManagementModal({ users, onClose, onSave, currentUser }) {
  const [userList, setUserList] = useState(users);
  const [showAdd, setShowAdd] = useState(false);
  const [editingUser, setEditingUser] = useState(null);
  const [newUser, setNewUser] = useState({ username: "", password: "", name: "", role: "teller" });

  const addUser = () => {
    if (!newUser.username || !newUser.password || !newUser.name) {
      alert("Please fill all required fields");
      return;
    }
    
    if (userList.find(u => u.username === newUser.username)) {
      alert("Username already exists");
      return;
    }
    
    const user = {
      id: Math.max(...userList.map(u => u.id), 0) + 1,
      ...newUser,
      created: new Date().toISOString()
    };
    
    const updated = [...userList, user];
    setUserList(updated);
    onSave(updated);
    setNewUser({ username: "", password: "", name: "", role: "teller" });
    setShowAdd(false);
  };

  const updateUser = (id, updates) => {
    const updated = userList.map(u => u.id === id ? { ...u, ...updates } : u);
    setUserList(updated);
    onSave(updated);
    setEditingUser(null);
  };

  const deleteUser = (id) => {
    if (id === currentUser.id) {
      alert("Cannot delete your own account");
      return;
    }
    if (!confirm("Are you sure you want to delete this user?")) return;
    const updated = userList.filter(u => u.id !== id);
    setUserList(updated);
    onSave(updated);
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-4xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between mb-6">

            <button onClick={() => setShowAdd(true)} className="btn btn-primary">
              <PlusIcon /> Add User
            </button>
            <button onClick={onClose} className="btn btn-outline">
              Close
            </button>
          </div>
        </div>

        {showAdd && (
          <div className="mb-6 p-4 border border-slate-200 rounded-lg bg-slate-50">
            <h3 className="font-semibold mb-4">Add New User</h3>
            <div className="grid md:grid-cols-4 gap-4">
              <input
                value={newUser.username}
                onChange={(e) => setNewUser({...newUser, username: e.target.value})}
                className="form-input"
                placeholder="Username"
              />
              <input
                value={newUser.password}
                onChange={(e) => setNewUser({...newUser, password: e.target.value})}
                className="form-input"
                placeholder="Password"
                type="password"
              />
              <input
                value={newUser.name}
                onChange={(e) => setNewUser({...newUser, name: e.target.value})}

                value={newUser.role}
                onChange={(e) => setNewUser({...newUser, role: e.target.value})}
                className="form-input"
              >
                <option value="teller">Teller</option>
                <option value="manager">Manager</option>
              </select>
            </div>
            <div className="flex items-center gap-3 mt-4">
              <button onClick={addUser} className="btn btn-success">Save</button>
              <button onClick={() => setShowAdd(false)} className="btn btn-outline">Cancel</button>
            </div>
          </div>
        )}

        <div className="flex-1 min-h-0 overflow-y-auto overflow-x-auto">
          <div className="overflow-y-auto h-full">
            <table className="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Username</th>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {userList.map((user) => (
                  <tr key={user.id}>
                    <td>{user.id}</td>
                    <td>{user.username}</td>
                    <td>
                      {editingUser === user.id ? (
                        <input
                          defaultValue={user.name}
                          className="form-input"
                          onBlur={(e) => updateUser(user.id, { name: e.target.value })}

                      ) : (
                        user.name
                      )}
                    </td>
                    <td>
                      {editingUser === user.id ? (
                        <select

                        >
                          <option value="teller">Teller</option>
                          <option value="manager">Manager</option>
                        </select>
                      ) : (
                        <span className={`px-2 py-1 rounded text-xs font-medium ${

/* ---------- Employee Performance Modal ---------- */
function EmployeePerformanceModal({ sales, users, onClose }) {
  const [dateRange, setDateRange] = useState("today");
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");

  const filteredSales = useMemo(() => {
    const now = new Date();
    let from, to;
    
    switch (dateRange) {
      case "today":
        from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        to = new Date(from.getTime() + 24 * 60 * 60 * 1000);
        break;
      case "week":
        from = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        to = now;
        break;
      case "month":
        from = new Date(now.getFullYear(), now.getMonth(), 1);
        to = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        break;
      case "year":
        from = new Date(now.getFullYear(), 0, 1);
        to = new Date(now.getFullYear() + 1, 0, 0);
        break;
      case "custom":
        from = startDate ? new Date(startDate) : new Date(0);
        to = endDate ? new Date(endDate + "T23:59:59") : new Date();
        break;
      default:
        return sales;
    }
    
    return sales.filter(s => {
      const date = new Date(s.timestamp);
      return date >= from && date <= to;
    });
  }, [sales, dateRange, startDate, endDate]);

  const performanceData = useMemo(() => {
    const userMap = new Map(users.map(u => [u.name, u]));
    const data = new Map();
    
    filteredSales.forEach(sale => {
      const userName = sale.user_name || "Unknown";
      if (!data.has(userName)) {
        data.set(userName, {
          name: userName,
          role: userMap.get(userName)?.role || "Unknown",
          totalSales: 0,
          totalRevenue: 0,
          totalProfit: 0,
          itemsSold: 0,
          transactions: new Set()
        });
      }
      
      const user = data.get(userName);
      user.totalSales += 1;
      user.totalRevenue += sale.total;
      user.totalProfit += sale.profit || 0;
      user.itemsSold += sale.quantity;
      user.transactions.add(sale.receipt_number);
    });
    
    return Array.from(data.values()).map(user => ({
      ...user,
      transactionCount: user.transactions.size,
      avgTransaction: user.transactionCount > 0 ? user.totalRevenue / user.transactionCount : 0
    })).sort((a, b) => b.totalRevenue - a.totalRevenue);
  }, [filteredSales, users]);

  const totalMetrics = useMemo(() => {
    return performanceData.reduce((acc, user) => ({
      totalRevenue: acc.totalRevenue + user.totalRevenue,
      totalProfit: acc.totalProfit + user.totalProfit,
      totalItems: acc.totalItems + user.itemsSold,
      totalTransactions: acc.totalTransactions + user.transactionCount
    }), { totalRevenue: 0, totalProfit: 0, totalItems: 0, totalTransactions: 0 });
  }, [performanceData]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-6xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Employee Performance</h2>
            <p className="text-slate-600">Track sales performance by team member</p>
          </div>
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
        </div>

        <div className="flex flex-wrap items-center gap-4 mb-6">
          <select
            value={dateRange}
            onChange={(e) => setDateRange(e.target.value)}
            className="form-input w-auto"
          >
            <option value="today">Today</option>
            <option value="week">Last 7 Days</option>
            <option value="month">This Month</option>
            <option value="year">This Year</option>
            <option value="custom">Custom Range</option>
          </select>
          
          {dateRange === "custom" && (
            <>
              <input
                type="date"
                value={startDate}
                onChange={(e) => setStartDate(e.target.value)}
                className="form-input w-auto"
              />
              <input
                type="date"
                value={endDate}
                onChange={(e) => setEndDate(e.target.value)}
                className="form-input w-auto"
              />
            </>
          )}
        </div>

        <div className="grid md:grid-cols-4 gap-4 mb-6">
          <div className="info-card" style={{background: 'linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%)'}}>
            <div className="info-card-header" style={{color: '#1e40af'}}>Total Revenue</div>
            <div className="info-card-value" style={{color: '#1d4ed8'}}>TSH {totalMetrics.totalRevenue.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)'}}>
            <div className="info-card-header" style={{color: '#065f46'}}>Total Profit</div>
            <div className="info-card-value" style={{color: '#047857'}}>TSH {totalMetrics.totalProfit.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)'}}>
            <div className="info-card-header" style={{color: '#92400e'}}>Items Sold</div>
            <div className="info-card-value" style={{color: '#b45309'}}>{totalMetrics.totalItems.toLocaleString()}</div>
          </div>

/* ---------- ABC Analysis Modal ---------- */
function ABCAnalysisModal({ products, sales, onClose }) {
  const abcData = useMemo(() => {
    const salesByProduct = new Map();
    
    sales.forEach(sale => {
      const key = sale.barcode;
      if (!salesByProduct.has(key)) {
        salesByProduct.set(key, {
          barcode: sale.barcode,
          name: sale.name,
          totalRevenue: 0,
          totalQuantity: 0
        });
      }
      const product = salesByProduct.get(key);
      product.totalRevenue += sale.total;
      product.totalQuantity += sale.quantity;
    });
    
    const productData = Array.from(salesByProduct.values())
      .sort((a, b) => b.totalRevenue - a.totalRevenue);
    
    const totalRevenue = productData.reduce((sum, p) => sum + p.totalRevenue, 0);
    let cumulativeRevenue = 0;
    
    const classified = productData.map(product => {
      cumulativeRevenue += product.totalRevenue;
      const cumulativePercent = (cumulativeRevenue / totalRevenue) * 100;
      
      let category;
      if (cumulativePercent <= 80) category = 'A';
      else if (cumulativePercent <= 95) category = 'B';
      else category = 'C';
      
      const productInfo = products.find(p => p.barcode === product.barcode);
      
      return {
        ...product,
        category,
        cumulativePercent: cumulativePercent,
        revenuePercent: (product.totalRevenue / totalRevenue) * 100,
        currentStock: productInfo?.available_stock || 0,
        stockValue: (productInfo?.available_stock || 0) * (productInfo?.buy_price || 0)
      };
    });
    
    return classified;
  }, [products, sales]);
  
  const categoryStats = useMemo(() => {
    const stats = { A: { count: 0, revenue: 0 }, B: { count: 0, revenue: 0 }, C: { count: 0, revenue: 0 } };
    const totalRevenue = abcData.reduce((sum, p) => sum + p.totalRevenue, 0);
    
    abcData.forEach(product => {
      stats[product.category].count += 1;
      stats[product.category].revenue += product.totalRevenue;
    });
    
    Object.keys(stats).forEach(cat => {
      stats[cat].revenuePercent = totalRevenue > 0 ? (stats[cat].revenue / totalRevenue * 100) : 0;
    });
    
    return stats;
  }, [abcData]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">ABC Inventory Analysis</h2>
            <p className="text-slate-600">Product classification based on revenue contribution</p>
          </div>
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
        </div>

        <div className="grid md:grid-cols-3 gap-4 mb-6">
          <div className="info-card abc-class-a">
            <div className="info-card-header">Class A Products</div>
            <div className="info-card-value">{categoryStats.A.count}</div>
            <div className="text-sm">~80% of Revenue ({categoryStats.A.revenuePercent.toFixed(1)}%)</div>
          </div>
          <div className="info-card abc-class-b">
            <div className="info-card-header">Class B Products</div>
            <div className="info-card-value">{categoryStats.B.count}</div>
            <div className="text-sm">~15% of Revenue ({categoryStats.B.revenuePercent.toFixed(1)}%)</div>
          </div>
          <div className="info-card abc-class-c">
            <div className="info-card-header">Class C Products</div>
            <div className="info-card-value">{categoryStats.C.count}</div>
            <div className="text-sm">~5% of Revenue ({categoryStats.C.revenuePercent.toFixed(1)}%)</div>
          </div>
        </div>

        <div className="mb-4 p-4 bg-blue-50 rounded-lg">
          <h3 className="font-semibold text-blue-800 mb-2">ABC Analysis Guide</h3>
          <div className="grid md:grid-cols-3 gap-4 text-sm text-blue-800">
            <div>
              <strong>Class A (High Value):</strong> Focus on these top performers. Ensure adequate stock and prioritize reordering.
            </div>
            <div>
              <strong>Class B (Medium Value):</strong> Monitor regularly. Good candidates for promotional activities.
            </div>
            <div>
              <strong>Class C (Low Value):</strong> Review for discontinuation or reduced stock levels to free up capital.
            </div>
          </div>
        </div>

        <div className="flex-1 min-h-0 overflow-y-auto overflow-x-auto">
          <div className="overflow-y-auto h-full">
            <table className="data-table">

                <tr>
                  <th>Category</th>
                  <th>Barcode</th>
                  <th>Product Name</th>
                  <th className="text-right">Total Revenue</th>
                  <th className="text-right">Revenue %</th>
                  <th className="text-right">Cumulative %</th>
                  <th className="text-right">Qty Sold</th>
                  <th className="text-right">Current Stock</th>
                  <th className="text-right">Stock Value</th>
                </tr>
              </thead>
              <tbody>
                {abcData.map((product, index) => (
                  <tr key={product.barcode}>
                    <td>
                      <span className={`px-3 py-1 rounded-full font-bold text-sm abc-class-${product.category.toLowerCase()}`}>

/* ---------- Credit Management Modal ---------- */
function CreditManagementModal({ credits, sales, onClose, onUpdateCredit }) {
  const [query, setQuery] = useState("");
  const [showPaymentForm, setShowPaymentForm] = useState(null);
  const [paymentAmount, setPaymentAmount] = useState("");
  
  const filteredCredits = useMemo(() => {
    if (!query) return credits;
    const q = query.toLowerCase();
    return credits.filter(c => 
      c.customer_name.toLowerCase().includes(q) || 
      c.customer_phone.includes(q) ||
      c.receipt_number.includes(q)
    );
  }, [credits, query]);
  
  const totalPending = useMemo(() => {
    return credits.reduce((sum, c) => sum + c.balance_amount, 0);
  }, [credits]);
  
  const handleAddPayment = (credit) => {
    if (!paymentAmount || parseFloat(paymentAmount) <= 0) {
      alert("Please enter a valid payment amount");
      return;
    }
    
    const amount = parseFloat(paymentAmount);
    if (amount > credit.balance_amount) {
      alert(`Payment amount cannot exceed balance of TSH ${credit.balance_amount.toLocaleString()}`);
      return;
    }
    
    const newPayment = {
      date: new Date().toISOString(),
      amount: amount,
      user: localStorage.getItem("pos_current_user") ? JSON.parse(localStorage.getItem("pos_current_user")).name : "Unknown"
    };
    
    const updatedCredit = {
      ...credit,
      paid_amount: credit.paid_amount + amount,
      balance_amount: credit.balance_amount - amount,
      status: (credit.balance_amount - amount) === 0 ? "paid" : (credit.paid_amount + amount > 0 ? "partial" : "pending"),
      payment_history: [...credit.payment_history, newPayment],
      last_updated: new Date().toISOString()
    };
    
    // Update sales records
    const updatedSales = sales.map(sale => {
      if (sale.receipt_number === credit.receipt_number) {
        return {
          ...sale,
          payment_method: amount === credit.original_amount ? "cash" : "partial_credit",
          payment_date: new Date().toISOString(),
          credit_id: credit.id
        };
      }
      return sale;
    });
    
    onUpdateCredit(updatedCredit, updatedSales);
    setShowPaymentForm(null);
    setPaymentAmount("");
  };
  
  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Credit Management</h2>
            <p className="text-slate-600">Track and update customer credit payments</p>
          </div>
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
        </div>

        <div className="grid md:grid-cols-4 gap-4 mb-6">
          <div className="info-card credit-pending">
            <div className="info-card-header">Total Pending Credit</div>
            <div className="info-card-value">TSH {totalPending.toLocaleString()}</div>
          </div>
          <div className="info-card credit-partial">
            <div className="info-card-header">Active Credits</div>
            <div className="info-card-value">{credits.filter(c => c.balance_amount > 0).length}</div>
          </div>
          <div className="info-card credit-paid">
            <div className="info-card-header">Fully Paid</div>
            <div className="info-card-value">{credits.filter(c => c.status === "paid").length}</div>
          </div>
          <div className="info-card credit-overdue">
            <div className="info-card-header">Overdue</div>
            <div className="info-card-value">{credits.filter(c => new Date(c.due_date) < new Date() && c.balance_amount > 0).length}</div>
          </div>
        </div>

        <div className="flex items-center gap-4 mb-6">
          <input 
            className="form-input flex-1"
            placeholder="Search by customer name, phone, or receipt number…" 
            value={query}
            onChange={e=>setQuery(e.target.value)} 
          />
          <div className="text-sm text-slate-600 font-medium">
            {filteredCredits.length} credit record(s)
          </div>
        </div>

        <div className="flex-1 min-h-0 overflow-y-auto overflow-x-auto">
          <div className="overflow-y-auto h-full">
            <table className="data-table">
              <thead>
                <tr>
                  <th>Receipt #</th>
                  <th>Customer</th>
                  <th>Phone</th>
                  <th className="text-right">Original</th>
                  <th className="text-right">Paid</th>
                  <th className="text-right">Balance</th>
                  <th>Sale Date</th>
                  <th>Due Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {filteredCredits.map((credit) => {
                  const isOverdue = new Date(credit.due_date) < new Date() && credit.balance_amount > 0;
                  const statusClass = credit.status === "paid" ? "credit-paid" : 
                                    credit.status === "partial" ? "credit-partial" : 
                                    isOverdue ? "credit-overdue" : "credit-pending";
                  
                  return (
                    <React.Fragment key={credit.id}>
                      <tr>
                        <td style={{fontFamily: 'ui-monospace, monospace'}}>{credit.receipt_number}</td>
                        <td>{credit.customer_name}</td>
                        <td>{credit.customer_phone || "—"}</td>
                        <td className="text-right">TSH {credit.original_amount.toLocaleString()}</td>
                        <td className="text-right">TSH {credit.paid_amount.toLocaleString()}</td>
                        <td className="text-right">
                          <span className="font-bold">TSH {credit.balance_amount.toLocaleString()}</span>
                        </td>
                        <td>{formatDate(credit.sale_date)}</td>
                        <td className={isOverdue ? "text-red-600 font-medium" : ""}>
                          {formatDate(credit.due_date)}
                          {isOverdue && " (Overdue)"}
                        </td>
                        <td>
                          <span className={`px-3 py-1 rounded-full text-xs font-bold ${statusClass}`}>
                            {credit.status.toUpperCase()}
                            {isOverdue && " - OVERDUE"}
                          </span>
                        </td>
                        <td>
                          <button 
                            onClick={() => setShowPaymentForm(showPaymentForm === credit.id ? null : credit.id)}
                            className="btn btn-primary text-xs px-3 py-1"
                            disabled={credit.balance_amount === 0}
                          >
                            Add Payment
                          </button>
                        </td>
                      </tr>
                      {showPaymentForm === credit.id && (
                        <tr className="bg-blue-50">
                          <td colSpan="10" className="p-4">
                            <div className="flex items-center gap-4">
                              <div className="flex-1">
                                <label className="form-label">Payment Amount (TSH)</label>
                                <input 
                                  type="number"
                                  value={paymentAmount}
                                  onChange={(e) => setPaymentAmount(e.target.value)}
                                  className="form-input"
                                  placeholder={`Enter amount (max: ${credit.balance_amount.toLocaleString()})`}
                                  max={credit.balance_amount}
                                  min="1"
                                />
                              </div>
                              <div className="flex items-center gap-2">
                                <button 
                                  onClick={() => handleAddPayment(credit)}
                                  className="btn btn-success"
                                  disabled={!paymentAmount || parseFloat(paymentAmount) <= 0}
                                >
                                  Record Payment
                                </button>
                                <button 
                                  onClick={() => {
                                    setShowPaymentForm(null);
                                    setPaymentAmount("");
                                  }}
                                  className="btn btn-outline"
                                >
                                  Cancel
                                </button>
                              </div>
                            </div>
                            {credit.payment_history.length > 0 && (
                              <div className="mt-4">
                                <h4 className="font-semibold text-slate-700 mb-2">Payment History</h4>
                                <div className="space-y-2">
                                  {credit.payment_history.map((payment, idx) => (
                                    <div key={idx} className="text-sm p-2 bg-white rounded border">
                                      <div className="flex justify-between">
                                        <span>{new Date(payment.date).toLocaleDateString()}</span>
                                        <span className="font-medium">TSH {payment.amount.toLocaleString()}</span>
                                      </div>
                                      <div className="text-slate-500 text-xs">By: {payment.user}</div>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
            {filteredCredits.length === 0 && (
              <div className="text-center py-12 text-slate-500">
                <p className="text-lg mb-2">No credit records found</p>
                <p className="text-sm">Credit sales will appear here when customers purchase on credit</p>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Sales History Modal (Enhanced with Credit Tracking) ---------- */
function SalesHistoryModal({ sales, products, credits, onClose, onDownload, onOpenAnalytics, onOpenCredits }) {
  const [reportType, setReportType] = useState("all");
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");
  
  const productsMap = useMemo(() => new Map(products.map(p => [p.barcode, p])), [products]);
  
  const filteredSales = useMemo(() => {
    const now = new Date();
    let from, to;
    
    switch (reportType) {
      case "daily":
        from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        to = new Date(from.getTime() + 24 * 60 * 60 * 1000);
        break;
      case "weekly":
        from = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        to = now;
        break;
      case "monthly":
        from = new Date(now.getFullYear(), now.getMonth(), 1);
        to = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        break;
      case "yearly":
        from = new Date(now.getFullYear(), 0, 1);
        to = new Date(now.getFullYear() + 1, 0, 0);
        break;
      case "custom":
        from = startDate ? new Date(startDate) : new Date(0);
        to = endDate ? new Date(endDate + "T23:59:59") : new Date();
        break;
      default:
        return sales;
    }
    
    return sales.filter(s => {
      const date = new Date(s.timestamp);
      return date >= from && date <= to;
    });
  }, [sales, reportType, startDate, endDate]);
  
  const totalRevenue = useMemo(() => filteredSales.reduce((sum, sale) => sum + sale.total, 0), [filteredSales]);
  const totalItems = useMemo(() => filteredSales.reduce((sum, sale) => sum + sale.quantity, 0), [filteredSales]);
  const totalProfit = useMemo(() => filteredSales.reduce((sum, s) => {
    const buyP = Number.isFinite(s.buy_price) ? s.buy_price : (productsMap.get(s.barcode)?.buy_price || 0);
    return sum + (s.price - buyP) * s.quantity;
  }, 0), [filteredSales, productsMap]);
  
  const creditSales = useMemo(() => {
    return filteredSales.filter(s => s.payment_method === "credit" || s.payment_method === "partial_credit");
  }, [filteredSales]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Sales History & Reports</h2>
            <p className="text-slate-600">Transaction history, profit analysis, and reporting</p>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={onOpenAnalytics} className="btn btn-secondary">
              <SalesIcon /> Analytics
            </button>
            <button onClick={onOpenCredits} className="btn btn-primary">
              <CreditIcon /> Credits
            </button>
            <button onClick={onDownload} className="btn btn-primary">
              <DownloadIcon /> Download CSV
            </button>
            <button onClick={onClose} className="btn btn-outline">
              Close
            </button>
          </div>
        </div>

        <div className="flex flex-wrap items-center gap-4 mb-6">
          <select
            value={reportType}
            onChange={(e) => setReportType(e.target.value)}
            className="form-input w-auto"
          >
            <option value="all">All Time</option>
            <option value="daily">Today</option>
            <option value="weekly">Last 7 Days</option>
            <option value="monthly">This Month</option>
            <option value="yearly">This Year</option>
            <option value="custom">Custom Range</option>
          </select>
          
          {reportType === "custom" && (
            <>
              <input
                type="date"
                value={startDate}
                onChange={(e) => setStartDate(e.target.value)}
                className="form-input w-auto"
              />
              <input
                type="date"
                value={endDate}
                onChange={(e) => setEndDate(e.target.value)}
                className="form-input w-auto"
              />
            </>
          )}
          
          <div className="text-sm text-slate-600">
            Showing {filteredSales.length.toLocaleString()} transactions
            {creditSales.length > 0 && ` (${creditSales.length} credit sales)`}
          </div>
        </div>

        <div className="grid md:grid-cols-4 gap-4 mb-6">
          <div className="info-card" style={{background: 'linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%)'}}>
            <div className="info-card-header" style={{color: '#1e40af'}}>Total Revenue</div>
            <div className="info-card-value" style={{color: '#1d4ed8'}}>TSH {totalRevenue.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)'}}>
            <div className="info-card-header" style={{color: '#065f46'}}>Items Sold</div>

          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)'}}>
            <div className="info-card-header" style={{color: '#92400e'}}>Total Profit</div>
            <div className="info-card-value" style={{color: '#b45309'}}>TSH {totalProfit.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%)'}}>

                <tbody>
                  {filteredSales.map((s, i) => {
                    const buyPrice = Number.isFinite(s.buy_price) ? s.buy_price : (productsMap.get(s.barcode)?.buy_price || 0);
                    const profit = s.profit ?? ((s.price - buyPrice) * s.quantity);
                    const margin = s.total > 0 ? (profit / s.total * 100) : 0;
                    const isCredit = s.payment_method === "credit" || s.payment_method === "partial_credit";
                    
                    return (
                      <tr key={i}>
                        <td style={{fontFamily: 'ui-monospace, monospace'}}>{s.receipt_number}</td>
                        <td>{s.user_name || "Unknown"}</td>
                        <td>{new Date(s.timestamp).toLocaleString()}</td>
                        <td style={{fontFamily: 'ui-monospace, monospace'}}>{s.barcode}</td>
                        <td>{s.name}</td>
                        <td className="text-right">{s.quantity}</td>
                        <td className="text-right">TSH {s.price.toLocaleString()}</td>
                        <td className="text-right">TSH {s.total.toLocaleString()}</td>
                        <td className="text-right">TSH {buyPrice.toLocaleString()}</td>
                        <td className="text-right">TSH {profit.toLocaleString()}</td>
                        <td className="text-right">
                          <span className={`font-medium ${
                            margin > 50 ? 'text-green-600' :
                            margin > 25 ? 'text-yellow-600' : 'text-red-600'
                          }`}>
                            {margin.toFixed(1)}%
                          </span>
                        </td>
                        <td>
                          <span className={`px-2 py-1 rounded text-xs font-medium ${
                            s.payment_method === 'cash' ? 'bg-green-100 text-green-800' :
                            s.payment_method === 'credit' ? 'bg-blue-100 text-blue-800' :
                            s.payment_method === 'partial_credit' ? 'bg-yellow-100 text-yellow-800' :
                            s.payment_method === 'card' ? 'bg-purple-100 text-purple-800' :
                            'bg-gray-100 text-gray-800'
                          }`}>
                            {s.payment_method?.replace('_', ' ').toUpperCase() || 'CASH'}
                          </span>
                        </td>
                        <td>
                          {s.payment_date ? new Date(s.payment_date).toLocaleDateString() : 
                           isCredit ? "Pending" : new Date(s.timestamp).toLocaleDateString()}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------- Analytics Modal ---------- */
function AnalyticsModal({ sales, products, onClose }) {
  const productsMap = useMemo(() => new Map(products.map(p => [p.barcode, p])), [products]);
  
  const totalRevenue = useMemo(() => sales.reduce((sum, sale) => sum + sale.total, 0), [sales]);
  const totalItems = useMemo(() => sales.reduce((sum, sale) => sum + sale.quantity, 0), [sales]);
  const totalProfit = useMemo(() => sales.reduce((sum, s) => {
    const buyP = Number.isFinite(s.buy_price) ? s.buy_price : (productsMap.get(s.barcode)?.buy_price || 0);
    return sum + (s.price - buyP) * s.quantity;
  }, 0), [sales, productsMap]);

  const metrics = useMemo(() => {
    const m = new Map();
    for (const s of sales) {
      const k = s.barcode;
      if (!m.has(k)) m.set(k, { barcode: s.barcode, name: s.name, qty: 0, rev: 0, profit: 0 });
      const buyP = Number.isFinite(s.buy_price) ? s.buy_price : (productsMap.get(s.barcode)?.buy_price || 0);
      const row = m.get(k);
      row.qty += s.quantity;
      row.rev += s.total;
      row.profit += (s.price - buyP) * s.quantity;
    }
    return Array.from(m.values()).sort((a,b)=> b.rev - a.rev);
  }, [sales, productsMap]);

  const withStock = useMemo(() => {
    const pm = new Map(products.map(p=>[p.barcode,p]));
    return metrics.map(r => {
      const p = pm.get(r.barcode) || {};
      const opening = Number(p.opening_stock)||0;
      const sold = r.qty;
      const available = Number(p.available_stock)||0;
      const drr = sold > 0 ? (sold / Math.max(1, opening + sold)) * 30 : 0;
      const projDaysLeft = drr>0 ? (available / (drr/30)) : Infinity;
      const avgPrice = (r.rev / Math.max(1, r.qty));
      return { ...r, opening, available, drr, projDaysLeft, avgPrice, turnover: r.rev, margin: r.profit };
    });
  }, [metrics, products]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Sales Analytics</h2>
            <p className="text-slate-600">Detailed profit and performance analysis</p>
          </div>
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
        </div>

        <div className="grid md:grid-cols-3 gap-6 mb-6">
          <div className="info-card" style={{background: 'linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%)'}}>
            <div className="info-card-header" style={{color: '#1e40af'}}>Total Revenue</div>
            <div className="info-card-value" style={{color: '#1d4ed8'}}>TSH {totalRevenue.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)'}}>
            <div className="info-card-header" style={{color: '#065f46'}}>Items Sold</div>
            <div className="info-card-value" style={{color: '#047857'}}>{totalItems.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)'}}>
            <div className="info-card-header" style={{color: '#92400e'}}>Total Profit</div>
            <div className="info-card-value" style={{color: '#b45309'}}>TSH {totalProfit.toLocaleString()}</div>
          </div>
        </div>

        <div className="flex-1 min-h-0 overflow-y-auto overflow-x-auto">
          <div className="overflow-y-auto h-full">
            <table className="data-table">
              <thead>
                <tr>
                  <th>Barcode</th>
                  <th>Product Name</th>
                  <th className="text-right">Qty Sold</th>
                  <th className="text-right">Revenue</th>
                  <th className="text-right">Profit</th>
                  <th className="text-right">Avg Price</th>
                  <th className="text-right">Opening</th>
                  <th className="text-right">Available</th>
                  <th className="text-right">Turnover%</th>
                  <th className="text-right">Days Left</th>
                </tr>
              </thead>
              <tbody>
                {withStock.map((r) => (
                  <tr key={r.barcode}>
                    <td style={{fontFamily: 'ui-monospace, monospace'}}>{r.barcode}</td>
                    <td>{r.name}</td>
                    <td className="text-right">{r.qty.toLocaleString()}</td>
                    <td className="text-right">TSH {r.rev.toLocaleString()}</td>
                    <td className="text-right">TSH {r.profit.toLocaleString()}</td>
                    <td className="text-right">TSH {r.avgPrice.toFixed(0)}</td>
                    <td className="text-right">{r.opening.toLocaleString()}</td>
                    <td className="text-right">{r.available.toLocaleString()}</td>
                    <td className="text-right">{(r.turnover * 100).toFixed(1)}%</td>
                    <td className="text-right">{Number.isFinite(r.projDaysLeft) ? r.projDaysLeft.toFixed(1) : "—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        
        <div className="mt-4 p-4 bg-blue-50 rounded-lg">
          <p className="text-sm text-blue-800">
            <strong>Analysis Tips:</strong> Use this table to identify fast-moving products, high-margin items, and potential stock-outs. 
            Focus on products with high turnover and good profit margins for restocking priorities.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ---------- Inventory Modal (Enhanced) ---------- */
function InventoryModal({ products, onClose, onDeleteSelected, onDeleteAll, onOpenABC }) {
  const [query, setQuery] = React.useState("");
  const [checked, setChecked] = React.useState(new Set());

  const filtered = React.useMemo(() => {
    const q = query.toLowerCase();
    return products.filter(p =>
      (p.name||"").toLowerCase().includes(q) || String(p.barcode||"").includes(q)
    );
  }, [products, query]);

  const totals = React.useMemo(() => {
    const toNum = n => Number(n) || 0;
    let stockValue = 0, retailValue = 0, potentialProfit = 0, lowStockCount = 0, expiredCount = 0, expiringSoonCount = 0;
    for (const p of filtered) {
      const qty = toNum(p.available_stock);
      const buy = toNum(p.buy_price);
      const sell = toNum(p.price);
      const reorderLevel = toNum(p.reorder_level);
      
      stockValue += buy * qty;
      retailValue += sell * qty;
      potentialProfit += (sell - buy) * qty;
      
      if (qty <= reorderLevel && reorderLevel > 0) lowStockCount++;
      if (p.expiration_date && isExpired(p.expiration_date)) expiredCount++;
      if (p.expiration_date && isExpiringSoon(p.expiration_date)) expiringSoonCount++;
    }
    return { stockValue, retailValue, potentialProfit, lowStockCount, expiredCount, expiringSoonCount };
  }, [filtered]);

  function toggle(bc) {
    const next = new Set(checked);
    next.has(bc) ? next.delete(bc) : next.add(bc);
    setChecked(next);
  }

  function getRowClass(product) {
    if (product.expiration_date && isExpired(product.expiration_date)) {
      return "expired-item";
    }
    if (product.expiration_date && isExpiringSoon(product.expiration_date)) {
      return "expiring-soon-item";
    }
    if (Number(product.available_stock) <= Number(product.reorder_level) && Number(product.reorder_level) > 0) {
      return "low-stock-item";
    }
    return "";
  }

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-7xl p-6 max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-800">Inventory Management</h2>
            <p className="text-slate-600">Stock levels, valuations, and alerts</p>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={onOpenABC} className="btn btn-secondary">
              <BarChartIcon /> ABC Analysis
            </button>
            <button onClick={onClose} className="btn btn-outline">
              Close
            </button>
          </div>
        </div>

        <div className="grid md:grid-cols-6 gap-4 mb-6">
          <div className="info-card" style={{background: 'linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%)'}}>
            <div className="info-card-header" style={{color: '#1e40af'}}>Stock Value</div>
            <div className="info-card-value" style={{color: '#1d4ed8', fontSize: '1.2rem'}}>TSH {totals.stockValue.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)'}}>
            <div className="info-card-header" style={{color: '#065f46'}}>Retail Value</div>
            <div className="info-card-value" style={{color: '#047857', fontSize: '1.2rem'}}>TSH {totals.retailValue.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)'}}>
            <div className="info-card-header" style={{color: '#92400e'}}>Potential Profit</div>
            <div className="info-card-value" style={{color: '#b45309', fontSize: '1.2rem'}}>TSH {totals.potentialProfit.toLocaleString()}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fed7aa 0%, #fdba74 100%)'}}>
            <div className="info-card-header" style={{color: '#c2410c'}}>Low Stock</div>
            <div className="info-card-value" style={{color: '#ea580c', fontSize: '1.2rem'}}>{totals.lowStockCount}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fee2e2 0%, #fecaca 100%)'}}>
            <div className="info-card-header" style={{color: '#b91c1c'}}>Expired</div>
            <div className="info-card-value" style={{color: '#dc2626', fontSize: '1.2rem'}}>{totals.expiredCount}</div>
          </div>
          <div className="info-card" style={{background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)'}}>
            <div className="info-card-header" style={{color: '#92400e'}}>Expiring Soon</div>
            <div className="info-card-value" style={{color: '#b45309', fontSize: '1.2rem'}}>{totals.expiringSoonCount}</div>
          </div>
        </div>

        <div className="flex items-center gap-4 mb-4">
          <input 
            className="form-input flex-1"
            placeholder="Search by product name or barcode…" 
            value={query}
            onChange={e=>setQuery(e.target.value)} 
          />
          <button
            onClick={()=>{
              if (checked.size===0) return alert("Please select items to delete.");
              if (!confirm(`Delete ${checked.size} selected product(s)? This affects the current month file only.`)) return;
              onDeleteSelected(Array.from(checked));
              setChecked(new Set());
            }}
            className="btn btn-danger">
            Delete Selected ({checked.size})
          </button>
          <button
            onClick={()=>{
              if (!confirm("Delete ALL products from the current month file? This cannot be undone.")) return;
              onDeleteAll();
            }}
            className="btn btn-outline text-red-700 border-red-300 hover:bg-red-50">
            Delete All
          </button>
        </div>

        <div className="mb-4 p-3 bg-slate-50 rounded-lg">

              <div className="w-3 h-3 rounded bg-red-200 border-l-4 border-red-500"></div>

            <div className="flex items-center gap-2">

              <span>Expiring Soon</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded bg-yellow-200 border-l-4 border-yellow-500"></div>
              <span>Low Stock</span>
            </div>
          </div>
        </div>

        <div className="flex-1 min-h-0 overflow-y-auto overflow-x-auto">
           <div className="overflow-y-auto h-full">
            <table className="data-table">
              <thead>
                <tr>
                  <th className="w-12">
                    <input 
                      type="checkbox"
                      onChange={e=>{
                        if (e.target.checked) setChecked(new Set(filtered.map(p=>p.barcode)));
                        else setChecked(new Set());
                      }}
                    />
                  </th>
                  <th>Barcode</th>
                  <th>Product Name</th>
                  <th className="text-right">Buy Price</th>
                  <th className="text-right">Sell Price</th>
                  <th className="text-right">Available</th>
                  <th className="text-right">Reorder Level</th>
                  <th>Expiration Date</th>
                  <th className="text-right">Stock Value</th>
                  <th className="text-right">Status</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p=>{
                  const qty = Number(p.available_stock)||0;
                  const buy = Number(p.buy_price)||0;
                  const sell = Number(p.price)||0;
                  const reorderLevel = Number(p.reorder_level)||0;
                  const rowClass = getRowClass(p);
                  
                  return (
                    <tr key={p.barcode} className={rowClass}>
                      <td className="text-center">
                        <input 
                          type="checkbox" 
                          checked={checked.has(p.barcode)} 
                          onChange={()=>toggle(p.barcode)} 
                        />
                      </td>
                      <td style={{fontFamily: 'ui-monospace, monospace'}}>{p.barcode}</td>
                      <td>{p.name}</td>
                      <td className="text-right">TSH {buy.toLocaleString()}</td>
                      <td className="text-right">TSH {sell.toLocaleString()}</td>
                      <td className="text-right">{qty.toLocaleString()}</td>
                      <td className="text-right">{reorderLevel > 0 ? reorderLevel.toLocaleString() : "—"}</td>
                      <td>{p.expiration_date ? formatDate(p.expiration_date) : "—"}</td>
                      <td className="text-right">TSH {(buy*qty).toLocaleString()}</td>
                      <td className="text-right">
                        <div className="flex items-center justify-end gap-1">
                          {p.expiration_date && isExpired(p.expiration_date) && (
                            <span className="px-2 py-1 bg-red-100 text-red-800 rounded text-xs font-medium">Expired</span>
                          )}
                          {p.expiration_date && isExpiringSoon(p.expiration_date) && !isExpired(p.expiration_date) && (
                            <span className="px-2 py-1 bg-orange-100 text-orange-800 rounded text-xs font-medium">Expiring</span>
                          )}
                          {qty <= reorderLevel && reorderLevel > 0 && (
                            <span className="px-2 py-1 bg-yellow-100 text-yellow-800 rounded text-xs font-medium">Low Stock</span>
                          )}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

      const hit = String(r.barcode||"").includes(query) || String(r.name||"").toLowerCase().includes(String(query||"").toLowerCase());

      const t = new Date(r.timestamp).getTime();
      const okFrom = from ? t >= new Date(from+"T00:00:00").getTime() : true;
      const okTo   = to   ? t <  new Date(to+"T23:59:59").getTime()   : true;
      return okFrom && okTo;

        <div className="bg-white border rounded-lg p-4 mb-6 shadow-inner">
          <div className="space-y-2">
            {cart.map((c,i)=>(
              <div key={i} className="flex justify-between text-sm py-1">
                <span className="flex-1">{c.name} × {c.qty}</span>
                <span className="mono font-semibold">TSH {(c.price*c.qty).toLocaleString()}</span>
              </div>
            ))}
          </div>
          <div className="border-t-2 border-dashed border-slate-300 mt-3 pt-3">
            <div className="flex justify-between font-bold text-lg">
              <span>Total</span>
              <span className="mono">TSH {total.toLocaleString()}</span>
            </div>
          </div>
        </div>
        
        <div className="grid grid-cols-2 gap-4">
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
          <button onClick={()=>printReceiptAuto(items)} className="btn btn-primary">
            Print Receipt
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------- Print helpers ---------- */
function printReceiptAuto(items) {
  const w = window.open("", "_blank", "width=400,height=600");
  const html = buildReceiptHTML(items, { method: "cash", receiptNumber: "" }, false);
  w.document.open(); 
  w.document.write(html); 
  w.document.close();
  w.focus(); 
  setTimeout(() => {
    w.print(); 
    w.close();
  }, 500);
}

/* ---------- Alert Component ---------- */
function AlertBadge({ count, onClick }) {
  if (count <= 0) return null;
  return (
    <div className="alert-badge" onClick={onClick} style={{ cursor: 'pointer' }}>
      {count > 99 ? '99+' : count}
    </div>
  );
}

/* ---------- Main App ---------- */
function POSSystem() {
  const [cart, setCart] = useState([]);
  const [barcode, setBarcode] = useState("");
  const [descQuery, setDescQuery] = useState("");
  const [toast, setToast] = useState(null);

  const [receiptNumber, setReceiptNumber] = useState(1001);

  const [sales, setSales] = useState([]);
  const [users, setUsers] = useState(DEFAULT_USERS);
  const [showAdd, setShowAdd] = useState(false);
  const [pendingBarcode, setPendingBarcode] = useState("");
  const [csvURL, setCsvURL] = useState(null);
  const [csvFileName, setCsvFileName] = useState(`products_${monthKey()}.csv`);

  // STATE VARIABLES
